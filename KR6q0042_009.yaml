body:
  text: 中峯普應本國師中峯普應國師者諱明本其先臨濟玄玄七傳楊岐會會八傳無準範範傳雪巖欽欽傳高峯妙妙之嗣四人師居其首師自臨濟其世十八臨濟自少林其世十一是師為少林二十九世之正胤也師出錢塘孫姓母李氏夢無門開道者持燈至其家而生師生之時內室五色光明者三晝夜襁褓即具大人相坐則跏趺嬉戲則為佛事既冠閲傳燈録至明知生是不生之理為甚卻被生死之所流轉大疑乃求依獅子院高峯妙禪師妙公喜度之三載觀流泉有省求妙公印證被打趂出自此日作夜侍常至晨鐘鳴不去妙公不顧久而洞徹玄旨妙公大悅書自相贊與師曰我相不思議佛祖莫能視獨許不肖兒得見半邊鼻洎十載妙公告寂時以大覺寺屬師師推首座祖雍主之遂一笠吳楚西至皖山匡廬乃東還結幻住菴於吳雁蕩遂成叢席霆發瞿公請主大覺不就舉定叟泰應之泰嘗受職於一山萬矣乃欲改嗣於師師大不然以書卻之曰昨者坐語未及它論而首以住院承嗣扣之者惟恐足下苟循世諦故也本與足下納交十六年彼此心懷洞然明白豈意足下不諒愚情反欲相及何臨事反覆若此耶古人於法嗣嫡傳所以深明宗係者大法源委不可誣也世漓俗薄奉金請拂以院易嗣者有之本嘗痛心於此夫大覺雖先師開山然十方叢林儘有尊宿捨彼不取而必欲本尸何識量之不廣也本非畏住持實畏嗣法於開山也故退避力辭而舉足下為之主政以足下自師一山禪師豈可苟循世俗而易其所師哉繇此言之本猶不欲以先師座下人迭尸大覺而況牽枝引蔓欲為本之嗣乎聞命駭然專凂逆流塔主預此拜聞望以玉峽之音直與拈出或欲循俗易嗣則本斷然不敢與足下一日相聚也至扣至扣師還天目廬高峰塔至大戊申仁宗在青宮聘之不就賜金紋衣加號法慧禪師師隱去儀真己酉即船以居乃吟曰懶將前後論三三端的船居勝住菴為不定方真丈室是無住相活伽藍煙村水國開晨供月浦花汀放晚參有客扣舷來問道頭陀不用口喃喃庚戌又還天目辛亥復船居吳江陳子聰為師建幻住菴師又去之北隱汴梁吟曰鄽市安居儘自繇百般成現絶馳求緑菘紫芥攔街賣白米青柴倚戶收十二時中生計足數千年外道緣周苟於心外存諸見敢保驢年會合頭明年又結幻住菴於六安山吟曰胸中何愛復何憎自愧人前百不能旋拾斷雲修破衲高攀危磴閣枯藤千峰環繞半間屋萬境空間一箇僧除此現成公案外且無佛法繼傳燈丞相脫歡公望風訪師師又棄菴去之東海州吟曰道人孤寂任栖遲迹寄湖村白水西四壁煙昏茅屋窄一天霜重板橋低驚濤拍岸明生滅止水涵空示悟迷萬象平沉心自照波光常與月輪齊歡公戒邑吏強師至私第乃與中書平章并諸山必致師於靈隱師固辭曰夫住持者須具三種力庶不敗事一道力二緣力三智力道體也緣智用也有其體而缺其用尚可為之但化權不周事儀不備耳使道體既虧便神異無算雖緣與智亦奚為哉或體用並缺然居之曰因曰果寧無慊於中乎貧道無其實故不敢尸其名竟稱病還天目延祐丙辰上諭宣政院簡釆名山宿德以聞承旨者期入天目師聞遁去南徐丹陽蔣均為建幻住菴戊午又還天目明年九月朝旨褒號佛慈圓照廣慧禪師改獅子院為正宗禪寺駙馬瀋王王璋又齎御香紫衣即所居而修敬慕焉宣政又以徑山請師師不就乃結幻住菴於中隹山中隹去西峰三十里巖磴險絶緇素跋涉甚難求師歸院至治癸亥西峰凍涸大木摧折師自敘曰余初心出家志在草衣垢面習頭陀行以服田衣抱愧沒齒平昔懶退非矯世絶俗蓋以文字則失於學問參究則缺於悟明尋常為好事者之所稱道亦報緣之偶然耳秋示微疾有省候者師皆曰幻住菴漏且朽矣不可久住也有僧告歸吳門師曰何不過了中秋去十三日手書屬弟子曰幻者朝死夕化骨便送歸三塔依清規儀式不許循世禮也次日白虹貫山巔師跏趺書偈而化停龕三日顏益和悅道俗奔集踰萬奉全身塔於寺西望江石閲世六十一坐夏三十七明宗己巳賜諡曰智覺禪師塔曰法雲元統甲戌追尊為普應國師乃以廣録三十卷頒入大藏更命重臣銘國師道行於南詔五比丘繪師頂相還國四衆迎相入中慶城相放五色異光繇是傾信禪宗奉師為南詔第一祖時皆曰本公圓辨不閟針砭多方哀講士之趨岐傷禪流之混繼乃推大覺以嗣開先接玄鑑而化南詔允有大愚安龍潭信之高風至於大功不宰至讓無名杖履蕭然雲行鶴舉視聲名而若凂甘肥遁以如飴楷芙蓉訥圓通不足過之以其瀚海餘波煙屯雨驟提鳳閣之儒臣醒天潢之貴戚而永明壽明教嵩庶可並駕云贊曰人人抱荊山之璧箇箇得赤水之珠何難兄釋迦而弟彌勒及讀本祖自敘之語愧汗橫流俯仰無地矣嗟乎非真祖師心語不吐非正嫡裔背汗不流心語不吐者昧後也背汗不流者欺先也昧後欺先互相啖啖則本祖隱現堪忍世界何日而休哉仰山佛智熙禪師禪師姓唐氏豫章人也稱元熙者西山明覺院得度之名也晦機者其師物初觀和尚所贈之字也號佛智者御製也臨江通判從文丞相靖難死國唐元齡者熙之胞兄也廬山一山萬禪師者熙之益友也大中大夫廣智全悟釋教宗主笑隱大欣禪師者乃熙嗣法弟子也熙為人事親以孝事師以誠昆仲之間以義道友之間以直訓誨門弟則嚴且慈熙嘗與一山萬行腳萬不耐叢林好譏諸方熙每抑之且曰明眼衲子出言為叢林輕重豈可易乎物初觀公時居玉几公為浙人每操鄉音晝夜批削學者學者畏其口不敢近熙強萬上謁觀公觀與熙語大驚默計曰澆漓末世有此人也又指萬問熙曰此老為誰熙對曰乃元熙同行某甲也觀素聞萬名故深愛熙得友之正乃留夏朝夕警誨熙輒深入玄奧久之出住百丈萬嗣東叟住廬山開先寺兩山法席大振衲子絡繹西江訴禪人嘗掌開先內記請益參究達旦不臥萬每示之訴不領萬曰百丈熙堂頭當能了子大事亟行勿遲但勿可言從開先來訴謁百丈熙問曰何來對曰廬山曰曾見萬聱頭否訴不語熙指曰果遭渠賣弄矣欣悚然莫知所以熙居百丈十二載遷淨慈七載遷雙徑居雙徑未久退隱南山之陽江右叢林聞熙退間爭啓請之不已熙領仰山仰山久廢之餘熙至衲子不厭枯淡從之者數百輩其堂廡朽敗不堪主事僧歷請充修造熙歷止不許一夜雷雨暴作方丈後壁忽崩塌熙移繩牀就侍者房而臥明晨命以草苫之有富人入山見熙坐草壁邊説法而禪者悠悠自若富人乃大異發意堅請新之仰山遂成精舍延祐六年秋仲手字別所知復作偈別衆而逝時侍僧有失常度語話聲高熙復張目正色曰敢以吾死而墮吾規耶擯逐之已而瞑目長往世壽八十二僧夏六十三熙四為住持以䇿發為急務然機不易施施必中節嘗以百丈野狐話問訴書記訴擬對熙喝之訴即悟旨又舉太原孚聞角悟道因緣示常道者曰盧生入滄海太史遊名山從此楊州城外路令嚴不許早開關常亦悟旨常號梅屋著佛祖通載行世又以西湖山水問倫上人倫曰通身無影像步步絶行蹤熙厲聲曰未在更道倫亦悟旨倫號仲方後住保寧熙晚年久不上堂四衆堅請之熙乃曰雲門道箇普字盡大地人不奈何殊不知雲門四稜著地當時若與震威一喝待此老惡發徐徐打箇問訊道莫怪觸忤好非但救取此老亦能振起雲門綱宗雖然口是禍門有數禪者座下省發而去笑隱欣禪師禪師大訴者字笑隱世籍江州為唐尚書陳操之裔後徙居南昌故為南昌陳氏也母蕭氏孕感異徵日者讖曰生子當為法中龍文中虎及娩地為震動父歿母盛年修淨業欣為童時見佛相好則戀慕如慈親年九歲得依水陸院伯父雲闍黎為大僧遍閲大藏經文欲扣明己躬願盡形壽以法為檀時一山萬禪師開化匡廬之開先寺訴竟走依之不發然訴常於此切萬指往百丈遂徹證於熙禪師拂下熙曰昔黃龍得旨泐潭領徒遊方及見慈明氣索汗下你道過在甚處訴對曰千年桃核裡覓甚舊時仁熙以為類己大然之熙遷杭之淨慈命欣分座訴以書記自任蓋欣博學廣知加之辨才轉變無方嘗題曹操讀圖其略曰陰八字非隱語德祖有智如滑稽豈是阿瞞不解此感愧上馬歸路迷一時名輩稱之又訪中峰本禪師於天目山坐語夜半風雨大作崖石欲裂左右皆辟易訴不少動中峰曰訴公慧定之力俱足他日必大可觀至大四年出住湖之烏回次住杭城報國又住中竺報國中竺俱經火之餘訴至任緣鼓舞大廈俱成僧徒相從者垂千輩首以竹篦子付之覺原曇而妙喜門風又一振矣天曆元年朝旨改金陵潛邸為大龍翔集慶寺以訴為開山第一代明年詔入奎章閣設高座闡揚大法出貂裘金衲賜之欣終不以示人然自奉儉薄衾衣常十數載不易也頻躬燒香浴以給衆身外之役不以勞人至於名教節義則感勵奮激不知有己明宗嘉其風範親書廣智菴額賜訴退居處至順二年疏謝歸林下不報又辭文宗敕臺臣慰欣安居龍翔終老兼命較訂百丈清規為緇門定式蓋百丈建立以來年代數百法久成斃諸方叢席各杜繩規俾律儀大典易式無聞欣以百丈舊文訂列條章若干門互換主賓令法久住書成進上敕諸叢林遵而一之於是天下緇流禮樂鏗鏘進止有節大智之風儼然在矣嗣後朝賜益隆梵侶益衆其禪席之盛自秀法雲以來未之有也會中龍象則有愚菴智及季潭宗泐清遠懷渭輩激揚旨要嘗問僧青州布衫重七斤古人道了也畢竟一歸何處僧曰東廊頭西廊下曰甚麼處見趙州僧擬對欣曰棒上不成龍又問竪拂拈椎古佛榜樣擎杈舞劍列祖條章衲僧下一句作麼生道僧珍重便行欣曰不消一劄又問釋迦彌勒文殊普賢從你腳下過去也僧顧左右欣喝之又問無位真人落在甚處僧便作禮欣曰從門入者不是家珍至正四年五月朔日退居廣智菴復與御史脫歡公話別凡熟知悉致辭柬命弟子以兩朝所賜資帛營萬佛閣俾羣生得所瞻仰從容書偈順寂焉閲世六十一坐夏四十六學士虞集為蒲室敘敘狀欣生平甚詳蓋欣之母精修淨業感地生白連欣移居報國時其母西往欣常愧慕陳尊宿編蒲以故志所居處皆曰蒲室四會語録外文集若干卷名蒲室集云贊曰語云天地無全功聖人無全能若仰山父子之為人庶其全矣熙公至歿猶教誡弟子整其家法欣公於歿前一日召宗泐輩孜孜以妙喜門庭為屬較二公之心而往返閻浮百千次尚未足其願也嗚呼大哉雪竇無印證禪師禪師名大證號無印鄱陽史氏子也年十四投昌國寺智節出家以所習試優等得度為大僧乃焚膏繼研窮祕典節喜資證遊方首謁荊溪琬禪師於廬山之圓通寺琬貌寒尋常鼻涕沾衣證易之欲發去復心計曰逢人草草安辨玄黃也因私入室求説祖師心訣琬換手槌胸大呌曰逼殺人證疑懼而退有宿衲思菴睿者以年邁寓國通間房晦養自怡林下雖知名不得而親之證幾欲就請莫得其便一日睿如廁歸證從後隨入睿曰是誰證曰欲求法耳睿大怒趂出便掩戶證大驚疑復乘間乞見睿睿曰佛法自有方丈汝到此討甚熱碗證曰大證初參不蒙方丈和尚指示但見其槌胸大呌而已睿曰頭上安頭證恍然涕泣禮謝曰吾師婆心一至此乎睿曰據子機智不宜滯此比來天童有雲外岫禪師提唱洞宗昨見新録巧譬傍引奔逸絶塵其綿密可觀子宜往事之蓋岫嗣直翁舉舉嗣東谷光光嗣華藏祚祚嗣淨慈暉暉乃弘智覺之子也證機投雲外岫公乃燈傳弘智七世焉岫公一日上堂罷厲聲呌曰天童今日大死去也你作麼生救證對曰請和尚喫飯又曰天童今日大死去也你不要相救又對曰作麼作麼又曰天童今日大死去也阿誰與我同行證又對曰和尚先行大證隨後岫公呵呵大笑而歿證乃備述岫公風度於中峰本和尚峰喜而贊曰太白峰為屏二十里松為座雲影外藏身幾多人蹉過不蹉過元是隰州古佛再來切忌機前説破於是諸方共稱岫公為弘智真傳也丞相脫歡公請證出世衢之南禪而次地遷錫六會説法然所居之室如傳舍惟入草求人不厭飢渴嘗曰我當時錯登圓通門入思菴室被渠哄到江浙七上八落至今沒箇合煞若有代山僧鼻孔出氣者山僧兩手分付雖然相逢沒量漢莫作假雞聲晚居雪竇示衆曰千説萬説不若覿面一見昨日二十九今朝七月一報你參玄人光陰如箭疾娘生兩隻眼箇箇黑如漆急急急回頭看取天真佛良久云是何面孔下座巡堂喫茶又曰妙不妙衲僧鼻孔無多竅玄不玄剎竿頭上無青天至士寧容袖手良馬豈待揮鞭全超棒喝不落蹄筌百鳥不來春又去巖房贏得日高眠證老年退居定水之圓明菴其示寂時春秋六十有五闍維有不壞者二曰牙齒曰數珠舍利明瑩門人景雲建窣堵於本菴贊曰洞室宗旨綿密弘智數傳之下弗克大鬯者何也蓋學者鹵莾艱於入彀耳至無印師資力揮魯戈頓返羲輪猗歟杰也若以臨末舍利明瑩而識其生平則負圓通老衲不勝言矣斷崖義禪師斷崖了義禪師者湖州德清湯氏子也六歲始言言即入理常隨其母誦法華經因牽母衣而問曰佛放眉間白毫相光照東方萬八千土靡不周遍母曾見麼母答曰佛放瑞光如優曇花時一遇耳又問曰因甚又道我見燈明佛本光瑞如此母良久撫其頂而嘆曰兒有慧根乎更宜廣見高明休自屈年十七聞舉高峯妙公警䇿語乃勃起曰此大善知識也我往從之其母甚喜竟造獅子巖謁妙公公愛其挺特俾提一歸何處話且授名曰從一妙公每呼從一一每應諾公曰牛過窗櫺頭角四蹄都過了因甚尾巴過不得一罔措自是一歸何處與牛過窗櫺話結成一片如礙鐵圍或間求示非拳則棒一又疑拳棒與本參豈相干耶偶過盂塘見松梢雪墜有省即舉似公曰不問南北與西東大地山河一片雪聲未已又被痛棒打退不覺隕身崖下同學捫蘿救之一乃誓限七日晝則樁立夜則攀樹臨崖露立達旦未及期大徹扣關大呼曰今日瞞我不得也公曰作麼曰大地山河一片雪太陽一照便無蹤自此不疑諸佛祖更無南北與西東妙公乃上堂曰我布漫天大網打鳳羅龍不曾遇得一蝦一蟹今日有箇蟭螟蟲撞入三十年後向孤峰頂揚聲大呌且道呌箇甚麼舉拂子云大地山河一片雪一便奪拂子云盡大地有一人發真歸源我悉知之公便下座於是舉揚料揀詞不少遜而從一行者之名大顯辭歸德清結茆武康居以事母名緇樂訪之又五載還天日妙公曰大有人道你拖泥帶水在對曰兩眼對兩眼妙公乃為剃落更從一名了義自號斷崖遂單瓢隻杖渡淮楊歷齊魯訪燕趙登五臺隨所至處辨論風生海內叢席為之大震中峰本公狀其生平曰撞漫天網解獅子鈴情亡義斷石裂崖崩奪龐老金珠高揮大抹將阿爺門戶竪柱橫撑這邊那邊了無羇絆問禪問道不近人情大地山河一片雪話頭流落至今行名剎爭起之不顧逮本雍二禪師相繼化去義始住天目正宗寺年已七十道風益峻衆未嘗登百輩半受諸方付囑者就正請益不敢生忽嘗示衆曰若要超凡入聖永脫塵勞直須去皮換骨絶後再蘇如寒灰發焰枯木重榮豈可作容易想我在老和尚處多年每被大棒打徹骨髓不曾有一念遠離心直至今日才觸著痛處不覺淚流豈是你歡喜踴躍咬著些子苦味便乃掉頭不顧殊不知苦味能除百病大凡功夫若到省力時如順水流舟只要梢公牢牢把柁才有絲毫異念生管取喪身失命若到純一處不可起一念精進心不可起一念懈怠心不可起一念求悟心不可起一念得失心才有念生即被一切邪魔入你心腑使你顛狂胡説亂道永作魔家眷屬佛也難救你戒之戒之元統元年除夕告衆曰有一件事天來大還委悉麼良久云明日是元朝越六日指法雲塔西空地曰更好立箇無縫塔歸與禪者談笑自若乃曰老僧明日天台去也侍者曰某甲相隨得麼曰騎馬趂不及次日跏趺而逝世壽七十二坐夏四十九奉遺命塔於所指之處賜號佛慧圓明正覺普度大師義初會葬中峰時笑謂衆曰過後十二年更為老僧一會及入滅時正符其讖贊曰棒頭覓落處何如撈月水中喝下越端倪卻似分膠膝裏師初扣關見高峯孤硬有上山推轂之難自後立地知此道平常有順水放舟之快想其為人烈丈夫也故其問道出家之迹頗與盧行者相若説法寫自心曲以真實誨人至今傳其語為禪關策要宜矣
