body:
  text: 道場辨禪師禪師諱明辨吉安州俞氏之子説法於郡之道場山以正堂自號據令端方毫不苟貸每緇素入山請法必令先具香設拜佛眼遠和尚然後受謁謁者悚然有問語默涉離微如何通不犯辨曰橫身三界外獨脫萬機前曰秖如風穴道長憶江南三月裡鷓鴣啼處百花香又作麼生辨曰説者箇不唧𠺕漢作麼曰嫩竹搖金風細細百花鋪地日遲遲曰你向甚麼處見風穴僧曰耳裡眼裡絶蕭灑曰料掉沒交涉又問如何是佛辨曰無柴燒猛火如何是法曰貧做富裝褁如何是僧曰賣扇老婆手遮日如何是一喝如金剛王寶劍曰古墓毒蛇頭帶角如何是一喝如踞地獅子曰虗空笑點頭如何是一喝如探竿影草曰石人拍手笑呵呵如何是一喝不作一喝用曰布袋裡豬頭如何是向上事曰鋸解稱錘如何是和尚栗棘蓬曰不答此話曰為甚麼不答辨大笑曰吞不進吐不出辨機要精悍每經旬掩室即近侍罕得見進然其章訓痛絶名根不把玩不暴用故及門皆三二十載韜神晦頴諸方有盛名者率聞而欽畏之暮年上堂云猛虎口邊拾得毒蛇頭上安排更不釘樁搖櫓回頭別有生涯婆子被我勘破了大悲院裡有村齋又上堂以杖左卓云三十二相無此相右卓云八十種好無此好僧繇一筆畫成志公露出草稿又卓杖顧衆曰莫懊惱直下承當休更討下座歸方丈跏趺而化火後得舍利塔於仙人山雪堂見辨達磨贊乃嘆曰當今滿目珠璣慰我白首獨有此耳其詞曰升元閣前懡㦬洛陽峯畔乖張皮髓傳成話隻履無處埋藏不是一番寒徹骨怎得梅花撲鼻香贊曰辨公初至少林覽立雪遺迹乃至隕涕及出世必指人知其得法源委昧者往往以世諦失之蓋擇乳在鵝王也當時佛眼門下作略逸羣獨於辨公俱嗟不及嗚呼熠熠赤幟皎皎白眉千秋節合其揆一也烏巨雪堂行禪師禪師名道行號雪堂處州人也其父葉公常遊禪社自稱見獨居士以積厚流光而生行行生而岐嶷壯克節儉絶笑俚愛博施葉公嘗謂行曰中無主不立外不正不行此語宜終身踐之聖賢事業備矣行茂年不樂與諸子伍乃依普照英禪師得度英有鑑裁舂汲樵㸑必使行董之行乘間參請不倦無所得辭英參佛眼因與高菴竹菴同得究竟法方是時佛果佛鑑人滿大江南北而佛眼下諸賢多馳化於浙水東西是以東山法道大闡於三佛高菴初在龍門時骨鯁寡交獨喜行盤桓不間嘗嘆曰稠人廣衆中鄙者多識者少鄙者易習識者難親果能自奮於其間如一敵萬庸鄙之習力盡真挺特沒量漢也行感佩其言如雪峯之事巖頭故終其身未嘗不舉高菴之為人行居薦福謂衆曰我佛眼老人住龍門時龍象滿席尚自潸然太息以為終愧老東山也今山僧復愧老人倍倍耳其流涕太息可勝道哉行雖寓名山去就如流雲聞妙喜之子博山本有賢操遂達郡守吳公以本住持薦福行遷烏巨為終焉計及門者有且菴仁退菴休晦菴光輩俱為懿範行老且病汪喬年王十朋來往問道行答不厭頻嘗謂十朋曰金堤千里潰於蟻壤白璧之美罹於瑕玷況無上妙道非特金堤白璧也而貪欲非特蟻壤瑕玷也要心之端謹行之精進守之堅確修之完美然後可以自利而利他也又示喬年曰識則識自本心見則見自本性識見本心本性正是宗門大病一日召喬年囑以後事沐浴更衣跏趺而寂闍維齒舌不壞五色舍利煙所至處人皆獲之塔於西寺贊曰濟下宗師如巨鹿鏖兵萬夫辟易壯矣行公去臨濟其世十三番為名葩秋月人人得而就之經云具足優婆夷得菩薩無盡福得藏解脫門能於小器中隨諸衆生種種欲樂出生種種美味珍奇悉令充足其行公之謂耶慈化普菴肅禪師普菴禪師名印肅政和乙未冬生於袁州宜春余姓肅生祥光燭天蓮生道周異香遠馥襁褓中即善世言夢異僧點其胸曰汝他日當自省去在即寤白母王氏視胸有赤點如含桃狀王氏恍悟初徵遂捨肅於壽隆寺師事沙門賢公賢嘗授以法華經肅曰諸佛玄旨貴悟於心數墨循行何益乎道賢大驚以大器期之遂遣行腳侶戒修謁牧菴忠於溈山度嶺望叢谷中有跨黃犢人近之則忠公所跨者虎也修擬避肅下腰包進前不審忠微笑以手西指令其前行將及寺門回望惟忠公䇿杖而來失虎所在二人具威儀請益於忠忠曰何遲乎望汝久矣肅進曰萬法歸一一歸何處忠以拂示之肅有省時年二十九矣歸壽隆袁州尹夢金甲人告曰普菴大士行道時至言訖天光五色尹驚異適劉長者亦感異徵捐資鼎建大伽藍袁尹俾物色於壽隆請肅主之號曰大慈化寺肅既居慈化楮衣糲食脅不沾席十有二年一日誦華嚴論至達本忘情知心體合通身汗流乃大聲示衆曰我今親契華嚴法界矣李公長者於此大經之首痛下一椎擊碎三千大千世界如湯消雪不留毫髮許於後進作得滯礙普菴一見不覺吞却五千四十八卷化成一氣充塞虗空方信釋迦老子出氣不得之句然後破一微塵出此華嚴大經遍含法界無理不收無法不貫便見摩耶夫人是我身彌勒樓臺是我體善財童子是甚茄子文殊普賢是我同參不動道場遍周法界悲涕歡喜踴躍無量大似死中得活如夢忽醒良久云不可説不可説又不可説即説偈曰揑不成團擘不開何須南嶽又天台六根門首無人用惹得胡僧特地來復謂心齋圓通二子曰達本情忘知心體合汝作麼生會二人各以頌呈肅不諾乃引聲長吟以示之曰先天先地何名何樣阿曼陀無物比況觸目菩提自是人不肯承當且輪回滯名著相圓融法界無思無想廬陵米不用商量血脈才通便知道擊木無聲打虗空盡成金響又曰柏庭立雪一場敗缺了無為當下休歇百匝千圍但只者孤圓心月不揩磨鎮常皎潔無餘無欠無聽無説韶陽老只得一橛十聖三賢聞舉著魂消膽裂惟普菴逈然寂滅俄有異僧名稱道存雪而來肅大喜互相徵詰棒喝交馳心心密契存合爪嘆曰師再來人也大興吾道非師而誰乃指雪書頌而別於是肅大唱佛眼宗旨蓋其師牧菴忠觀水磨發明心要於佛眼拂下後嘗以白木劍迫死心禪師死心引頸而笑忠作舞而出故馮濟川曰佛眼磨頭悟法輪之常轉死心室內容慧劍以相揮忠出入江湖人莫測之宣和間湘潭大旱禱雨不應忠躍入龍淵呼曰業畜當雨一尺雨隨至時以佛僧目忠肅既見忠後亦以神異利濟含靈藏汙耐垢不知有己演釋談章呪旋天地轉陰陽世盛傳之布於弦譜而弭災焉至其異迹不可勝紀有問曰師修何行業而得此三昧肅當空一畫云會麼曰不會肅曰止止不須説歸宗賢禪師曰慈化乃吾黨黃鍾也惜哉時流獨傳其迹耳肅道滿異義學竊疑其宗趣莫詳肅憫而説偈曰蒼天蒼天悟無生法談不説禪開兩片皮括地該天如何是佛十萬八千一日書偈方丈西壁云乍雨乍晴寶象明東西南北亂雲深失珠無限人遭劫幻應權機為汝清乃結跏趺坐令侍者鳴鐘衆集瞑目而逝時乾道己丑年七月二十一也贊曰荻葦之間病鳥棲焉六合之外曲士藐焉故肅公現三頭六臂而傳持祖道其心良苦矣悠悠者獨以神通見推則公之大慈悲願足乎否邪天竺堂仁禪師禪師名守仁號堂洛陽人也少持重寬夷好學初依東京奉先沙門宣和間試經於慶基殿得度往來三藏譯經所諦窮經論每遊刃膠結之隊恢有餘地故互稱曰酥酪仁焉於宗門語句則曰按黑豆法也何足為奇然疑周金剛蜀之杰士胡得䖃苴之甚耶當是時佛果勤公居天寧天寧參頭則有宗杲端裕曇玩等擇木寮則有樞密徐俯侍郎李彌達輩禪風大盛仁益疑乃攝衣探之值挂牌入室仁默自計曰若有所長則得倘違吾教乘自當別有議論在佛果知仁在側乃召仁問曰依經解義三世佛冤離經一字即同魔説你還湊泊得麼仁擬引對佛果以鐵如意迅擊之因墜一齒仁以手抹血大悟因太息曰一人發真歸源十方世界悉同消殞以為一時表法之詮安知實有此等境界至於清淨本然云何忽生山河大地不是其人大難承當繇是師資契合住後每瞋學者滯於奇妙言句獨以毒棒出沒江湖著其聲嘗易服過武林訪圓覺講主值其升堂勾引經文反覆浩浩仁從傍失笑講主下座請仁曰上座高隱何處仁曰長行粥飯僧安有定處曰適來上座致笑非我説與經有違乎仁曰違雖未違合則未合曰上座能明此義否仁曰明則不明背却不背講主即請仁升座剖判仁即躡履而登舉經中道居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實以手空指曰會麼庭前栽萵苣萵苣生火筯火筯生蓮花蓮花結木瓜木瓜才劈破撒出白油麻參講主徹見圓覺宗旨不從人得即散席南行仁為人不務名不苛察輪蹄輳集罕見其面衲子至不時進謁然機要險絶旦過堂無宿客淳熙甲午召入內廷上問曰朕嘗披法典襄州龐蘊奇士也問馬祖不與萬法為侶是甚麼人祖云待汝一口吸盡西江水即向汝道蘊於言下領會爾師圓悟頌云一口吸盡西江栗棘𡎺殺老龐當陽若也吞得管取海內無雙禪師可中更出手眼剖朕夙衷仁對曰稱錘搦出油間言長語休腰纏十萬貫騎鶴上楊州上大悅癸亥丹書復至仁集衆説法畢即法座而逝贊曰寶覺云一塵飛而翳天一芥墮而覆地安樂處切忌許多骨董直須死却無量劫偷心乃可耳蓋仁公以經論鳴世偷心正熾及遇本色作家一擊而絶骨董即家珍也忌云乎哉但其前後垂機所謂浪子憐鄉客杯翁愛醉人者非也瞎堂遠禪師瞎堂禪師者名慧遠生眉山之彭氏為圓悟禪師之晚子也圓悟復領昭覺時年老乃以化柄屬之門賢其門賢已播海內矣以故摩竭之令復行於昭覺而遠新從靈崖來靈崖為徽禪師所居得起鐵拂為首座敲唱黃龍宗旨遠事之二載於徽言下得其概焉然起首座屢誘掖之遠無留意乃抵昭覺侯十日始得通謁於悟公公與語大奇之嘆曰吾道未衰也許遠得非時入室遠每大跪請益公但笑曰將謂吾老矣故如此著急耶遠屏氣自失不敢進言一日聞舉龐居士不與萬法為侶因緣大徹其旨越衆進問曰淨裸裸空無一物赤骨立貧無一錢戶破家殘乞師賑濟公曰七珍八寶一時拏曰賊不入謹家之門公曰機不離位墮在毒海遠便喝公以拄杖擊禪床曰喫得棒也未遠又喝公連喝兩喝遠作禮趨而去自此機發莫禦叢林共加其號為鐵舌遠遂與元布袋輩齊名紹興間嵋守請居象耳山不赴未幾圓悟順世遠勃然起曰芳躅云亡繼之者誰高臥北窗顧可得耶扁舟出峽抵淮南開化龍蟠遷琅琊繇琅琊遷普濟繇普濟遷定業繇定業遷光孝歷十八載名輩歸之僧問即心即佛時如何遠曰頂分丫角非心非佛時如何曰耳墮金環不是心不是佛不是物又作麼生曰禿頂修羅舞柘枝又問浩浩塵中如何辨主遠曰木杓頭邊鐮切菜莫便是和尚為人處也無曰研槌撩餺飥又問不與萬法為侶是甚麼人遠曰腳踏轆轤曰菴裡人為甚不知菴外事遠曰拄杖橫挑鐵蒺藜又問昔有一秀才作無鬼論論成鬼叱曰爭奈我何意作麼生遠以手斫額曰何似生曰祇如五祖以手作鵓鳩嘴曰谷孤孤又且如何遠曰自領出去曰東山水上行明甚意旨遠曰初三十一不用擇日曰十二時中如何用心遠曰蘸雪喫冬瓜其機海無涯約多類此又過南嶽寓南臺是時璉禪師住龍王與方廣行公皆月菴高弟道著湖湘私相語曰此間壁立萬仞遠來何所措足乎故請升座設三十餘問皆從上誵訛險節關棙遠畢酬之辭旨超倫璉等屈服欲以名剎居遠遠不顧東隱天台來往國清護國鴻福三寺乾道丁亥平江守以虎丘迎遠又奉旨歷崇光靈隱二處孝廟常召見咨詢法要加號佛海禪師名儒日繞座下以居士身而嗣法者則有內翰曾開知府葛郯郯號信齋聞遠發揮即心即佛之案有省而呈頌曰非心非佛亦非物五鳳樓前山突兀艷陽影裡倒翻身野狐跳入金毛窟遠曰公見處只可入佛難入魔在郯愕曰何也遠曰何不道金毛跳入野狐窟郯乃領旨曾開字天遊久升圓悟大慧之堂聞風來訪故問曰如何是善知識遠曰露柱燈籠貓兒狗子曰為甚贊即歡喜毀即煩惱遠曰侍郎曾見善知識否開變色曰三十年參方何言不見曰向煩惱處見向歡喜處見開擬議遠喝之開復擬進語遠搖手曰開口底不是開愧汗透重襟遠召曰侍郎向甚處去也開猛省踴躍説偈曰咄哉瞎驢叢林妖孽震地一聲天機漏泄有人更問意如何拈起拂子劈口截遠笑曰也秖得一橛妙喜在嶺南因閲遠語録大駭曰老師暮年有子如是耶遂以圓悟所付法衣寄贈之於是江湖以為遠公見超妙喜云一日忽示衆曰淳熙二年閏季秋九月旦閙處莫出頭冷處著眼看明暗不相干彼此分一半一總作貴人教誰賣柴炭向你道不可毀不可贊體若虗空沒涯岸相喚相呼歸去來上元定是正月半時都下喧傳頗疑之遂達上聽至期無疾升座如常然士庶競集上亦密遣中使伺起居遠命侍者並赴堂及齋畢寢室窅然白氣氤氳侍者入帷見猿行者手捧卷莊立榻前遠已化矣急取行者手卷視之乃辭世偈也偈曰拗折稱錘掀翻露布突出機先鴉飛不度四衆殷留十日受朝廷最後之供其顏不少異也年七十四坐五十九夏遠公素蓄一黑猿馴知人意名曰猿行者亦悠然脫去其小師道濟及緇素奉遠公塔於寺之烏峯亦葬猿行者於其側焉贊曰姬氏曰貞勝者也余考佛海提唱如赤帝子斷蛇而神姥夜號其出沒縱橫與五祖演公類也此妙喜寧不望風而駭焉湖隱濟顛書記書記禪師出浙東天台李氏貴族名道濟母夢吞日而孕娩時紅光燭室國清本禪師以為法中之寶摩頂而讖之濟年十八走靈隱見瞎堂遠公遠即為濟斬髮未逾年神悟絶倫遠為印可然濟性狂簡出入僧堂每大言忤衆衆以濟犯規白遠遠曰禪門廣大豈不容一顛僧耶自後常出冷泉亭與少年撲跤或狂歌酒肆或去呼猿洞引猿同翻斤斗或擕葷酒污看經處主事復白遠遠惟以顛僧保護之是以呼為濟顛云遠公歿濟之顛酒愈甚寺不容住遂挂搭淨慈淨慈德輝長老奇濟行履以書記延之然終不能忍酒淨慈之衆亦短濟於輝前輝之曲護亦如瞎堂書記常私遊十六聽朝官之門毛陳二太尉日以香醪饋之人不敢非書記醉則賦詩千百言言超意表識者尚之一晚醉臥十里松寺主令人扶歸憨睡厨下初夜分忽起繞廊狂呼火發衆以為顛中夜羅漢堂琉璃火延幡腳寺輝公乃留偈承光化去書記遂請嵩少林主方丈嵩之賢書記亦如輝公書記則曲設靈機而夢感朝廷不二載萬礎千楹頓還舊觀又以兩廊影壁未就欲達臨安新任王安撫而成之嵩止曰不可我聞王公微時常投齋僧寺業被寺僧所賣王公怒題寺壁曰遇客頭如鱉逢齋項似鵝今凡見僧皆恨汝干之可得耶衆亦阻之書記笑而唯徑投府前值王公升堂書記則探頭引望王公大怒令陰執擬笞之書記曰吾乃淨慈書記濟顛僧也有段因緣惟閣下能省特來計較耳公亦微聞濟顛詩酒之名意稍解書記遂以王公昔年題壁事造妙語諷之王公大笑留濟公宿內衙濟公徐以影壁意扣之王公遂捐鈔三千貫以懺前非濟公之演化無礙約類如此至若釋結弭災遊戲三昧異迹饒剩不勝述也一日入城訪舊與張提點飲酒賦詩歸便臥疾嵩下安樂堂問公公撫榻謝曰慚愧乃請嵩為沈萬法披剃萬法為人誠重事公有年公隨命萬法報諸詩酒故檀即沐浴跏趺書偈瞑目而逝太尉朝官俱赴淨慈諸山宿德畢集會送者千萬人至虎跑寺前茶毗獲無數舍利回至淨慈寺前有二行腳僧謁嵩曰某甲適從六和塔過遇濟公寄書一緘僧鞋一雙嵩大驚曰濟公終時我以此鞋易其敝屣對衆啓緘其辭懇切計二百零九言紙餘又附頌曰看不著錯認笊籬是木杓昨夜三更月正西麒麟撼斷黃金索幼年曾到鴈門關老少分明醉眼看憶昔面前當一箭至今猶是骨毛寒只因面目無人識又往天台走一番又旬餘有錢塘差使過天台山下會濟公復寄來詩二首又後五十年有范村人送木料於淨慈言近屬濟公所化贊曰濟公徹樞旨於瞎堂言下遂以格外玄機混俗同塵或嘲風弄月發明佛祖心宗時不怪以顛僧目之幸也及示化天下始同稱公為不可測人豈非末後實效光明之被於萬物也博矣於戲鑑公生平若非賢聖應世求不巧盡拙生亦不可得也
