body:
  text: 虎丘隆禪師禪師和之含山人也名紹隆機投佛果勤禪師出世開聖次遷彰教果還移居虎丘時佛果門賢雖有妙喜輩尚菴居楚吳衲子惟趨虎丘故虎丘法筵之盛無異佛果之住蔣山也師凡見學流必以湛堂死心諸宗匠而龜鏡之蓋師初為大僧輒知有於長蘆信公言下因慕佛果老人造夾山而道繇寶峯見器於湛堂又過黃龍抗機於死心抵夾山適佛果移道林師從其行佛果問曰見見之時見非是見見猶離見見不能及竪拳云見麼對曰見曰頭上安頭師脫然契證佛果復召曰見箇甚麼師曰竹密不妨流水過佛果深肯之於是二十載侍從於果而隆睡虎之名飫驚叢社矣宣和間辭歸省親因住褒禪山靖康改元領開聖為建炎之擾退隱銅峯尚書李公光起師居彰教間有老宿聞而笑曰瞌睡虎今插翅矣紹興癸丑遷平江之虎丘虎丘為南國衣冠之藪懷香請益外掀禪床喝大衆之輩騰騰不絶僧問為國開堂一句作麼生道師曰一願皇帝萬壽二願重臣千秋曰秖如生佛未興時一著落在甚麼處師曰吾常於此切曰官不容針更借一問時如何師曰據虎頭收虎尾曰中間事作麼生師曰草繩自縛漢曰毗婆尸佛早留心直至如今不得妙師曰幾行巖下路少見白頭人問九旬禁足意旨如何師曰理長即就曰秖如六根不具底人還禁得也無師曰穿過鼻孔曰學人小出大遇師曰降將不斬曰恁麼則和尚放某甲逐便也師曰停囚長智問如何是大道真源師曰和泥合水曰便恁麼去時如何師曰截斷草鞋跟問古人到者裏因甚麼不肯住師曰老僧也恁麼曰忽然一刀兩段時如何師曰平地神仙問如何是截鐵之言師曰滿口含霜曰何必如此師曰闍黎又作麼生曰痛領一問師曰也須吐卻諸方以師之機類於五祖其上堂曰凡有展托盡落今時不展不托墮坑落塹直饒風吹不入水灑不著簡點將來自救不了豈不見道直似寒潭月影靜夜鐘聲隨扣擊以無虧觸波瀾而不散猶是生死岸頭事拈拄杖一劃云劃斷古人多年葛藤點頭石不覺拊掌大笑且道笑箇甚麼腦後見腮莫與往來又曰目前無法萬象森然意在目前突出難辨不是目前法觸處逢渠非耳目之所到不離見聞覺知雖然如是也須踏著它向上關棙子始得所以道羅籠不肯住呼喚不回頭佛祖不安排至今無處所如是則不勞斂念樓閣門開寸步不移百城俱到還委悉麼路逢死蛇莫打殺無底籃子盛將歸諸方又以師語類於白雲白雲端和尚嘗立祖堂昭享先澤師追繹其事圖其像而安奉之故有語曰天子之廟九諸候之廟七況金輪世譜寧甘草草飲水遽昧其源於義安乎於是叢林咸遵行焉師前後據室嚴展化儀不以獅乳暴迸非器所以得法於師者氣宇如王丙辰五月佛果訃始至師乃白衆曰當以第一座宗達承虎丘院事復索筆書最後法語儼然化去壽六十坐四十五夏塔於本山有門人應菴華禪師應菴華禪師應菴禪師諱曇華北宋徽宗崇寧癸未生於楚黃江氏神彩炳異識度持重年十七具決定志津濟羣品棄家得道於虎丘隆公隆先妙喜受印於佛果佛果嗣法東山演禪師而應菴為東山之四世也當時推二甘露門謂楚西有應菴浙東有妙喜妙喜謫梅楊有傳應菴法語至者妙喜譽不容口以偈柬曰坐斷金輪第一峯千妖百怪盡潛蹤年來又得真消息報道楊岐一脉通應菴之語曰九年面壁壞卻東土兒孫隻履西歸鈍置黃面老子以拄杖畫一畫云石牛橫古路一馬生三寅又曰十五日以前水長船高十五日以後泥多佛大東海鯉魚打一棒雨似盆傾直得三千大千世界一切衆生悉皆歡喜謂言打者一棒不妨應時應節山僧不覺通身踴躍遂作詩一首舉似大衆蜻蜓許是好蜻蜓飛來飛去不曾停被我捉來摘却兩邊翼恰是一枚大鐵釘又曰飯籮邊漆桶裏相唾饒你潑水相罵饒你接嘴黃河三十年一度清蟠桃五百歲一次開花鶴勒那咬定牙關朱頂王呵呵大笑歸宗五十年前有一則公案今日舉似諸人且道是甚麼公案王節級失卻帖又曰參禪人切忌錯用心悟明見性是錯用心成佛作祖是錯用心看經看教是錯用心行住坐臥是錯用心喫粥喫飯是錯用心屙屎送尿是錯用心一動一靜一往一來是錯用心更有一種錯用心歸宗不堪與諸人說破何故一字入公門九牛車不出其前後語要約類如此僧問秖者是埋沒自己秖者不是孤負先聖去此二途和泥合水處請師速道曰玉筯撑虎口僧曰一言金石談來易萬事鴻毛脫去輕曰莫謾老僧好侍郎季浩擬達所畜應菴驟起揕其胸曰死後向甚處去浩噤不能發應菴叱退之浩不旬日徹見臨濟宗旨其妙密鉗鎚又類如此故一時無表裏貴賤耆艾飽參經其爐韛無不汗下心死隆興改元五月虎丘忌晨應菴拈香曰平生沒興撞著無意智老和尚做盡伎倆凑泊不得從此卸卻干戈隨分著衣喫飯二十年來坐曲彔牀縣羊頭賣狗肉知它有甚憑據一年一度燒香日千古令人恨轉深已而以叢林囑纍教授嚴康朝以滹沱正宗分付密菴咸杰次月將告寂猶挂牌入室或以偈請應菴呵曰吾長笑諸方所為而自蹈之耶區分院事洪纖不遺趺坐遷化世齡六十一僧夏四十三塔於玲瓏巖之外岡未踰月妙喜亦遷化初應菴道既通聞此菴元布袋住連雲深山廣澤衲子難近徒步訪之故為分座而連雲之風立震已而主明果則雪堂每過盤桓永夜間有竊議者雪堂叱之應菴凡八歷名剎兩住歸宗始明果終天童其居天童時妙喜亦生還住育王焉贊曰臨濟宗枝若無首山幾到大風吹止虎丘命脉一有應菴家聲始不寂寥如珠中如意花裏優曇色色改觀但圓悟為一睡虎發其千片之弩豈有鼷鼠怏怏負其所望哉大慧杲禪師禪師宗杲者字曇晦別號妙喜大鑑十五世圓悟勤公之嗣也妙喜出宣州寧國奚氏年十三就鄉校不旬而棄之親奇其志乃許衣緇成大僧遍探諸家語録於雲門睦州尤篤意焉竟有五家淺深門庭之疑遂請益於廣教珵公珵示其節目妙喜輒領意珵私嘆曰杲乃再來人也妙喜又棄之遂至真如哲座下入慶藏主賢蓬頭之室因之過黃龍謁晦堂跨東林參昭覺俱雅珍愛妙喜又棄之往見心印詢詢與語連三日大奇之欲留不可因指見湛堂準公於寶峯機辨縱橫準漠然不諾妙喜始伏膺事之及準疾革妙喜惶啓曰某向後當見何人準曰有箇勤巴子當能了子事準歿乃繭足千里請塔銘於張公無盡無盡時為禪室領袖契之囑妙喜必見川勤老也會東京天寧席虗詔起蔣山勤禪師為住持妙喜心慶曰此天賜我也其禪若不異諸方妄相許可我則造無禪論去也遂入勤公之室聞公拈提朞年不敢犯其機一日公舉東山水上行公案以示衆妙喜躍然急呈所得於公公曰未未懸崖撒手自肯承當絶後再蘇欺君不得令居擇木寮為不釐務侍者日同士大夫入室公每舉有句無句如藤倚樹話妙喜擬對公輒禁之乃至握箸忘食公笑曰者漢卻參黃楊木禪也妙喜益茫然無措乃堅請公在五祖時問答公良久曰我問有句無句如藤倚樹先師但向我道描也描不成畫也畫不就又問樹倒藤枯句歸何處先師則云相隨來也妙喜豁然大徹連呼曰我會也於是隨聲酬對勢如湧泉公拊掌稱善舉以首衆宿衲皆下之士紳爭相從遊丞相呂公舜徒尤悅之奏賜紫衣號佛日禪師是時已有詔移勤公住雲居賜號圓悟圓悟又以妙喜首雲居之衆其秉拂小參萬指軒騰昭覺元禪師出問曰眉間挂劍時如何妙喜曰血濺梵天圓悟於座下以手約曰問得極好答得更奇於是海衆爭頌老東山之再見也圓悟還蜀妙喜始菴居古雲門遷湖南轉江右入八閩又結菴洋嶼僧曇懿者久依圓悟自謂不疑紹興初出住祥雲法席頗盛妙喜知其所見未實致書令來懿故不起妙喜鳴鼓痛斥榜告四衆懿乃破夏來洋嶼妙喜鞫其所證大笑曰汝恁麼見解敢嗣我圓悟老人耶懿傀汗浹背即退院求侍於妙喜入室次妙喜曰我要箇不會禪的做國師懿對曰我做得國師去也妙喜喝出復召曰闍黎香嚴悟處不在擊竹邊俱胝得處不在指頭上懿失聲橫趨而去妙喜笑曰懿闍黎此回堪住院子也又僧彌光字晦菴流譽諸方趨風來見妙喜命坐而商略光一一具對妙喜曰雖有落處只是不著所在今諸方浩浩說禪者見解秖如此何益也其楊岐正傳三四人而已語訖呵呵大笑光慍而起去妙喜即撾鼓入室光顰額而至妙喜曰喫粥了也洗鉢盂了也去卻藥忌道將一句來光遽對曰裂破妙喜震威喝曰汝又說禪也光乃得旨遂以書招其友鼎需曰洋嶼菴主手段與諸方別需乾笑而已需字懶菴乃閩人幼登進士絶婚為比丘一錫湖湘遍參名宿以為法無異味歸隱羌峯絶頂久不下山佛心才禪師已挽出首衆於大乘需嘗以即心即佛問學者毅然無可意光強速其至會入室鼓鳴需隨喜焉妙喜以拂指曰即心即佛作麼生速道需從傍下語妙喜詬之曰汝見解如此敢妄為人師耶即普說訐其生平珍重得力處排為邪解需涕泪交頤不敢仰視乃歸心決擇一日垂問內不放出外不放入正恁麼時如何需擬對妙喜連擊之需釋然厲聲曰和尚已多了也曰今日方知吾不汝欺妙喜之精猛開發約多類此時及門者五十三輩期未半得法者十三人丞相張公浚在蜀時圓悟為言杲真得吾宗之髓張公還朝遂以杲補徑山徑山之席常隨二千餘輩方來無地以容乃搆千僧閣安之侍郎張子韶狀元汪聖錫少卿馮濟用悉預其列當是時秦檜居權司諫詹大方阿之曰鼓唱浮言謗訕朝政張九成為之首徑山僧宗杲和之乃坐編置九成毀衣焚牒竄妙喜於衡陽起遣日而惻聲載道識者曰日月無私成其明聖賢無擇成其大豈杲公之化應南故天假之以示現於衡陽者耶且法門正氣表燭千秋又以羣願所係公必壽還何憂哉凡十載徙梅楊雖瘴癘之鄉而妙喜竪拂不倦緇素騰騰仍光風霽日也又五載有旨賜還復僧衣四方虗席迎之皆不就最后有旨強起主育王築塗田數百頃以繼衆食賜其莊名般若又二年改移徑山徑山益盛雖龍象互相蹴踏而上堂每贊猶子應菴深得先人機用於是天下益稱其公妙喜臘高屢求退居明月堂告謝方來莫可禁止先是孝宗居藩時遣內監至徑山見妙喜獻以偈孝宗大悅及在建邸復遣近侍請上堂親書妙喜菴額并贊真製賜之及即位又錫法號大慧禪師洎召對妙喜已示疾一夕忽大星隕地流光四散鳥獸皆鳴遂乃告寂於明月堂親封遺疏侍僧請留偈妙喜厲聲曰無偈便死不得也乃大書曰生也只恁麼死也只恁麼有偈與無偈是甚麼熱大擲筆長往時隆興改元八月十日也世壽七十五坐夏五十八上覽遺語悽然製詞奠曰生滅不滅常住不住圓覺空明隨物現見詔以明月堂為妙喜菴全身瘞於菴後諡曰普覺塔曰普光入其全録八十卷於大藏焉贊曰端祖云悟了須是遇人始得余虗度林間數十載每耳目所有諸道者莫不據高廣座自稱曹溪正脉少室真傳但惜未遇大慧老人耳若遇自當別有壺天而端祖之言豈謬哉嗚呼馬逢伯樂薪遇中郎吾宗之大幸也與徑山大禪明禪師禪師了明者不知何許入長身大腹所至驚衆衆皆稱之曰大禪大禪機鋒敏疾儀度豪朗為妙喜杲禪師會中之龍象當妙喜住育王時室中不許下喝大禪每入室必振聲一喝而退妙喜榜示曰下喝者罰錢一貫大禪乃密袖千錢先頓於地高聲連喝而出妙喜曰奈者漢何再榜曰下喝者罰當日堂供一中大禪即往言庫司和尚要金十兩主事者不疑與之隨袖以入復頓於地高聲一喝妙喜大駭徐問知之為之一笑一日妙喜謂大禪曰你者肥漢如是會禪驢年未夢見在大禪曰靈山授記何異今日妙喜乃以德山托鉢因緣徵其節目大禪對曰凜凜吹毛照膽寒不容擬議豈容傳擡眸已是身三段此是吾家紅鐵團妙喜嘆曰此話它日大行去在於是出赴投子叢席改觀次遷長蘆百廢俱修嘗過徑山省妙喜妙喜送以偈曰人言棒頭出孝子我道憐兒不覺醜長蘆長老恁麼來妙喜空費一張口從教四海妄流傳野干能作獅子吼孰云無物贈伊行喝下鐵團顛倒走大禪既主長蘆頗著異跡雖萬指周旋而檀施如山故時以布袋和尚擬之晚年繼席徑山室中惟以臺山婆子話驗學者遁菴以偈嘲曰一按牛喫草一與賊過梯早知燈是火飯熟已多時大禪答曰干戈中有太平基不用干戈始得之若無舉鼎山力千里烏騅不易騎徑山當妙喜遷化之後其法政大禪為之再新然歲計浩大知事以將來不給為諫大禪獨以龍天常住慰之楊和王夢一異僧長大皤髯坦腹緩行言欲化蘇州一莊王異之次旦大禪杖履而至閽人不能止急啓王王立見大禪奇偉與夢合乃炷香設禮大禪首言大王莊田至廣可施蘇州一所以供佛僧無窮之利也王未可否大禪齊畢便出無他語是時內外訇傳和王以蘇州莊田施徑山大禪布袋和尚王入朝孝宗聞王捨業為王助喜王謝歸遣使至徑山請大禪而大禪前二日無疾別衆示化矣自是和王宴居寤寐或少交睫即見大禪在前語曰六度之大施度為先善始善終則為究竟王嗟慕即以莊𨽻徑山此莊歲計十萬舟庫皆備乃大禪之遺光也初妙喜謫梅州防送甚嚴或為禍在不測大禪挺力荷枷從行而師資儀禮旦夕益慎至貶所衲子追隨者率二三百輩妙喜以齊用不給復慮生議嘗勉之令去大禪曰不可衲子所抱者道也所履者義也況重繭千里咨決為事縱拮据辛勞風波不定聽之龍天安忍棄之遂身任齊粥每日肩栲栳行乞至晚則數十人為之荷饙成列而歸衲子雖多無不具足如是十六年似一日顧妙喜法嗣之盛在貶所接者居其半大禪明之力也贊曰禪師明公於盤錯之際執禮凜若氷霜可法也及讀其生平語句如神鋒出匣截鐵如泥稽其行事順逆普應靈異疊出一時疑為慈氏下生抑何神也經云譬如心王寶隨心現衆色衆生心淨故得見清淨剎信哉育王裕禪師禪師名端裕會稽人吳越錢王之裔也年十四驅烏於境之大善寺目光外射有異量每聞燈籠露柱佛殿山門之語則罔然行腳經宿淨慈有僧擊露柱云如何不說禪裕有省謁諸名宿皆以特邁見推裕終歉然別見佛果勤和尚於鍾阜勤每瞬目顧之裕不領一日勤問曰誰知正法眼藏向瞎驢邊滅却即今是滅不滅裕對曰和尚合取口好曰此猶未出常情在裕擬進語勤擊之裕頓去所滯自此當機敏絶會朝廷加勤圓悟師號主天寧裕以毫彩典記室價傾一時初出住丹霞衆盈千輩每挂牌入室罕有搆機者裕垂涕長嘆不已衆俱憤發自新及遷虎丘雙徑成大器者數十人嘗示衆曰德山入門便棒多向皮袋裏埋踪臨濟入門便喝總是聲塵中出沒若是英靈衲子直須足下風生超越古今塗轍卓拄杖喝云秖者箇何似生若喚作棒喝瞌睡未醒不喚作棒喝未識德山臨濟畢竟如何復卓拄杖喝云總不得動著又曰動則影現覺則氷生直饒不動不覺猶是秦時𨍏轢鑽到者裏便須千差密照萬戶俱開毫端撥轉機輪命脉不沉毒海有時覺如湛水有時動若星飛有時動覺俱忘有時照用自在且道正恁麼時是動是覺是照是用還有區分得出麼鐵牛橫古路觸著骨毛寒又曰行時絶行跡說時無說踪行說若到則朵生招箭行說未到則神鋒劃斷就使說無滲漏行不迷方猶滯殼漏在若是大鵬金翅奮迅百千由旬十影神駒馳驟四方八極不取次啖不隨處埋身且總不依倚還有履踐分也無剎剎塵塵是要津又曰盡大地是沙門眼遍十方是自己光為甚東弗於逮打鼓西瞿耶尼不聞南閻浮提點燈北單越暗坐直饒向箇裡道得十全猶是光影活計摵拂子云百雜碎了也作麼生是出身一路擲拂云參紹興庚午十月示微疾尤示衆諄切異往時衆多涕下門人法全請垂遺訓裕振色曰盡此心意以道相資語訖而逝茶毗目睛齒舌不壞其地發光終夕得舍利者無計踰月不絶弟子分塔於鄮峯西華兩處有黃冠羅肇常頻經問道於裕適遠歸獨無所獲慕念誠切方與客食咀嚼間若有物吐哺則舍利大如菽色如琥珀遂再拜於茶毗所聞香奩有聲函開所獲如前而差紅潤裕凡十歷名剎賜號佛智禪師終於育王諡曰大悟道場全禪師法全禪師者姑蘇人也姓陳氏號無菴早歲父擕見東齊川和尚川熟視曰若能從我乎全欣然膝地請名其父奇之遂捨斷髮及遊方所至正大人不易就依佛智於虎丘每入室智以狗子無佛性話問之全結舌但見棒如雨喝如雷益迷悶不知所以頻背衆求示佛智叱之一日聞僧舉五祖頌云趙州露刃劍忽驚汗下趨呈智曰鼓吹轟轟袒半肩龍樓香噴益州船有時赤腳弄明月踏破五湖波底天智乃肯之然全所抱慎重人莫知者及佛智補靈隱以全首衆林下知名或以大剎請全主持不應每蹙額嘆曰古斷臂以求安心今賣身以要續祀吾道殆哉明矣久之佛智以年邁歸西華舊隱全始說法安吉道場乃拈拄杖云汝諸人箇箇頂天立地肩橫楖栗到處行腳勘驗諸方更來者裡覓箇甚麼才輕輕拶著便道天台普請南嶽游山我且問汝還曾收得大食國寶刀麼切忌口銜羊角又曰欲得現前莫存順逆以杖橫案云三祖大師變作馬面夜叉遊遍四大部洲却來山僧手裡呈身元來只是一條黑漆拄杖還見麼直饒見得入地獄如箭射乾道己丑秋有疾醫至全乃讓之曰為一幻軀求良醫覓隹穴是可忍乎竟爾告寂衆泣求偈語全大書無無二字棄筆而化火浴設利五色塔於金斗峯初全居靈隱首座時有權道者久參無證請益於全全以無住本建一切法徵之權有省乃私笑曰暗裡穿針耳中出氣遂定師資焉華藏權禪師禪師名有權臨安祁氏子也號伊菴雖機契無菴全首座而權益自砥礪常兀坐如木石因過堂忘展鉢鄰僧以手觸之有偈曰黑漆崑崙把釣竿古帆高挂下驚湍蘆花影裡弄明月引得盲龜上釣船佛智大稱賞之乃召權問曰心包大虗量廓沙界時如何權對曰大海不宿死尸智拊其座曰此子他日當據此訶佛罵祖去在於是諸山請權出世不就以竿木隨身遊戲湖江來往應菴妙喜之庭會全公歿華藏虗席物色求權權仍却之或曰無菴老人法道寧不在公乎公今拘小節樂林泉即潔如巢由信如尾己何足貴也權感起就之次遷萬年諸剎常隨萬指肅如公府日與衆均其勞逸或曰住持安坐演法何自苦耶權曰法末憍慢未得謂得借位自恣身帥之且不從敢自逸乎淳熙庚子秋示寂茶毗齒舌不壞舍利無數塔於橫山又分諸不壞塔萬年山寺權為人剩剛毅法不容私有貴人入寺施財衣冠不整權終不受又僧充化主歸納厚疏頗有矜色權叱還之故門下不易出入俱以氣節自化權暮年法令森嚴益甚有語曰今朝結却布袋口明眼衲僧莫亂走心行滅處解翻身噴嚏也成獅子吼栴檀林任馳驟剔起眉毛頂上生剜肉成瘡露家醜贊曰佛智三代以穩實起家當時禪風為之一轉觀其前後垂跡如蟲書鳥篆體勢雖殊諦理則一使非亞聖大人曷克臻此矧止啼饒黃葉之方而濟譏絶懸沙之祕哉
