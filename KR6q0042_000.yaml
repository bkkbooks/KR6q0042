front:
  text: 南宋元明僧寶傳序有傳教則必有傳人有傳人尤必有傳書蓋教者道之所由行也人者教之所由興也書者前人之所由所由鏡也是以大道瀰淪得一二人焉為之眼目猶貧客衣珠亦終於迷惘而已苟得其然承當大事而幻軀易盡實行就湮如優曇千年一現後此何由踵所以儒者勒之傳志論贊以垂來茲其書傳則其人傳其人傳則其教始傳也大慈之入震旦也雖云教外別傳不立文字然而列祖相承諸宗嗣起其入道之機緣登壇之提唱與涅槃之證據至今猶若目覩此覺範僧寶一編與大川會元同為梵林之龜鑑也自是以降數百年來音徽漸邈幻津融大師者為天童密雲和尚之孫弘覺禪師之嗣志趨剛果機用弘通建光明無畏之幢紫籜之屨常盈瑞雲之竿復竪豫時避亂緱城特謁老人山中昕夕咨益偹悉婆心雖經臣之見智海猶多未解而死心之於山谷則真第一相為矣因得披讀所續南宋元明僧寶傳旨深義朗詞博論該昔范蔚宗謂遷文直而事核固文贍而事詳舉而似之洪公之後有融翁殆即子長之後有孟堅與末季烏藤白拂濫觴已極塔銘行實稱述過情乃前傳所編僅八十一人續傳亦不逾九十七人誠慎之也使諸方有所徵信不浮則懸帝網之珠光光互映割師子之乳滴滴皆真紹往開來祖𦦨重輝豈獨如遷固之以史才見長哉聞丁未秋紫籜一炬老人寢室獨存傳稿亦飛入竹林獲兔信乎弘教苦心為龍天八部護持而其人其書之傳固當無盡時矣謹盥手為之序康熙丁巳孟秋望日佛弟子閩莆林友王和南題於瑞雲之禪月峰南宋元明僧寶傳序人以文傳文以時貴其時為人不可忽之時其文為時不可少之書廣潤幻津禪師常續南宋元明僧寶一傳是矣豫因受政緱城間嘗私取而觀之其書時之法以宋室南遷禪林剎竿亦俱南指初政和間有國者崇道而抑佛自稱道君皇帝以天下僧流蓄髮加冠號為德士居道之右及道君蒙塵佛教復遭北金兀术魔滅凡在北叢林無不穢辱焉然幸禪宗知識早圖南隱者若不聞也斯傳始自建炎丁未歷畢宋世應元主運而再興又畢元順遜代明之高帝成祖昌隆法域而沿流不止于順治丁亥共五百二十一年非人之不可忽時乎書人之法始是佛燈珣蓋珣入寂于南宋之初乃至虎丘大慧密菴無準中峰海舟密雲悟雪嶠信為臨濟一宗以弘智真歇自得暉全一溫天童如淨雪竇無印壽昌顯聖博山來輩為洞上一宗其斷橋雲門兩宗無不錯綜其間非時不可少之人乎以人若此以時若彼其傳志之于功與獲麟春秋鐵函心史今古同揆皆感時憤事不得已而作之大有關于道法之替興宗緒之絶續為不刊之書也豈時節人文可同日語哉豫特序之以徵其志且表其功云古閩霍童崔秉鏡南宋元明僧寶傳序祖道東來不立文字正法眼藏以心印心如一燈傳燈燈續焰世俗未免有起而疑之仲靈嵩禪師不獲已乃撰定祖圖傳法正宗記上之有國者輒頒信於天下由此綜集傳燈之書亹亹間出其文不一且繁譬猶西竺分律部之為五合而元之本乎一禪師大川撮諸綱領燈會其元會元之出燈史定矣燈史既定則所有言句莫不起疴拯溺更何疑滯而不氷泮乎哉又覺範洪禪師嘗述僧寶傳以為載之空言莫如見其始終行事而深切著明也自嘉祐至政和據師座者垂千輩僅八十一人入其章次其文㧡而精圓而徑合撒語之則諸綱目無有弗備所備者祖師大統不易之道也逮洪公之後建炎以來惟濟洞二宗法化於世適明季英靈一時杰出復有繼續統燈之刻出焉之刻出其近古之參差疑滯似又莫能釋而定之何也其未有得於川之融覽洪之博綜乎否則猶有所待而後定之乎如近刻以海舟慈先參萬峰暮齡方謁東明旵蓋萬峰謝世于洪武辛酉慈於洪武甲戌年始生蜀之成都余氏投大隋山出家名永慈年二十八東謁旵得法後陸沉牛首晦迹全焦四十四歲開法東山閲三載旵公沒旵以衣偈差東明住持明白菴送至東山近刻以海舟名普慈出常熟錢姓脫白破山年七十餘方見旵訛哉明矣或字經三寫烏焉成焉與或別有所出同其名號者耶余以此質之大方俱以近刻為然復請天童吾師弘覺忞老人吾師出智瑄智璽所立海舟永慈禪師道行示豫豫疑始決第不敏因採考宋建炎以至明末五百歲尊宿不可唐捐之實録將成帙付弟子性磊令拾遺補輯共九十七人目之南宋元明僧寶傳俟命世賢明削而定之余何敢專焉紫籜沙門自融自序南宋元明禪林僧寶傳目録此刻不論宗系惟書法化時代始自建炎丁未至順治丁亥凡五百二十一年卷一佛燈珣禪師圓通真際止禪師智通深禪師龍牙才禪師補輯性空普菴主補輯龍翔竹菴圭禪師卷二補輯祖奇二首座護國此菴元禪師或菴體禪師補輯文殊道禪師補輯宏智覺禪師真歇了禪師卷三虎丘隆禪師應菴華禪師補輯大慧杲禪師徑山大禪明禪師補輯育王禪師補輯道場全禪師補輯華藏權禪師卷四補輯道場辨禪師補輯烏巨雪堂行禪師慈化普菴肅禪師天竺堂仁禪師補輯瞎堂遠禪師湖隱漢顛書記卷五密菴傑禪師育王堪禪師補輯華藏民禪師補輯徑山印禪師道林淵禪師白楊順禪師徑山塗毒䇿禪師卷六松源嶽禪師淨慈雲禪師靈隱善禪師龍濟鍪禪師淨慈自得暉禪師北澗簡禪師卷七徑山無準範禪師別山智禪師淨慈斷橋倫禪師徑山沖禪師天目禮禪師天童如淨禪師補輯上都華嚴全一溫禪師卷八北平慶壽簡禪師徑山高禪師靈雲鐵牛定禪師説堂暗禪師匡廬一山萬禪師高峯妙禪師卷九中峰普應本國師仰山佛智熙禪師笑隱欣禪師雪竇無印證禪師斷崖義禪師卷十元叟端禪師石屋珙禪師徑山虗舟度禪師孚中信禪師楚石愚菴夢堂三禪師古梅友禪師卷十一伏龍千巖長禪師補輯龍池寧禪師補輯金璧峯禪師補輯烏石愚禪師補輯古鼎銘禪師天界金禪師性原明禪師卷十二補輯雪峯逆川順禪師萬峰禪師虗白旵禪師東山海舟慈禪師補輯福林度禪師瑞巖恕中慍禪師補輯松隱茂禪師卷十三補輯斗峰璋禪師季潭泐禪師天界慧曇禪師補輯海門則禪師雲居呆菴莊禪師楚山琦禪師卷十四隨州龍泉聰禪師笑巖寶禪師補輯龍池幻有傳禪師補輯幻也慧禪師法舟濟禪師補輯敬畏空禪師壽昌經禪師卷十五博山來禪師湛然澄禪師天童密雲悟禪師磬山修禪師雪嶠信禪師拾遺忠州聚雲吹萬真大師南宋元明僧寶傳目録終
