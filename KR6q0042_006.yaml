body:
  text: 紫籜山沙門自融撰門人性磊補輯松源嶽禪師禪師名崇嶽號松源乃龍泉吳氏子也師事密菴得法後凡七竪剎竿有嗣一十二人人各有名嶽為人重默每見貴客則問曰大力量人因甚擡腳不起見禪流則問曰明眼衲僧因甚腳跟紅線不斷有對者輒哂而顧之時稱嶽得應菴之機得密菴之用云蓋嶽早歲厭塵棄家以白衣參靈石妙不契即上徑山徑山萬指軒騰嶽隨衆末聽妙喜杲和尚説法蒙無所知但聞杲盛贊當今應菴真得臨濟正傳嶽輒走參應菴應菴益難近嶽乃奮勵垢面露肘不暇恤應菴憐之示嶽曰世尊有密語迦葉不覆藏嶽隨聲進曰鈍置和尚應菴喝之嶽有省應菴笑曰者俗漢成得甚麼嶽乃求剃髮時年三十矣既受滿分戒入閩見木菴永永諦視曰樹倒藤枯知落處麼對曰裂破曰琅琊道好一堆柴聻對曰矢上加尖永休去於是嶽益自負永曰公每下語老僧不能過其如未在他日拂柄在手為人不得驗人不得嶽曰為人者使博地凡夫一超入聖固難矣驗人者打向面前過不待開口已知骨髓何難哉永舉手反覆曰明明向你道開口不在舌頭上嶽憤去之出嶺逢二道者耦坐評論諸方嶽所舉心肯者道者皆拂之嶽曰如是則誰可君意道者以指書密菴不凡四字嶽已知密菴為人遂至衢之西山折節事之幾進商略密菴幾笑之嶽復心疑乃至密菴移居雙徑於入室時始徹木菴道開口不在舌頭上久之出世澄照演唱宗乘以報密菴湖海以嶽言行無欺多從之遷光孝遂有大名慶元間詔移靈隱蓋晚年也是時門弟有文禮輩已闡化大方嶽仍升堂入室從未以風晨雪夕不打參鐘嘗以祕魔擎叉語接謙頭陀以有賊無贓語接肇道者以心學無聞語接陸遊樞密遊得證後隱鏡湖自稱放翁嘉泰壬戌秋嶽年七十有一忽召衆言別有偈曰來無所來去無所去瞥轉玄關佛祖罔措跏趺脫去塔於北高峰嶽居靈隱時與密菴尊嚴無異初密菴居靈隱嶽首衆僧密菴常稱疾闔戶不許通謁潛上座竊議之嶽曰不然師嚴道尊千古明鑑當今汲引豪貴者將謂行道建立為心殊不知禮輕則慢易生辭繁而情識長塵勞卜度安有了期緇俗既為道而來必發露真心至誠激切然後一言入耳永為道種兜率悅之待張無盡葉縣省之接浮山遠是也若區區老婆禪何足重哉贊曰嶽公以白衣有省於應菴語下固非草草矣終乃死心於密菴其祖父壼奧如樊將軍擁盾入鴻門孰得而禦之故驅耕奪食於分座靈隱時班班著聞見焉不然彼天目禮輩各抱奇志其甘入公彀中哉淨慈雲禪師禪師義雲者號退谷福州閩清黃氏子也黃氏世以詩禮傳家雲有異姿一目數行然倜儻不善浮沉每病其宗不達聖原各執隅説疑誤後學乃淹貫性理先輩重之時有胡嫗居烏石山年將百歲精術數眇忽不遺人爭謁之雲亦詣嫗嫗大喜欵留數日乃謂雲曰君福人也當有大遇我目下即歸國有一敝裘奉贈聊表殷勤雲受歸怪其重折線路皆珍珠碎金雲失足嘆曰嗟乎七尺丈夫乃為胡嫗所買也遂沉棄其裘於江而北遊國學羣士俱出其下因釋中庸有所悟入裂縫掖而去問道於山堂淳禪師淳曰子以聰明之質枉顧山野山野毫無所長試言子之見處為子證據雲論靜定工夫娓娓千餘言淳曰子所説道理似不違背更有一問譬有一人正走後面百千虎狼趕來又有一人扯住要問靜定工夫若答它後面虎狼迫至則傷身失命若不答他則靜定工夫安在汝於此時畢竟如何施設雲茫然淳公大笑而起雲徹夜慚惶撫膺嘆曰塗路之學終非實著乃求落鬚髮擇絮務以自勵且勇不自矜行腳至吳見鐵菴鐵菴與語大奇之雲又辭去鐵菴曰抱道衲子須以己度人不可矯激其行自居清白地上以駭聾俗於此行去形卜於影毫不生慚斯可為人師範雲書其語於襟遂造靈隱機契佛照佛照移住育王雲為首衆佛照命其秉拂以為宛如雪堂惜妙喜先師未及見也遂以妙喜所付袈裟披雲雲出世香山次繼育王育王以佛照遺風規摸濶大歲計浩繁雲獨以朴儉為先中多引去者宗印禪師過訪雲奉蔬食之外焚爐對坐永宵清淡而已印心笑之間謂雲曰氷淡家風千秋美典至若尊宿士夫過我山門禮體似不可簡也雲良久謝曰我非不知也老人住世德尊寰宇歲計動滿千萬諸方相習成風非錦屏大碗不見客雲嘗竊怪以為過當據蒙見如尊宿惠慈山門有幸住持則當率衆翹勤恭請普施法利此待尊宿禮體也至於士夫為道相訪住持面無諂色心無求事直辭開導俾貴人知有林下氣象其禮體也不亦優乎否則古風淩夷必為明眼取笑印大然之慶元間詔雲居淨慈杖履渡江同禪徒數十皆敝衣楚楚意貌翛然武林吏佐併紳士迎於途私相慰諭易其華服而尊禮如一佛出世焉既主淨慈規制畫一與育王時無異惟提唱綱宗以為供養其上堂曰奔流度刃疾𦦨過風啐同時崕州萬里有的道如人學射久習則巧殊不知未彀以前中的早涉紆迥了也趙州到茱萸靠卻拄杖則且置只如孚上座道聖箭子折也作麼生喝云若不同牀睡安知被底穿又曰昔僧問雲門殺父殺母佛前懺悔殺佛殺祖甚處懺悔雲門曰露還會麼斗轉風雷吼星移海嶽昏誰知席帽下元是昔愁人開禧二年示疾侍僧以榻施褥雲叱去之曰吾末骨立也安用此遂卓杖別衆曰意烏猝猝萬人氣索佛法向上何曾踏著臨行業識茫茫一任諸方卜度投杖斂目而寂贊曰昔高菴聞成枯木住金山侈甚嘆曰比丘法貴清儉豈宜如此此與後生習輕肥者何異得不愧古人乎按退谷處可為之秋而能簡約乃爾其清操真足龜鏡將來靈隱善禪師禪師名之善吳興人也其先劉姓世歷膴仕善自視欿然年十三志決出塵其親謂之曰吾家咳唾青雲之上若更何慕而欲為之善對曰欲為佛耳其親惻異知不可禁乃許受業於齊政沙門內行純粹人敬愛之出入經論胸無宿義乃遍扣禪坊未得究竟晚謁佛照光禪師辨論風幡公案光不諾善固求明破光示曰非風幡話露全機千古叢林起是非咄者新州賣柴漢得便宜是失便宜善厲聲曰阿㖿卻只恁麼光以杖擊曰今日與君通一線斬釘截鐵起吾宗光自此旬月不下堂問其故光曰吾妙喜先師擔子幸卸肩矣善歷衡湘遊廬嶽保養聖胎於妙高峯下疊柴為室不謀宿舂一住十載時以妙峯尊宿稱之嘗詠曰廬陵米價報君知浩浩塵中識者稀回首不知何處去白雲流水共依依又曰有時笑兮有時哭調高和寡難拘束一派清音徹九天風前誰解聯芳躅鄰山有座主自負妙悟楞嚴擕數徒屬訪善善揖坐相視移時座主曰昨見大慧有八還頌曰春至自開花秋來還落葉黃面老瞿曇休搖三寸舌語雖工俏但未出經意耳善驀召座主座主應諾善曰經意且止還出得大慧老人意麼座主咿唔莫措善呵呵大笑而起座主歸避席數月復具師弟禮請益於善善示偈曰沒絃琴上無私曲一曲彈來轉轆轆斷崕流水少知音六六不成三十六善東遊雁山闡法於臨海慧因歷洪福遷萬年乃示衆曰久參高士眼空四海鼻孔撩天見也見得親説也説得親行也行得親用也用得親只是未識老僧拄杖子在何故將成九仞之山不進一簣之土是時善之名滿江南卒退休臯亭道俗仍以明州瑞巖居善居無何平江晉陵請符疊至善任緣而應不執可否善既久領衆事法令益略衲子益新及卻天童赴靈隱蓋暮年也雖檀旋憧憧善仍蕭然一衾室中長物竹篦禪杖而已端平二年自題小像遺龍濟宗鍪復誡諸弟子曰像法垂秋名利根深如象沒深泥珠沉巨海識浪塵緣終無了日我為僧七十餘載目之所到耳之所聞衛護法門隱忍受垢者間或有之求其不奉明詔不接公卿如寒巗枯木確不可回者鮮矣人但知法門繇顯而盛殊不知繇盛而衰故有緣之功於法門者其功一時也無緣之功於法門者其功萬世也諺云庭前生瑞草好事不如無又豈謬哉九月二十八日書偈趺坐瞑目而寂壽八十四僧夏七十有一火浴舍利無數門人善珍號藏叟丐清之鄭公為銘塔於靈隱之西岡龍濟鍪禪師宗鍪禪師者號友雲姓王氏廬陵人也幼不茹葷年十九辭親修大僧事長者多器之既而遍見大有道者不事宗乘章句獨以睡夢時不能作宰為憂晉陵華藏善公遷靈隱鍪南渡依之踰年機不合擬別參未發偶見僧讀珍藏叟自贊鍪亦隨玩乃咀嚼其語始駭靈隱門賢非泛泛也其詞曰參禪無悟識字有數眼三角似燕山愁胡面百摺如趙婆呷醋一著高出諸方敢道飯是米做鍪遂堅志請益於善而兄事於珍久方契旨辭去道繇佛頂峯下倦行憩山莊磐石愛其山林蓊蔚指問莊叟叟告曰內有龍濟古寺先係修山主故址今廢鍪曰居之可乎莊叟曰彼中狼虎甚多師能居之何不可鍪竟剪棘縛茅以居木食澗飲或雪寒無宿火日啖菖歜數寸而已有時長笑而吟曰山僧有分住煙蘿無米無錢莫管它水似琉璃山似玉眼前儘有許來多靈隱善公知之大喜自題小相以贈鍪曰妙峯孤頂草離離橫按竹篦三尺鐵只許佛頂龍濟知父子不傳真妙訣於是有志之士餐風而嚮之因人建立叢社焉鍪嘗書門曰除卻眼耳鼻舌那箇是你自己若也道得許你親見龍濟其或未然且居門外有對者鍪皆叱逐之珍藏叟聞而笑曰恁麼為人其靈龜曳尾乎雖然也是六月霜花乃遣僧問曰和尚曾接得幾人鍪曰山僧失利僧回舉似藏叟叟唯唯乃疏辭徑山推鍪代之鍪曰先師壠土未乾遺訓在耳矧我龍鍾無似之人更何所圖甘言軟語而與朱紫為鄰哉稱病不起鍪年八十日不停務夜據匡牀合衆環聽垂訓孜孜不倦一日告衆曰先師春秋八十有四吾年雖得企及但法運衰矣罪在我躬言訖涕下已而彈指一聲曰只此是別衆語也僧問臘月三十日時如何鍪曰門無索債人衆悽然請開末後方便鍪曰一燈在望更無言説大地平沉虗空迸裂泊然而化塔於佛頂峯上初道俗請建壽塔鍪固止之曰何哉老僧朝死夕埋獨汙龍濟一塊土不必尋山擇地也我每笑溺信形家圖穴興旺使聖賢法緣媚於黃土顧而為之豈初心乎贊曰妙峯父子始末行藏不彚而符所謂水月交羅鏡燈互入豈可以孤峻而病之易曰十年乃字反常也淨慈自得暉禪師自得禪師名慧暉乃會稽張氏之寵子也自少割愛辭親得度於澄照寺孤錫雲遊見長蘆真歇以為有所證於閃電機下竟南歸所遇叢社如逆旅一閲而棄之遂投謁於覺宏智和尚宏智威德自在道望隆當世當世見者皆為神悚暉獨心負所畜不藉通詞特擬觀光於座下宏智熟視暉而容之暉微疑其所以乃自請挂塔宏智召暉至榻前詰以寶鏡頌暉驟進語智正色遣出之暉乃折節自悔從前寶惜一齊放下一夕正往聖僧前燒香適宏智來前暉見之頓悟大旨自爾問答無滯得授記莂焉紹興丁巳開法補陀馳其提唱語於宏智宏智大悅其語曰朔風凜凜掃寒林葉落歸根露赤心萬派朝宗船到岸六窗虗映芥投針本成現莫他尋性地間間耀古今戶外凍消春色動四山渾作木龍吟又曰釋迦老子窮理盡性金口敷宣一代時教珠回玉轉被人喚作拭不淨故紙達磨祖師以一乘法直指單傳面壁九年不立文字被人喚作壁觀婆羅門且道作麼生行履免被傍人指注衲被蒙頭萬事休此時山僧都不會又曰巢知風穴知雨甜者甜兮苦者苦不須計較作思量五五從來二十五萬般施設到平常此是叢林飽參句諸人還委悉麼野老不知堯舜力𭽸𭽸打鼓祭江神谷之神樞之要裡許旁參回途得妙雲雖動而常間月雖晦而彌照賓主交參正偏兼到十洲春盡花凋殘瑚樹林日杲杲於是補陀風範與天童並峙其遷萬壽次吉祥又雪竇皆名公巨卿為之勸請淳熙丙申有詔補淨慈上堂曰皮膚脫落絶方偶明了身心一物無妙入道寰深靜處玉人端馭白牛車妙明田地達者還稀識情不到唯證方知白雲兒靈靈自照青山父卓卓常存機分頂後光智契劫前眼所以道新豐路兮峻仍皾新豐洞兮湛然沃登者登兮不動搖遊者遊兮莫忽速亭堂雖有到人稀林泉不長尋常木諸禪德向上一著尊貴難明琉璃殿上不稱尊翡翠簾前還合伴正與麼時針線貫通真宗不墜合作麼生施設滿頭白髮離巗谷半夜穿雲入市鄽當是時大振曹洞宗風者多出宏智之門瑞巗有石窗恭光孝有了堂徹常州善權有法智而聞菴居翠巖法真居清涼乃至大洪長蘆皆屬焉以故淨慈典職班序者半皆諸方弟姪酬唱叶諧稱為新豐正韻也庚子秋退歸雪竇白髮垂肩逍遙怡懌愛擕禪客談空白日而笑落青山常作偈曰重重去盡自平常春暖風和日漸長戶外鳥啼聲細碎巖花狼藉滿山房以癸卯冬月二十九沐浴而逝痊於明覺塔右贊曰暉公以奇雋之姿英發鋭上睹影響於掣電光中便肯承當及入天童爐鞴鎔成大器輒能振大聲以達九重其境何順也細簡今古匪流則亢矣公乃履滿不溢順而能節抑何謙以退也芳型在望不禁高山仰止之思云北澗簡禪師禪師名居簡出潼川王姓號敬叟又稱北澗蓋居北澗之日久也簡姿秀而文當世尚之遊廣福讀出世典輒棄冠具戒參別峰別峰指見塗毒塗毒示其心要簡以從前所學湊泊不可疑情猛切常立達旦偶過擇木寮閲萬菴語云欲識諸佛心但向衆生心行中識取欲識常住不凋性但向萬物遷變處會取簡於此忽省以為萬菴與佛照同條遂別䇿造靈隱機契佛照光禪師於是往來妙喜下尊宿一十五年激揚宗旨大有力焉乃辭佛照經甌閩歷江西過羅湖訪仲溫仲溫與論大喜曰妙喜之後一人也乃以妙喜居洋嶼菴竹篦為贈且曰公之後必大未幾出住台州紫籜遷報恩及廣孝名大振退居武林飛來峰之陰卿士猶物色之不顧當是時出佛照之門者有靈隱善徑山琰天童派東禪觀上方銛交章勸簡應旴江刺史之命又不顧而江州使者以東林雲居力致之簡亦不顧乃壽北澗集行世宿儒附之葉水心曰簡公話柄特驚人六反掀騰不動身説與東家小兒女塗青染緑未禁春簡嘆曰狼虎之害世人易知也文章害世則難知矣狼虎在山藜藿不釆文章欺世耳目沉淪余比見近流施為濶略非先聖之言不言非古哲之迹不舉然境風乍飄榮辱無主取快一時名節掃地則向之所言所舉皆為飾詞以欺世者也欺世之害甚於狼虎余頽躬不逮深為是懼所見所聞偶筆成集若稍存心欲以詩文鳴世則又吾教之罪人也矣遂板晚居淨慈其門人大觀以高菴楞嚴綱要頌請簡發其旨簡向慕高菴為人乃聯和而序之淳祐丙午春示衆曰識得一萬事畢了事衲僧一字不識直饒恁麼未稱全提禹力不到處河聲流向西歸方丈大書四月一日珍重六字至期言語移時斂目而逝簡初在紫籜委羽有二姓爭竹山竭産不已仙居丞啓簡諷之簡示以種竹賦二姓之訟遂止台氓謠曰簡公筆甜如蜜贊曰齊桓侯有疾在腠理以忽扁鵲終至骨髓雖司命無奈之何而末造衆生言行參差之疾不啻在骨髓間也故北澗生平行李惟恐針石之不逮然以文字得度者則北澗法化寧當有別論也否乎
