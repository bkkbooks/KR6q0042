body:
  text: 密菴杰禪師禪師名咸杰號密菴其先福州世族也姓鄭氏母夢廬山皓鬢頭陀入室而生生之夕境內皆聞天樂不知何祥其親亦祕之師幼頴悟氣宇深沉事親以孝聞親有賢行勗之遠遊遂得度受具不結侶不備衾寒暑一衲遍扣諸方諸方敬之晚依應菴屢遭訶詈不假一詞默師默契其機一日應菴晚參垂問如何是正法眼師遽趨對曰破砂盆應菴頷之命入侍大擁衆心及辭歸省親應菴送以偈曰大徹投機句當陽廓頂門相從今四載徵詰洞無痕雖未付鉢袋氣宇吞乾坤卻把正法眼喚作破砂盆此行將省覲切忌便跺跟吾有末後句待歸要爾遵師閩還應菴乃上堂舉師分座曰一棒一條痕一摑一手血臨濟老瞎驢至今猶未瞥須彌頂上浪拍天大洋海水無一滴偉哉本色人頂門亞三隻辨龍蛇百草頭擒虎兕一毫力穿大地人鼻孔坐斷衲僧搖舌雖然猶未撥動向上一竅在且作麼生是向上一竅問取堂中首座傑未幾開化衢之烏巨其節概大類應菴應接渾如妙喜一時厭飫叢林者皆起而歸之祕閣張鎡矢向宗風改宅為慧雲寺請師據室師憐其正信示以趙州無字鎡得旨及師應祥符蔣山歷華藏雙徑而鎡皆隨侍又遷靈隱牀曆無所容乃舉破菴先分座接納焉師嘗被召入禁庭或留宿內觀堂天子屢欲加贈師屢以疾辭教授嚴康朝曰窮則獨善其身達則兼濟天下理固然也況良時莫再聖主難逢法兄每用藏六之機不顧從上縣絲之脉朝不取也師曰汝之所見本為通論但弘道設教也以時當此際京畿宮觀金碧交輝古德高風杳不聞矣而躁進孟浪之病庶幾老成持重者有以振之且華亭渡西山隱獨非兼濟天下乎哉力請退休平江淳熙甲辰春天童使至師告衆曰去年八月間得旨與安閒擺脫水雲性縱步到陽山元宅諸子弟欣然力追攀菴居三箇月開懷宇宙寬忽接四明信來書意盤桓天童虗法席使君語猶端迢迢遣專使不問路行難山僧臨晚景不敢自相瞞捶鼓樂與行四衆亦欣歡先師未了底應是起波瀾敢問大衆如何是先師未了底一回飲水一回咽臨濟德山俱汗顏入寺以應菴遺規結制升座曰數十年前舊公案今日拈來重剖判任是鐵眼與銅睛也須曳入紅爐煅衆中忽有箇不受瞞底出來道盡大地是箇紅爐也煅某甲不破只向他道也知你在鬼窟裡作活計淳熙丙午無病示寂塔於寺東其嗣法者破菴先等一十二人而澄照自鏡復住天童贊曰應菴廓虎丘之風時出入其庭者濟濟耳以其廢鉤繩而取曲直故竊諱之及密菴開化山不束嶽海不束濤豈非過師之智自與齊眉共躅者異歟不然則臨濟宗風何能西咸四七而東登二三也育王堪禪師禪師出四明毛氏名妙堪號笑翁十歲授以世典過目成誦不悅也乃從野菴欽潛心釋訓竟為大僧受無用全禪師之囑住後以持綱不屈聲達朝廷朝廷屢以名山居堪堪去就自若淡如也一時爭慕之堪初參松源於靈隱不契偶禪者讀全無用自贊曰匙挑不上箇村夫文墨胸中一點無曾把虗空揣出骨惡聲贏得滿江湖堪悚然欲見全未及發會全公訪靈隱堪心幸之松源引座全乃曰適來松源和尚舉竹篦話令天童納敗缺諸人要知麼聽取一頌黑漆竹篦握起迅雷不及掩耳德山臨濟茫然懵底如何插嘴堪於此信入即隨至天童告香入室全公以趙州無字徵堪堪擬對全驟擊之堪大悟曰大塗毒鼓轟天震地轉腦回頭橫尸萬里全公可之堪後出世妙勝遷金文又廣孝始終不務姑息誠感徵應紹興乙亥禱雨有司欲援徽宗事例以道居僧之左而尊其符水之術堪力言不可遂退歸雪竇天竟不雨童叟謠曰以右為左天曰不可四月五月池潭起火聞於朝復舊序雨乃大通衛藩遂以台山報恩請堪堪以台山舊無律宗乃議十寺為壇弘施毗尼於是四衆雲合化行南國乃至屠父行慈狗盜弭節奉詔住虎丘未幾升靈隱衛王特建大慈寺請堪為開山首祖既而退隱上柏台郡陳使君邀居瑞巖居無何又遷江心寺乃淳熙壬寅年也當是時孝宗留神內典常製圓覺楞嚴經注普賜文臣又嘗召對諸禪宗如佛照光者出入禁廷以內觀堂為禪師邸甚盛典也俄有奏令僧道買紫衣師號為大剎住持堪駭嘆曰審是則商賈皆可主法耶吾道危矣即詣闕抗疏切直數千言議寢紹熙癸丑年佛照再赴壽皇詔而育王席虗以堪補之堪歷主名坊機不虗發深憐根有利鈍而法無小大嘗以頌示諸學流曰車牛腦後痛加鞭棄却黃金抱碌磚逐惡隨邪至今日即非心佛錯流傳又曰覺城東際老婆婆白髮𣯶𣯶意氣多與佛同生嫌見佛惡人無奈惡人何又曰柳毅傳書只自知得便宜是落便宜親生愛子都拋卻痛惜深憐乞養兒猶以柬致石鼓夷曰先師法道惟我與公我既日就衰頽無足道者公今應跡靈隱利生接物去就當如秋葉春雲任緣聚散凡與公卿貴人相見務翻其窠窟絶其偷心若稍有院子一念挂在胸次模稜苟合便成流俗阿師雖為萬指住持何足貴也詞甚激切慶元庚申春書遺表上達并作短語挽張寺丞主後事乃趺坐白衆曰業鏡高懸七十二年一鎚粉碎大道坦然再與曹通守訣別斂目而逝其僧臘六十也後嗣無文燦燦付愚叟鑑鑑閩人有實德元世祖詔住攴提賜號通悟明印明印去妙喜其世有五贊曰碩果不食厥功偉也當南遷後司衡多建中之餘至今方外以市名職吾道微矣公乃毅然撥亂而反之正功孰大焉謂之碩果非耶殊不知浩然綱領之節又原於妙喜云華藏民禪師禪師生於嘉定府朱氏諱安民字密印有異表聲若洪鐘心契圓悟之機圓悟舉民首衆曰休誇四分罷楞嚴按下雲頭徹底參莫學亮公親馬祖還如德嶠訪龍潭七年往返遊昭覺三載翱翔上碧巖今日煩充第一座百花叢裡現優曇蓋民初開講於成都雅稱楞嚴獨步因訪友過昭覺適圓悟小參舉趙州拈南陽三喚侍者話云如人暗中書字字雖未成文彩已彰且道那裡是文彩已彰處民聞疑之次日擬行躊躇未決其友謂民曰君既匡徒領衆文彩日彰倘有從上道理消不去處直與堂頭和尚坐而商略何不可耶顧而蘊結胸次無乃病乎民唯唯遂告香入室圓悟徐舉楞嚴徵其心之所在民多呈義解悟笑曰座主他日入地獄莫怨老僧不道民愕然折節胡跪求說前旨悟又笑曰文彩已彰民俯首出而嘆曰禪門委有長處葉公之龍不足貴也即散講依栖焉一日白圓悟曰和尚休舉話待某說看尋常拈椎竪拂豈不是經中道一切世界諸所有相皆即菩提妙明真心下喝敲床時豈不是反聞聞自性性成無上道悟唾之曰你元來在者裡作活計民於此信入復請曰古帆未挂時如何悟曰庭前柏樹子民積滯頓豁踴躍趨出曰古人道一滴投於巨壑殊不知巨壑投於一滴矣於是民之美譽溢叢林佛鑑聞而笑曰何日吹到蔣山門下別有商量在民後謁鑑鑑問曰佛果有不曾亂為人說底句曾向你說麼對曰合取狗口鑑變色震聲曰不是者箇道理曰無人奪你鹽茶袋呌作甚麼鑑曰佛果若不為你說我為你說曰和尚疑時退院別參去鑑呵呵大笑以殊禮延之民遂開法保寧而建康緇素強民至華藏升座以篆鑰委之座下各趨而去民知中計嘆曰三十年弄馬騎今日却被驢子撲是時海內宗風大盛叢林最小者千指聚集民獨嚴持風裁榻無雜賓春㸑之役常躬為之至法鼓鳴時龍蛇競勢民不禁也示衆曰衆賣花兮獨賣松青青顏色不如紅算來終不與時合歸去來兮翠藹中可笑古人恁麼道大似逃峯赴壑避溺投火爭如隨分到尺八五分钁頭邊討一箇半箇雖然如是山僧半箇也不要何故富嫌千口少貧恨一身多又從華藏退居故里之中峯乃以圓悟白拂付之寶印會圓悟歸蜀民遣印省之悟問曰從上諸聖以何接人印竪拳悟曰此是老僧用底作麼生是從上諸聖用底印以拳揮之悟亦舉拳相交大笑一衆改觀而民公之望益重民竟無疾終於本山闍維心舌不壞舍利無數細民穴地尺許皆得之尤光明瑩潔焉徑山印禪師寶印禪師者嘉州人號別峯初業儒棄儒剃染業華嚴又棄華嚴從華藏民禪師悟明心要其祖圓悟每譽之謂印有超師之略印之名遂著乃通謁於妙喜自稱西川法姪時徑山多士竊笑之妙喜問曰未出劒門關與你三十棒了也印遂展拜曰不合起動和尚妙喜欣然顧左右曰你們騎馬趂不及是日萬指叢林為之震動於是西還開法而兩川素稱義虎之雄者皆從印遊印仍慰其開講曰宗教無二致而公白岐耳公以無欺心而演教教中之宗也我以無欺心而弘宗宗中之教也我佛初轉四諦於鹿苑而憍陳如乃無欺之首也後拈枝花於靈峯而迦葉乃無欺之終也故其間談經三百餘會皆以無欺法而利無欺衆公但自反能無欺乎既無欺矣以無欺舌而流無欺教則教與宗是一是二乎惟諸公勉之印又出峽住持保寧次遷金山自金山移雪竇自雪竇補雙徑其衆盛矣嘗示衆曰世尊初成正覺於鹿野苑中轉四諦法輪憍陳如比丘最初悟道真淨拈云今日新豐洞裏秖轉箇拄杖子遂拈拄杖卓左邊云還有最初悟道者麼若無丈夫自有衝天志莫向如來行處行遂喝一喝下座若是印上座不然今日向鳳凰山裡初無工夫轉四諦法輪亦無氣方轉拄杖子秖教諸人行須緩步語要低聲何故欲得不招無間業莫謗如來正法輪又曰三世諸佛以一句演百千萬億句收百千萬億句只在一句祖師門下半句也無祗恁麼合喫多少痛棒諸仁者且諸佛是祖師是若道祖是佛不是佛是祖不是取捨未忘若道祖佛一時是佛祖一時不是顢頇不少且截斷葛藤一句作麼生道大蟲裹紙帽好笑又驚人又曰將心除妄妄難除即妄明心道轉紆桶底躍穿無忌諱等閒一步一芙蕖印年邁日常宴坐匡牀頽然一老比丘士夫訪拜牀下愛慕倍於父母孝宗皇帝知而召之印以足疾辭不奉詔帝賜肩輿於東華門內迎入選德殿初禮臣議朝儀及見印直登榻跏趺羣臣皆失色帝喜其真率乃問圓覺之旨印隨機酬對帝默有契輒注圓覺經命印撰經首之序自是東華門置禪師輿以備顧問十五年冬力請菴居紹熙改元過訪智䇿禪師兼與言別䇿問行日印曰水到渠成歸索紙書十二月初七夜雞鳴時如期而化奉蛻質返寺之法堂留七日顏色明潤髮長頂溫又七日擇退居之西岡而閟焉諡慈辨禪師塔曰智光贊曰民禪師義壇之翅虎也一入昭覺之門翻然易轍與夫抱英敏之姿負昂藏之表甘若捉月之猿趨陽之鹿者豈非日劫相倍乎哉師以己愈之方施之別峯印自然水乳合而針芥投為萬古我慢之正鑑是則西山亮何足為多耶道林淵禪師淵禪師者失其里氏木訥寡文為人無競嘗點胸自警曰參方須具擇法眼不然踏碎鐵鞋何益哉是時吳楚法席以物色相勝獨大溈月菴果公峭甚室中惟置一方木榻兀坐如鐵橛霜雪不釋每誡知事不可以軟語誘人學流見輒引去惟淵堅依決擇每受訶責株立弗避月菴每切齒熟視而休有檀家入山求法月菴因起謂衆曰奚仲造車一百幅拈却兩頭除却軸驀打圓相曰切莫錯認定盤星淵於此盡脫廉纖後出世潭州道林法嗣月菴月菴嗣開福寧寧入五祖演禪師之爐鞴故淵為演克肖之孫也同出月菴之門有八人各化一方獨淵瞿然以卑自牧羣賢競起成褫之故道林聲價甚邁窮谷璉嘗曰道林頷下有逆鱗不可攖他有僧挺身曰便攖時如何璉曰橫尸萬里僧傳語道林淵曰窮谷瞎禿錯下名言僧請別置一答淵曰只恐不是玉是玉也大奇于是禪流往來馨炙其語僧問曰雪峯一問德山低頭便歸方丈意旨如何淵曰奔雷迸火曰巖頭道其未會末後句又作麼生淵曰相隨來也曰未審那裡是巖頭密啓其意處淵曰萬年松在祝融峯曰三年後果遷化還端的也無淵曰摩尼達唎吽癹吒淵令不易出出則風行草偃而便懶之斃靡然易向然復不馳刺檀家日以鋤钁為佛事普請歸忽拈拄杖告衆曰離却色聲言語道將一句來衆無對淵曰動靜色聲外時人不肯對世間出世間畢竟是誰會言訖倚杖當軒莊立而逝贊曰余讀東山演祖語録則青山白雲開遮自在嗣後尊宿肖之者幾幾豈碧潭明月撈摝方知乎今揀道林數語頗類之不可不傳之也然月菴恣於孤硬而道林繼之青陽解凍矣萬類不獲榮願者未之有也白楊順禪師法順禪師者綿州文氏子也棄行腳觀寶輪藏迅轉頓徹教外別傳之旨得受記於龍門佛眼同出佛眼門者有高菴悟竹菴圭雪堂行輩順住白楊時其同門俱播令名矣獨白楊敗屋數楹東傾西壓以木丫支拄焉順日擕袋走撫之鄉城至晚或負斗粟而還及門數十人樂與之俱每夜參必端據木牀徒屬或栗足側耳而聽曲折順曰好事堆堆疊疊來不須造作與安排落林黃葉水推去橫谷白雲風捲回寒雁一聲情念斷霜鍾才動我山摧白楊更有過人處盡夜寒爐撥死灰忽有箇衲僧出來道長老少賣弄得恁麼窮乞相山僧祇向它道却被你道著又曰雞啼曉月狗吠枯樁只可默會難入思量看不見處動地放光說不到處天地玄黃撫州尺六狀紙原來出在清江大衆分明話出人難見昨夜三更月到窗又曰風吹茅茨屋脊漏雨打闍黎眼睛溼恁麼分明却不知却來者裡低頭立順住白楊既久激勵學者妙有方略雖枯淡不堪有青原紹燈輩始終侍從後俱出世大顯其聲順老疾一日諸山趨詢順起示衆曰久病未嘗離木枕人來多是問如何山僧據問隨緣對窗外黃鸝口更多只如七尺之軀甚處受病衆中具眼者試為山僧指出病原看衆爭下語順乃拊掌一下作嘔吐聲曰好箇木枕子便趨寂依法闍維收五色舍利并諸不壞者曰目睛齒舌數珠瘞於寺西初順在龍門時雲居虗席聞高菴悟表裡端徑趨龍門聘之悟固辭佛眼勉其出住悟仍不就順告悟曰先知覺後知先覺覺後覺蓋素分也況雲居為江右名剎之首安衆甚便沾沾小節奚足喜焉君應之順雖不敏願請為輔悟乃欣起於是順自為藏主邀賢真牧任維那通烏頭典知客應菴華蒞副寺德用為監寺自圓為首座故佛眼之風大振焉贊曰余初閲師行實疑其為踽凉之士逮味師語句乃政黃牛端獅子之上也高菴最徑挺不近人情師降尊招賢闡揚一代時教其跡豈可測哉然其示枯淡於一時流膏腴於百代於戲尚矣徑山塗毒䇿禪師塗毒禪師名智䇿祖籍天台陳氏幼入孰強記父擕遊桐柏宮䇿見古石相問曰此為誰其父曰周之義士伯夷叔齊也䇿低首良久曰審如是則人世富貴不足取矣父奇之又過護國寺遍觀僧寮佛舍恍憶前因堅求脫白父亦不阻其志遂為大僧首謁國清光光指見萬壽圓圓曰甚處來䇿對曰天台曰見智者大師麼䇿曰即今亦不少曰因甚在你腳跟下䇿曰當面蹉過圓曰上人不耘而秀不扶而直欵之不可聞雲巖遊老人退居武寧䇿趨求依道經雲居阻雪月餘偶聞板聲大悟不俟霽達武寧適游庭坐乃指䇿曰何處見神見鬼來䇿曰打破虗空全無把柄游搖手曰未在策曰東家暗坐西家廝罵游大喜曰他日起家一麟足矣於是親侍久之辭應雙徑游謂䇿曰闡揚一代時教必須福與慧齊汝福不逮慧吾為汝憂䇿對曰惟愁己眼不明己眼若明即獨對聖僧喫飯何歉焉游以為賢既而果䇿一人大唱黃龍之道蓋游初為儒生不屑貢籍棄名出成都道遇黃山谷山谷見游風骨不凡乃同舟下江陵竟染衣匡廬而投機於湛堂準準之師真淨文文師黃龍南是南為游之四世祖也游年九十三退休武寧扁曰典牛典牛之戶無冗履閒和牧牛頌寄張無盡居士其頌曰兩角指天四蹄踏地拽斷鼻繩牧甚屎屁無盡發笑曰狂翁故態也䇿主叢席其拈提大類湛堂操重堅徑又似黃龍故黃龍三關之旨至䇿為之一新嘗舉教中道若以色見我以音聲求我是人行邪道不能見如來雖然恁麼正是捕得老鼠打破油甕懷禪師道汝眼在甚麼處雖則識破釋迦老子爭奈拈䭔䑛指徑山則不然色見聲求也不妨百花影裏繡鴛鴦自從識得金針後一任風吹滿袖香又曰一見便見猶隔鐵圍玄沙老漢腦後痛錐名高豈在鐫頑石路上行人口似慶元庚申秋上堂撫法座曰此牀子我不復臨矣汝等當以文祭我明日沐浴更衣端坐命供頭設祭弟子如命鞠躬拜跪宣其文策傾聽至尚饗為之一笑遂引聲曰四大既分飛烟雲任意歸秋天霜夜月萬里轉光輝竟化贊曰眇視報緣獨尊道眼盛衰之跡何足凂焉此蓋中峯贊公生平之略也或怪公大泄典牛之氣門士如雲全不肯諾豈王刀有異耶抑精金躍冶乎雖然不肯諾中即肯諾矣末法覓人肯諾起自雌黃哀哉
