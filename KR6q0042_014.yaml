body:
  text: 隨州龍泉聰禪師禪師諱明聰字無聞邵武光澤奚氏子也宗傳臨濟師事天奇天奇之盛化也聯芳授受龍象數百員而師其萃然師不就疏請不藉檀脂卓立當陽開創禪社愛以劇務繩學者重振百丈之規或不堪其勞而去未期月復來歸之以故升其堂者皆挺特有志之士且函丈之室如旅泊中夜跏趺四壁凜然榻下咄咄之聲常驚達旦是以楊歧之令至師又行焉師初受業於講肆精研性相有聲同輩憚其鋒以英邵武嘲之師獨陰疑大通智勝佛十劫坐道場佛法不現前不能成佛道乃與義學浩浩盤桓有曰既是佛矣何須更成或曰為度衆生故所以不成佛師默嘆曰審如是乎遂盡棄其所好堅扣禪宗不契忽聞馬嘶廓然自驚趨見天奇瑞禪師瑞嗔目叱出一本才禮拜瑞便打同行者曰君與和尚無緣耶師笑曰真箇那是晚瑞公問曰今日我罵底僧在否有對曰是必在公即曳杖下旦過寮師迎作禮公便擊之師進曰適來草草觸忤和尚公按杖曰老僧今日被上座勘破師又進曰和尚是在世忘世在念忘念豈被人勘破一本云豈能勘破公曰在世忘世是如何對曰了物非物曰在念忘念是如何對曰於心無心曰心物俱忘時如何對曰華山高突太行峩公休去未幾以化柄屬焉且誡師曰從上真宗有子擔荷何憂哉但百獸雖潛蹤於獅子聲中然千花卻發艷於象王影裡子其勉之師既受囑獨入光州山居六年六安山又六年復還光州舊隱又五年始出隨州關子嶺建立龍泉寺以安來學而學者集焉常謂衆曰吾師天奇老人每懼後學外著文義內生情見故有語云文義者法也情見者人也非人何以有其見非法何以有其文是以文義情見通屬人法人之不空情見難絶法之不空文義難滅文若不盡見奚能盡義若不盡情何能絶如是奔競展轉無窮發之乎文生於見義生於情返之乎見生於文情生於義先乃所引生能後乃能追生所總名曰生文滅則見滅義絶則情亡情不自忘因乎義忘而情忘見不自泯因乎文泯而見泯統名曰死死死生生實可哀哉此吾老人防微杜漸切實至極汝輩有志於吾宗寧可忽諸然食飯不咬米行地不踏土又作麼生委悉是時也師之同門諸尊宿或隱或現往來衲子獨推尊龍泉為人勦絶枝蔓不涉離微惟月心寶得入龍泉之室師嘗召寶曰玄沙不肯霛雲意作麼生對曰賊入空房曰不得草草寶喝師諾寶乃辭去歷載還侍師又召曰人人有箇本來父母子之父母今在何處對曰佛眼不見曰子還見否對曰某亦不見師曰子何不見曰若見則非真父母師曰如何是真父母對曰本來真父母歷劫不曾離起坐承他力寒溫亦共知相逢不相見相見不相識為問今何在分明舉似師師深肯之僧問本來面目師答曰石香亭曰便恁麼去時如何師曰喪卻了也寶曰放去較危收來太速又僧問今朝天下皆慶佛誕未審佛於何處降生師畫圓相示之僧無語寶代僧作禮云盡界普瞻師以大法有所倚重遂隱去經二載還龍泉龍泉牀曆益慎班白者半滿其間間有二三妙齡披田服者皆格守律度參請如救眉然但師有辭世意矣一日師升座説法已而擲下拄杖儼然化去塔於龍泉寺右笑巖寶禪師笑巖禪師名德寶字月心生於正德壬申臘之望日其父吳氏乃金臺世襲錦衣也師以父卒鋭自立不樂嗣職愛遊佛地因聽華嚴恍如破夢乃卸世籍為大比丘歷參南北知識三十餘人然訪隱者於西山質單丁於破院又莫計也卒得道於龍泉聰禪師出世高座牛首圓通諸處當是時義學紛紜禪宗落寞而少室一枝流入評唱斷橋一派幾及平沉雖南方剎竿相望率皆半生半滅佛祖慧命殆且素矣師力弘法柄隨方建立可行則行否則默之然剷邪劈膠間不容髮即據室匡徒之輩雕龍吐鳳之儔始與師抗次與師遊終乃俯首入煅死盡偷心至於盤根固執三隅不反者師不少假詞色圖為孽生種草也有廬阜五禪客請曰竊聞和尚闡化多年而得人未見其廣況今禪社蕭然異知殊見茅塞宇內矣師掌珠不展其晚近何繇得入伏冀曲以垂慈入草求人以為何如昔船子不得夾山而藥山宗風不幾掃土乎師曰諸公之言不無可采但無上佛祖心印力荷者畢世一人足矣下迄曹溪時英競發不得已而印可亦不繇不如是而然也山僧秖是任分未敢越理穿鑿待彼自化雖無人未為多罪也故師法幢所樹不定何所有龍象八人常隨師遊時號八杰師嘗於楚漢兩間寓夏新秋二日衲子隨侍於金沙灘頭地坐四顧無人忽有龐眉沙門逼前莊立朗聲問曰仁者可識從上相承密論密義否師從容答曰善來仁者密則非論論則非義沙門乃以錫橫肩翹一足曰是甚麼義師於地書更字酬之又以錫畫地濶兩脛立畫上復以錫橫按亞身而視曰者是甚麼義師書嘉字酬之又卓錫於地兩手叉腰翹一足切齒怒目作降魔勢曰是甚麼義師書之字酬之又分手指天地周行一匝曰是甚麼義師書尤字酬之又復進前一步作女人拜分手指兩衲子曰是甚麼義師書蠶字酬之又繞師三匝作禮立於師右師書字示之曰會麼沙門擬對師止曰設到此地復書字曰更須知有者箇始得沙門歡喜合爪面師嘆曰咦真摩訶衍薩婆若上士振錫而去二衲子驚喜曰彼是何沙門所為復是何義師良久曰還識麼俱對曰不識師曰此乃應真聖賢所呈金剛王變相三昧及三昧王三昧用來勘吾然彼亦將有新證耳又過潼關禮熊耳祖塔寺僧叱曰憨拜空塔奚為師指曰空塔乎曰然師曰祖師聻曰擕履西逝久矣師曰蒼天蒼天師嘗倒握拂柄以示僧曰會麼曰某已識和尚做處也師曰你道荊州黃四娘禮佛求箇甚麼又僧問打破鏡未審作麼生相見師曰慚愧殺人僧頓領旨即曇芝上座於是江湖聞而慕之者雖切然搆之者益稀矣萬曆丁丑燕京緇素建精舍挽師歸隱師既謝遊轍門無雜賓乃整齊先覺經綸提掇古德綱目或徵或贊或判或頌高巘曉霜千江秋月也又五年懸衣大寂閲世七十一坐夏四十八塔於京城西直門外高浪橋之北郊署師正宗南行者幻有傳禪師也代師闡化北之東臺者瑞峰和尚也其臥隱於優曇苑者幻也老宿也識者謂濟宗鼎峙則師不負於龍泉矣師前後所參尊宿約出天奇之門獨於襄西得謁大覺圓圓為海舟慈公之四葉其臘高貌碩詞如截鐵因歷舉古公案以詰師師對無滯響圓曰若以諸方子當絶類為不可測人老僧却不然再將爛熟底一則機緣問你外道問佛不問有言不問無言世尊良久外道大悟且既不涉有無良久亦是間名正恁麼時外道悟去悟箇甚麼師擬對圓急掩師口曰止止師頓契其機即以偈獻圓圓大喜曰奇哉斯乃從上果地人語也師住後常道圓公之為人龍池幻有傳禪師禪師名正傳字幻有應天溧陽呂氏子也根器宏遠慧語驚人年二十二荊溪沙門樂菴度之即示師心法師輒感奮聞燈花爆有省樂菴歿師計閲晚近禪門方死繩墨乃北抵神京謁笑巖寶禪師傾心具述所以寶陰異之忽躍出隻履變色厲聲曰向者裡速道一句師愕然無對寶公便起師俯首而退中夜倣徨公晨出見師猶立簷下顏如稿木驀喚師師回顧公公翹足作修羅障日月勢師豁然深達堂奧矣久之辭去公以一笠與師曰覆之勿露圭角師徑往五臺栖息祕魔巖一十三載會太常唐公鶴徵問道臺山見師如夙契且約師還南師以樂菴未塔聽之至荊溪徵以龍池延師龍池故一源禪師道場也嘉隆以來先德物故東南法社例如灰冷師至愴然念百丈大智之風有徒數輩一如萬指臨之於是志士咸集槌拂下多頴脫而去僅六載謝事復遊燕都居普照寺時縉紳輩留神空宗日夕從師質證師嘗舉扇示諸大夫曰當時孔子還知有者箇麼皆曰不知師置扇曰以我為隱乎吾無隱乎爾衆躍然稱謝其揭示多類此以故笑巗道化復振於燕趙雖南北異勢而衝寒暑之士不絶足下圍繞皆大器也師據坐顧衆曰是大盡是小盡有對曰大盡有曰小盡小師從傍進曰敢保不在曆本上論量師哂而休去其徵勘又多類此法師月川者與師同參寶公川左袒清涼以非肇公物不遷論當世莫能抗其説師乃反覆剖析纍萬言川卒板以謝其整頓綱宗又能類此京中有為妖書詆上者詔捕弗獲當事人藉口桑門時紫柏可公逮繫矣一時名德引去馳師師笑曰學道期了生死生死了顧反畏禍耶高臥如故事寢乃赴唐公再住龍池之命其處境安詳又多類此師前後京都二十餘年當是時兩宮奉我田服之徒方藉以有為師獨無所事生平如飢如渴一以宗旨為己任故終師之世升堂入室無虗日每以門前冷落車馬稀老大嫁作商人婦話問士大夫般若無知靡所不知問學者鮮有契其機者師曰今時人多有説得儘是者恰像箇膾子手何也任他佛頭來魔頭來獅子頭來象頭來牛頭馬頭人頭狗頭羊頭鵝鴨頭到汝案上一一儘汝破除打發一邊去只恐把箇死貓頭來便茫然罔措於此打發得開去才是好膾子手有僧進曰請將死貓頭來師笑曰果然不識師處躬應物嚴慈等之故開遮如如為不可測卒以大機得人而大振滹沱之宗示寂之年六十有六矣先一日有僧自臺山來師欣然與劇談山中宿昔抵暮索浴浴出而示微疾衆驚疑環擁之師舉所著帽者三衆弗敢對師乃拍膝宴然矣蓋明神宗萬曆甲寅年二月十二日子夜也塔建本山之左贊曰語云重雷發響百里飛聲無事之者愕然而驚空聞其響不見其形吾滹沱一宗自元明叔季蓋氷霜之際矣笑巗父子公孫震匝地法雷於嚴冷之首下開萬彚之蒙上正千秋之統猗歟休哉至有覓形鏡裡尋聲谷中亦獨何哉幻也慧禪師禪師名佛慧字幻也會稽人其先史氏慧初生出家行腳俱有奇徵乃與幻有禪師同出笑巗寶公之門洎住嘉禾之優曇苑自號懶石叟著懶石語纍萬千言格盡物情時共珍之又疾當世學者走聲便軟暖一澄之以枯淡數十年門無宿賓惟一能明侍者終身料理巾瓶而已及其法鼓乍鳴有道緇素爭集如雲慧曰四大之軀孰不有五味之食孰能無白玉體箇箇分明紫金身人人可得爭奈食之不常而食衣之不常而衣八萬種魔寧教易曉四百四病以何遣除諸仁者不是祝髮了呌做出家披金襴呌作出家識文達理呌作出家能行苦行呌作出家避喧求靜呌做出家有人緣呌作出家感天供呌作出家緊要在著草鞋入釋迦腹裡屙屎放尿跨大步穿達磨心中戴角披毛枯草拈來直得百花相鬬鼓動含靈喚起維摩寂默十方如來密付汝印一切天魔自然傾膽咦鳥啼春晝間彌勒花發東風見故人又曰一番相見一番新好看盂添柄幾處行來幾處險密奇艇內藏輪海不顧山頭月白一任浮沉空無奈雨腳風清大家和會參方衲子講席高流居士宰官天仙魔梵有情無情生一乾坤死一乾坤聖一法界凡一法界何曾謾得諸人若也謾得便討説箇是非好惡賢善才能尊卑異類灼然些子謾不得欠不得你道是甚麼境界會麼滿目塵埃千聖眼半身落魄五宗心晚移燕京多寶菴重修笑巗之令足不越閫者復十餘載緇素餐風而過從者多不堪其嘯唾而去朝廷知而敬之老且耄矣忽思南歸復止優曇俄示疾簡曆謂小師曰後二日可小師涕泣固留慧笑諾為遲三日懇再留不許遠近從遊者聞之趨置龕室適工報竣而跏趺示寂閲世九十一坐七十有八夏贊曰明之中葉象教崇隆之際公則閴然一室嗒然一我雖德重大內弗居也以故追隨於公者皆一時賢君子受公面折欣如獲寶於其鬻聲都市駕譽權門之流得非天壤與公語音如鐘足有輪紋皤皤黃髮齒落更生共疑為果地人再世豈苟然哉法舟濟禪師禪師名道濟字法舟嘉興人也受業於東禪昂以向上宗乘走叩吉菴祚禪師遂得道焉是濟為無際悟之五世也初悟以斷橋正脈付廣善潭潭付默菴宣宣付吉菴祚由潭至祚垂百年來其家聲幾不振矣濟承之出世金陵安隱而爼豆先人於名賢之間恢述其志刻如履氷每以隔宿挂上堂牌衲子陰笑之嘗舉拂子召衆曰見麼又擊曰聞麼既是舉起便見擊著便聞妙真如藏應用全彰是汝諸人自不丈夫故乃傍人門戶求知求見韜晦家珍甘為寒乞將謂諸聖別有奇特事廣額屠兒揚下屠刀便云我是千佛一數豈有曲折作知見耶丈夫子何不恁麼擔荷去於是學流愛慕而親之吏部陸公光祖邀濟還里以天寧居之祖既篤於真乘常遊天寧恨見濟之晚因問曰畫前元有易否濟曰若無庖犧氏將甚麼畫曰畫後如何濟曰元無一畫曰現有六十四卦何得言無濟曰莫著文字曰請師離文字發一爻看濟召公公應諾濟曰者一爻從何處起公大笑而謝自稱五臺居士遂多出入叢林而擊節焉又別駕熊公南沙問曰設有將劒來取師頭師還避否濟曰若有殺人不眨眼地將軍便有不怕死和尚沙作揮劍勢濟放身便倒沙曰好箇師僧死在劍下濟起呵呵大笑曰作麼作麼濟任緣揮麈惟津津焉提唱綱宗而已稍不如意飄然去之或舟或或破寺村菴前後凡遷居二十餘所但其為人真率間雅胸無隱事耳目交接使人忘其名勢以故賢彥追崇之其於院務凡百濶略知友常以書勉濟濟笑曰牙籌算計俗尚為譏況道人乎古製不立煙㸑草衣樹宿聞道益廣行道益多今人動以規法相繩禮樂鏗鏘舉一狗子無佛性話求其不惑者鮮矣尤云我能據守祖庭利其徒屬能作能為破律喪行恣彼陷溺是何益也濟晚年間著異迹機不厭繁有道人拈拄杖問曰者是誰底濟曰是山僧底曰既是師底因甚在我手裡濟呼曰度拄杖來道人度杖與濟濟曰汝底在甚麼處道人整冠濟曰似則也似是則未是道人大笑又指吉祥草問傍僧曰是甚麼曰吉祥草曰更有吉祥者否僧以足按地道人曰獅子窟中果無異獸濟擯僧出院又僧問得何三昧便乃隨波逐浪濟曰兩岸春風香不斷一溪流水落花新曰怎奈學人不會濟曰蜻蜓飛尚緩蛺蝶舞偏忙曰和尚莫將境示人濟喝僧便作禮濟曰啼得血流無用處不如緘口過殘春濟二十二出家歿年七十有四矣衆知濟有厭世意請留偈濟以手搖曳曰何多事也乃趨寂時嘉靖庚戌之秋也得法者二人一居胥山曰雲谷會一居精嚴寺曰冬溪澤俱以嚴標行話於世贊曰濟公近繼無際遠續斷橋歷觀其始末機智毫忽不爽然前後居無定相惟激勵學者為要務諸莊旱損略不干懷可謂救時之明哲者也尚有以不事事短之所謂盲人問豹與語奇斑哉敬畏空禪師無趣禪師諱如空其先施姓嘉興秀水人也早歲留神內典浮沉於理路文言過僧舍覽傳燈録心目茫然乃執卷求老僧解老僧曰此歷祖真參實悟之要妙也非意識可能至耳空奮發棄家裹幘巾同濟法舟遍訪諸方耆宿抵杭城見封自然值封簷坐補破衲空進問曰和尚補者箇遮寒即是遮熱即是封停針熟視空曰道甚麼空即禮拜封曰點茶來空作舞而出如是經行八載克志勞躬此中尚未廓鬯既歸秀水不復居家東尋西討如遊峰逐世人多笑之適野翁曉禪師來東塔空大喜即走請益曉以本色示空空罔措其指復經三年聞雞鳴始獲慶快乃機投曉公曉以斷橋真脈許空焉蓋曉遡嗣寶芳進進嗣月溪澄澄乃福林度之三世也故曉為斷橋七世之苗裔曉又囑空曰昔六祖能大師自傳衣法潛隱獵隊一十六載方大露布汝宜慎之空即就秀水掩關乃説法曰三十餘年參禮請益十方宗匠問法皆云無説問佛皆云無相幸得無相無説不覺頓空伎倆追昔腳跟失却便宜今喜眉毛生在眼上從斯丟去草鞋即便拗折拄杖拍雙空手入玄關坐看陰陽消長復有一偈窮子還歸長者宅善財參遍雜花林大千收拾毫端內推出虗空掩上門於是嘉禾有道之士爭遊空之門會正信長者經營敬畏菴請空弘持祖道空乃啓關曰自結玄關自活埋自吾閉也自吾開一拳打破虗空竅放出從前者漢來始會名宿就菴披剃受滿分戒主持菴事名傾緇素選部陸光祖常訪道要於空空驀頭生按祖嘆曰澄之不清淆之不濁趣公之謂與一日小參衆方集空喝曰禍出私門便下座乃謂性沖曰有件不了公案來歲中秋汝為我來沖應期而至空大悅説偈俄化偈曰生來死去空花死去生來一夢皮囊付與丙丁公白骨斷橋隨衆呵呵明月清風吟弄時萬曆庚辰也贊曰無趣脫略墨繩真斷橋之後也然竟以一木而支大廈其得不危者幸也歟幸也歟壽昌經禪師禪師名慧經字無明撫州仁和裴氏子也九歲誦孔孟章句即究其義每問浩然之氣是箇甚麼或有笑者或有訝者公皆一舉手而去之遂潛心內典如獲故物年二十一父事廩山忠老宿求忠斬髮忠曰著急作麼待汝瞥地我為汝師公乃刻志苦行三載因見雙林頌有省輒遁迹峩峯又三載讀傳燈至僧問興善如何是道善曰大好山又深疑之因力撼巨石得達其旨乃曰欲參無上菩提道急急疏通大好山知道始知山不好翻身跳出祖師關趨呈於忠忠笑曰吾不汝欺為公圓頂時年二十有七復還舊隱不下山者二十四載遠近賢之萬曆甲午出住寶方有道者過訪曰師住此山曾見何人公曰總未行腳曰寧以一隅而小天下乎公敬諾即杖笠觀方諸尊宿皆珍譽之登五臺參瑞峯和尚峰出笑巗禪師之門公請曰某甲於古德機緣不盡餘疑旦雖遍歷門墻如窺羅縠之月乞慈垂憫下剖愚蒙語畢殷勤作禮峯嘆曰善哉上座以英偉之姿鋭於入道而胸中尚有芥蒂耶如不棄山野試舉將來公曰臨濟道佛法無多子畢竟是箇甚麼曰向道佛法無多子又是箇甚麼公曰玄沙謂靈雲未徹那裡是它未徹處曰大是玄沙未徹公曰趙州勘破婆子未審甚處遭他勘破曰卻是婆子勘破趙州公釋然再拜謝之復獻頌曰暗藏春色明露秋光有眼莫見縱智難量到家不上長安道一任風花雪月揚峰深肯公語叶洞上宗旨而公亦以紹續洞宗自任南還初住董巗遷壽昌中興曹洞其時像教相尚公獨不攀外護嘗誡知事曰萬般存此道一味信前緣每同衆耕耘耆年不怠學侶參尋每將钁柄為禪杖尊賓顧訪且就蓑衣準布袍故有壽昌古佛之稱益王嚮公齎香修敬公漠然不答知事懼叢林所係請稍循時宜公曰吾佛制不臣天子不友諸侯為佛兒孫而違佛制是叛佛也吾豈作叛佛之人哉王聞而嘆曰去聖時遙幸遺此老公三坐道場殿宇禪坊煥然鼎新別建蘭若二十餘所從未隻字干及檀信檀信自歸有引修懺佛事於山中公重詬之曰汝邀一時之利開晚近流斃之端使禪坊流為應院豈非巨罪之魁也以故公之名號所及而古風習習其規繩不整而自肅嘗上堂曰諸佛時常説法不須擬議猜詳是何法天地玄黃宇宙洪荒不論通宗透教只貴直下承當承當箇甚麼雲騰致雨露結為霜蛟龍不宿死水猛虎豈行路傍透得者些關棙何須願化西方不問先佛後祖鼻孔一樣放光化被草木賴及萬方釋迦不肯泄破達磨九年覆藏峩峯不惜口業一下為衆宣揚且道作麼生宣揚揮几云罔談彼短靡恃己長又曰宗乘中事難以措辭大道門庭爭容擬議等間垂一句如大阿鋒離匣逢之者則死不移時似塗毒鼓受槌聞之者則喪不旋踵所謂妙峰峻仞野獸難藏寶樹晶光靈禽莫泊其用也單趂金毛歸野窟直追鐵額入深山掃天下之攙搶拂世間之孽屑提墮坑落塹之類揭迷封滯殼之流其功也使法界世界虗空界一體同觀佛道人道地獄道萬法融會雖然如是猶未為向上事須知更有出格在噫正令不行先斬首大機一發聖賢悲又曰抽筋不動皮換骨不見血筋骨一齊空遊行不倒跌達磨大師解滅而不解生釋迦老人解生而不解滅要知生滅不相干除是當年乾矢橛萬曆丁巳臘之七日公田務歸顧衆曰老僧自此不復作矣除夕上堂曰今年只有茲時在請問諸人知也無那事未曾親磕著切須綿密作工夫越三日告寂衆悲惶不已公復展目説偈慰之為留旬餘裁書遍辭鄰壁道俗更自作偈令侍僧舉火至十七日晨起盥漱拭身曰不必再浴矣乃大書今日分明指示擲筆而逝其年七十有一依命闍維侍僧宣公所遺之偈曰無量劫來秖者箇今日依然又者箇復將者箇了那箇者箇那箇同安樂火光忽成五色諸牙頂髻不壞就寢堂建塔藏之其門人無異來已開化博山矣
