body:
  text: 徑山無準範禪師無準禪師者諱師範蜀都雍氏子也九歲依陰平山沙門試經目不遺照紹熙五年具戒訪道乃求坐禪訣於老宿堯公有信入即出峽謁佛照光禪師光曰生緣何處對曰劍州曰帶得劍來麼師便喝光笑曰者烏頭子也亂做又過靈隱參密菴禪師密菴不易見乃入破菴先首座之室先與語陰奇之一日要師遊石筍菴有道者問胡猻子捉不住時如何先答曰如風吹水自然成紋師恍然大徹失聲曰諾先大喜而歸師遂事先公赴穹窿蓋先以師深得玄要主賓之旨可倚重正宗也先公移居臥龍師辭遊天台尋開法明州清涼以香酬破菴先公於是吳越知名師初寓瑞巖夢偉衣冠者持茅授師及至清涼見伽藍像即向所夢者也茅乃神之姓焉三年遷焦山次三年遷雪竇有大名者皆歸之乃示衆曰面面相看眼眼廝衣外別傳有甚憑據到卻門前剎竿著鳳栖不在梧桐樹又曰地思量無可得思量無可思量處真箇好思量大庾嶺頭逢六祖鰲山店上見曾郎又曰賊火相逢恰五更現成贓物不須爭暗中多少都分了天曉依然各自行又曰日面月面突出難辨擬欲擡眸空中兩片師居雪竇三年詔補育王又三年住徑山居無何徑山知事者懼師引咎自歸一衆咸安師整頓荒基說法如故仍請希叟為副寺退耕為監院別山智為化主雪巗欽為座元未久寺成朝旨召入慈明殿升座師舉賓頭盧尊者赴阿育王宮因緣乃曰君王一語出如綸尊者眉毛八字分四海風清烟浪靜碧天無際水無垠上大悅賜金紋袈裟號佛鑑禪師六年徑山復之夕風雨暴作師端座別舍漠然不問且笑且吟曰雨散雲收後崔嵬數百峯王維雖妙手難落筆頭踪仍結茅安衆寺復成又去四十里別築萬年正續以憩雲水不遠復建精舍為歸藏所藏前後所賜宸翰敝室左右奉祖師與先世香火或期誕諱必為飯僧佛事以贊冥福蓋蜀亂師之先祀絶矣故祠之上聞嘉嘆賜名圓照菴淳祐戊申又小築於明月池上為退休計師臘既高綸音次序存問不間師惟歷書古德機緣謝對而已或大賓過山師獨揭心宗要領間咨南比國運師俯首一默而已己酉三月望升座曰山僧既老且病無力得與諸人東語西話今日勉強出來從前所說不到底盡情向諸人面前抖擻了也乃起抖衣曰是多少遂區囑後事復手書達上言別上遣中使慰問後事師曰來時空索索去時赤條條更欲問端的天台有石橋移頃而寂塔於圓照菴嫡嗣有雪巖欽禪師贊曰南堂謂師居五峯法席之盛不下妙喜時也衆多糧少而重罹回祿不無奔走四方之勞想見其曲折苟非以荷負正宗為心則安能籧篨若此嗚呼南堂其知言矣別山智禪師別山祖智禪師者蜀人也其先楊姓世有顯任智既生正信之家幼絶世緣七歲紹印沙門化為行童授以圭峯圓覺敘脫口成誦宋嘉定癸酉試所習得度其年十四矣又五年參牛全於昭覺經二載苦制話頭不敢展衾每至後夜或假寐而已偶聞姑蘇僧誦殺六巖法語字字皆點著自己禪病時巖住姑蘇之穹窿山智徑走見以古德因緣求指巖惟瞑目端坐展掌示之不決請益巖如前無它語於此又二載智所求益哀巖竟不換機智乃擬簡藏經融會本參因閲華嚴善財入彌勒樓閣見閣中有無量不可思議諸佛境界有省默舉祖師公案皆會節目舉似於巖巖方啓齒曰靈雲見桃意在甚處對曰萬緑叢中紅一點幾人歡喜幾人嗔巖以為然乃可之智復遍歷名席俱獲美譽渡錢塘遊天台友斷橋倫見無準範禪師於雪竇範棒喝風馳智結舌不能仰對範每受參垂問智每擬當機瞻視範公不能進措一辭乃私嘆曰我生平所參所悟底皆死法也死法何濟哉乃盡捐宿負堅依範公久之於範公棒喝中大通妙旨遂呈偈曰用盡工夫夜欲闌東挑西撥見還難無端豆𪹼寒灰裡便把柴頭作火看範公遷育王徑山智皆負包與俱徑山知事者多懼勸範棄之智曰不可昔南禪師住歸宗歸宗被火有司責其咎南尚順而居之以故南公之名大重今徑山雖火而時清道泰且堂頭和尚以咎自歸無棄去之心我輩為人子臣當仰體君父之心父子君臣道合反廢為新庸何慮焉智於是自充化主而殿閣樓臺從鼓舞中湧起五峰矣嘉熙二年出住洞庭之天王寺以真言實踐接納方來然好貶剝諸方江湖以智天王哂之癡絶冲嘗問洞庭來僧曾見智天王否對曰學人適從天王來曰尋常有何言句僧舉天王示衆語曰帶鎖擔枷招罪犯安禪入定坐深坑兩頭踢脫無依倚一箇閒人天地間冲笑曰恁麼則智天王罪過不少丞相遊公侶以西余虗席請智補之未久智自西余荷䇿遷金陵之蔣山參徒蟻聚名滿淮南悅堂誾道者初遊吳聞智尋常怒氣噀人不減居天王時乃謁智智問曰是何法諱對曰祖誾近離何處對曰江西曰馬大師安否對曰起居和尚智拽杖便起誾躡履便行侍僧問曰適來者僧未知留否智笑曰是必去也侍僧出訪旦過堂果去矣誾住後乃曰我當時只肯別山收不肯別山放寶祐四年天童火無少剩州帥吳公潛以疏聞上上以智居天童智曰擕吾白骨以伴青山足矣興復之事豈吾望也遂於瓦礫堆中搆草廬以安衆三載之間松關盡處青山捧出梵宮而壯甲東南焉智處衆能耐小節深得衲子之心衲子互相頌曰吾師諱祖智即弘智再來也景定改元九月朔示衆曰雲淡月華新木脫山露骨有天有地來箇箇眼睛活乃掩室復令傳語曰不及相見各自努力越十日珍囑後事叉手捐世壽六十一坐四十七夏塔於中峯贊曰我師翁悟老人新天童時修輯歷祖石塔余得見智公之塔圮於荊棘叢中及考天童中興圖志惟公大有功於天童者也公初事無準居徑山以大義鼓舞遽成五峯樓閣後公居天童不三載而重興莫大之精藍亦座下有其人而鼓舞之嗟乎非忠於事上誠以接下曷克有此哉淨慈斷橋倫禪師斷橋和尚名妙倫姓徐氏台之黃巖人也弱冠欲入瑞巗鄰寺出家其父兄不許強倫治生産倫不樂業乃遁永嘉圓頂於廣慈寺受戒歸省得問道於瑞巖谷源禪師源以麻三斤話示倫倫大疑之如面千尺鐵墻因鄰僧讀楞伽經曰蚊蟲螻蟻無有言說而能辨事倫有省會無準範公中興雪竇雪竇風峻禪者不易上謁倫下包直趨方丈左右莫能止範公怒曰甚處來底對曰瑞巖曰到此何為唐突若是耶倫從容進曰實為己躬事切來呈似耳曰有甚驢事馬事試舉看倫乃陳其所得範曰狗子因何有業識倫進語範不顧如是滾滾不住連進三十語範俱不顧擬再進語無可湊泊者乃跪泣請曰師寧無方便乎範公憐之以古頌示曰言有業識在誰云意不深海枯終見底人死不知心倫悚栗沉吟忽聞板響通身汗下連拜範公足下範笑曰我不汝欺也倫弗吐一詞而出範公移居育王徑山倫皆從而相之是時出公門者雪巖欽別山智等各化一方稱有道焉倫亦領祗園小剎據室燒香甚有大體一時名衲趨其座下院窄無所容移居瑞巖又移國清倫為人徑直無諱好釆羣言評量古今議論既出如束濕薪然皆援經據史如披曉鏡人以為博物宗匠若智若愚爭識一面而後已晚居淨慈嘗謂衆曰荊山有玉獲得者不在荊山赤水有珠拾得者不在赤水衲僧有無位真人證得者出入不在面門橫按拄杖曰會麼幽州江口石人蹲又曰德山低頭夾山點頭俱脂竪起手指頭玄沙築破腳指頭拈拄杖云都來不出山僧拄杖頭何以見得卓一卓曰一葉落天下秋又曰達觀頴云七佛是性隸萬法是心奴且道主人翁在甚麼處自喝云七佛以下出頭又自喏云各自祇候喚七佛作性𨽻指萬法為心奴達觀自謂有出身路及其自喝自喏又是奴𨽻邊事主人翁何曾夢見在要會麼揮拂云曉來一陳春風起開遍園林百樹花倫晚年罷上堂一日忽挂牌入室已而謂衆曰斯乃老僧末後一場搬弄也復問誾上人曰臨濟三遭黃檗痛棒是否對曰是曰因甚大愚肋下築三拳對曰得人一牛還人一馬倫怡然撫几曰後當有人據此為你證明在誾號悅堂後嗣介石朋遂以後事分付門人方山寶竹屋簡又裁書別諸方知己魏國公閲倫書大驚即遣使問曰師生天台為甚死在杭州倫微笑以手指左右曰日出東方夜落西其使擬拜倫已化去贊曰斷橋和尚以英偉之姿入雪竇範公之門始知肘後靈符不從人得及出世而簸揚淘汰可謂精於得人矣以故方山寶輩數傳而世其家諸方稱之曰斷橋一脉有以也不然則如世暴流朝盈夕涸而斷橋一派嘉聲何從而挹之徑山冲禪師禪師名道冲字癡絶出武信荀氏少為書生精通六藝有聲然數困棘圍冲自解曰無憂也非當成我出塵之志乎竟剃落於梓州妙音院具戒出蜀放浪於吳楚間藐諸宗匠而不願見也當此之時曹源生禪師唱密菴之道於妙果冲幾擬進謁復中止流連講肆惟見禪者接足往來妙果且頌妙果之機用冲心計生公若無長處何得人心若是耶乃奮起往見與生酬對數語深畏之求侍左右不去者一年生公宗乘玄旨冲俱領會但於拳棒交馳似有所滯且屢呈伎倆生屢拂之冲恨辭去曰尚餘一雙窮相手要向諸方癢處𭺗竟去歷諸保社信宿即行又見靈隱嶽嶽又不諾冲又擬去乍遇故友挽之住經八餘月或告嶽曰冲君才華非易得也不以方便接之其失士乎嶽曰我已八字打開渠當面錯過卻怪阿誰冲聞之口耳俱喪徹見生公妙用乃北面妙果而拜之曰幾負吾師幾負吾師住後嗣法曹源生初江湖衲子觀望不歸及其開堂接納星飛電捲老師宿德稱善於是衆歸如雲上堂有僧問心佛及衆生是三無差別如何是過去心曰放待冷來看如何是現在心曰你問我答如何是未來心曰後次上堂向你道如何是過去差別智冲以拂子擊禪牀左如何是現在差別智冲擊禪牀右如何是未來差別智冲向中間一點僧乃禮拜曰心佛衆生無向背十方剎海一毫收冲曰過去心不可得現在心不可得未來心不可得三心既不可得喚甚麼作差別智若人見得徹去三世諸佛無一時不在諸人頂𩕳上轉大法輪更來者裡挨肩並足討甚麼碗以拄杖一時趕散冲初住嘉禾光孝次遷蔣山蔣山瀕江多惡歲艱於行乞一衆有菜色冲振起謂之曰我佛祖門風處違常順且饑寒凍餒獨非佛事乎況法喜之食食無窮也即自擕布袋日走街坊不以風雨自間每回必命鼓集衆提持不倦如此一十三載如一日叢林不窘有詔移居天童會育王又虗其席以為冲善荷大衆請冲攝理之乃小參曰天童用底來育王用不著育王用底來天童用不著用不著處用有餘一箭雙鵰隨手落晚遷徑山一日上堂曰世尊生平用盡伎倆及其摩胸告衆求生不得生求死不得死山僧則不然要行便行要去便去八臂那吒攔不住移時坐寂焉冲善書暮年尤好之然所書者皆先覺古德警䇿偈頌無雜言也有學士求書欲冲自撰詩文冲諾即命引紙乃大書摩訶般若波羅蜜七字學士笑曰仍是舊底冲以手婆娑曰我不敢輕慢你等你等皆當作佛贊曰田單持不二心以守節即墨不逾年下七十餘城還之於齊可謂壯矣冲公以妙年持不二心入道蹶然紹生公一脉於將絶未絶之際且處違常順奠蔣山一衆於風雨飄搖中俾曹源生公之道復振於時不亦偉哉天目禮禪師天目禪師文禮者字滅翁生阮氏為臨安籍也得度於真相寺智月沙門得道於薦福松源嶽禪師出世於郡之廣壽次則雁山能仁復詔居南屏淨慈終於天童者蓋赴暮年之詔也四會談禪兩赴明詔於其西丘福泉乃退閒之所也禮居雁山時南國衣冠君子多從之遊禮杖拂蕭然清風迫人松下雲間泉聲石色無尊卑目遇而已然卒不樂乃退居梁渚西丘自述曰我自南山退席回懶將藤杖接方來有時拄到晴坡上簡點梅花幾樹開方是時晦菴居士朱熹者以道學開館台南訂有司挽禮再居能仁不起乃作偈簡雁山耆宿曰我拋一語墮龍湫逗石穿雲幾度秋白髮詎那看不透月寒高挂冷猿愁禮既休閒於梁渚道俗相尋不絶禮多兀坐繩牀熟視搖手而已或格外相愜禮自理瓶鐺談笑連朝夕不厭也節齊趙公慕禮高行微服過訪坐語竟日節齊去禮竟不問其姓名適淨慈席虗節齊起禮補之不赴節齊乃言於上上強命之入院禮曰九重命下四海同欽山嶽歡呼禽魚起舞且物外道人因甚也被轉卻順是菩提四衆稱善未久又杖䇿宵遁退居福泉上惜之復敕天童居禮禮居天童常以南山筀笋東海烏鯽話驗方來擬對禮輒督牙三下識者驚焉一時及其門者非智過於師不易放行故自書曰無韶陽來扣門終不拶人腳折有德山至詰問方才吹滅紙燭堪嗟狐媚妄相嗣續寧教草滿法堂苔封古屋楊岐不得保寧白雲晦堂若非死心靈源其餘碌碌難為接足禮住天童不久又棄歸西丘舊隱然方賓益勝朱晦菴嘗詣禮禮以格外瀟灑示之晦菴則彬彬然有容整冠進問母不敬禮驀起叉手晦菴退語人曰碧落果無贋本也楊慈湖亦問不欺之力禮答曰要明兔象全提句看取升階正笏時禮四歷住持僅八九載而退居之日多其風調高古見者神肅然敘及法道體勢則慷慨太息或繼以涕故嗣其志者皆著大名於當時淳祐十年冬月忽晨起謂衆曰誰與我造箇無縫塔侍者曰請師塔樣禮微笑曰盡力畫不出即蛻去年八十有四矣闍維頂骨牙齒不壞舍利如燦珠附天童應菴祖塔之左而閟焉贊曰余核公道行垂手三十餘齡四遷五退如白雲影內神仙可仰而未可攀也再味其說法若志公之容謾許僧繇描摹當時君子以公之名齊於妙喜應菴誠不謬矣天童如淨禪師如淨禪師字長翁奇逸有遠大志受可印於足菴不屑肥遁廣諸方便經其笑詈者皆脫略成器故嘗開會浙江左右六坐名坊而淨慈天童最久焉其升座曰有問有答矢尿狼藉於是眉毛慶快鼻孔軒昂直得大地平沉虗空迸裂正當恁麼時且與宏智古佛相見竪拂云相見已了合談何事從前汗馬無人識只要重論蓋代功開爐打圓相召衆曰箇是天童火爐近前則燒殺退後則凍殺忽有漢出來道作麼生㘞火爐動也又曰螟蛉子殪而逢蜾祝之曰類我類我天童門下莫有類我者麼萬里不挂片雲天地一團猛火又曰陸修靜陶淵明文殊普賢作圓相云咦一欵具呈且道憑誰批判若是孔夫子吾無隱乎爾有覺禪者親依年久夜分請決於淨淨曰我困倦旦去明日為你說覺念日月蹉跎含涕而出露立待旦整威儀入室淨憐之乃上堂曰一箇烏梅似本形蜘蛛結網打蜻蜓蜻蜓落了兩邊翼堪笑烏梅咬鐵釘覺傍失聲曰早知燈是火飯熟已多時淨便喝識者稱淨險要頗類雲門其縝密實如洞山但未見稟承何人或間請曰師唱道多年名滿叢林高足已闡化方得法源委乞明指示淨良久笑曰涅槃堂裡向汝道有本云涅槃堂裡看又示衆曰古人大雪滿長安天童賣却者心肝無神通菩薩猛劈一椎千手眼大悲揑怪多端還會麼獅子教兒迷子訣老婆心切不相瞞淨年六十六忽命侍者設香案聲鼓集衆拈香嗣足菴焉其語曰如淨行腳四十餘年首到乳峯失腳墮於陷穽此香今不免拈出鈍置我足菴大和尚足菴名智鑑鑑法嗣天童玨玨嗣長蘆清了了字真歇乃丹霞子淳入室之子也是淨為青原下十七世之正裔初足菴鑑公為兒時母與洗手痬執鑑手曰好似箇甚麼鑑曰似佛手親歿即從長蘆真歇禪師得度玨首座器其進止端莊以方便示鑑鑑即隱象山屏絶諸緣一钁為伍廓達玄旨復就玨玨可其見處鑑住後以枯淡集方來晚年徙居雪竇座下明眼衲子皓首相依如淨以柏子話請益鑑鑑本色䇿之淨乃領悟曰西來祖意庭前柏鼻孔寥寥對眼睛落地枯枝才𨁝跳松羅亮格笑掀騰鑑曰老成持重為人天眼聲光曓耀非我所望淨既受記莂乃重其師訓半生開化不邀虗名又疾時輩稱越繼故臨末際方示法源乃召衆曰六十六年罪犯彌天打箇𨁝跳活陷黃泉咦從來生死不相干奄然長往贊曰丹霞大隆洞宗之後而濫之弊駸駸有矣長翁舉措風規無乃塗毒鼓不容側耳抑識法者懼乎但其入理深談不滯玄微真洞下獰龍而雲行雨施詎可量哉上都華嚴全一溫禪師禪師名至溫字全一邢州郝氏子為天童如淨禪師八世之裔也性敏捷不易出語語則合度六歲從萬松秀禪師祝髮為大僧是時萬松之庭多俊杰會僞金章宗明昌四年即南宋光宗紹熙四年癸丑召秀說法於內廷其王親貴戚羅拜求示秀俱無言說惟合爪當膺而已溫大疑其所以乃請問於秀公秀公拂之溫益疑遂心計曰至道雖玄非言莫顯師於佛法得無吝乎一日見僧問秀曰是處是慈氏無門無善財為甚道琉璃殿上無知識秀厲聲曰折却殿了與你相見溫不覺失笑秀顧溫曰笑甚麼對曰可惜打破瓦秀曰打破後如何溫又無語然溫博學強記與雪庭公往還辨論裕每譽之秀公遷大都仰山之栖隱寺丞相耶律楚材常問道栖隱因與溫甚善會同學林泉倫上座出住萬壽溫以大事未了為愧且憂憤成疾久之乃得秀公之旨於是機不可攖秀公暮年常課華嚴門下得法者雖一百二十人惟溫最愜公意其金都應酬悉以溫代之秀公歿會元主伐金溫開法華嚴林泉倫繼席報恩其道價齊重於京都元主研究三教典籍以為宋徽宗不業三教正經侫於方士丹升之說以至亡國詔有實學之士較諸道藏僞撰除道德南華外盡行燒命林泉倫於大都憫忠寺舉火是日傾都傳聞士庶畢集倫乃以火炬打圓相云諸仁者只如三洞靈文還能證此火光三昧也無如斯會得家有北斗經枉教人口不安寧其或未然從此灰飛烟滅後任伊到處覓天尊急著眼看便燒之衆口雜然稱正時至元庚申也即南宗景定元年元主將西征有嫉我教者遂奏議曰釋氏雖托方外然多忠烈之輩今五臺等處僧徒有能呪術武略及膂力者宜募為部伍扈從西征可為開國之一助也溫聞大驚乃顧楚材而折其說楚材亟白元主曰釋氏之高行者必守不殺戒奉慈忍行故有危身不證鵝珠守死不拔生草者法王法令拳拳奉行雖死不犯用之從軍豈其宜乎若不循法律者必無智行在彼既違佛制在此豈終王事哉一舉兩失實不可也元主遂然之太保劉秉忠以僧服而輔元主元主甚敬之忠曰臣乃宇宙之廢品耳何當聖眷此有萬松秀禪師之高弟名曰至溫唱曹洞宗旨於上都華嚴寺其學兼內外道貫天人陛下若詔而賓之必充擴仁風為蒼生之依賴也於是溫入內廷與元主朝夕論道元主嘗恨相見之晚河北諸禪剎自宋政和以來加之遼金壬辰兵穢祖庭未得興復元主敕立禪僧為主持於是三河寺院沛然興矣燕趙秦晉之間洞室宗風大鬯皆溫之力也溫居內庭三載如一日辭還錫號佛國普安大禪師至元丁卯五月即南宋度宋三年示疾沐浴更衣而逝異香三日茶毗舍利無數四衆分塔而祀之贊曰朝生鳳雛自與千歲玄鶴同途而異轍余觀溫公驅烏於萬松之庭其胸中固已吞雲夢八九耳及演化大都果遠出羣賢之上然兵火之餘能使王公貴人信有此事非氷霜潔行不足以感之今人獨味萬松評唱之語而不聞公有回天之力何哉余故表而出之為洞宗之威鳳云
