body:
  text: 北平慶壽簡禪師禪師名印簡字海雲山西寧遠人也得道於慶壽璋禪師璋字仲和乃天目齊之裔也齋參五祖演和尚得演記莂遂隱天目當其時出五祖之門者化徧南州而三佛之裔稱盛獨齊公居天目甚枯淡法席寥然暮年始有嬾牛和上座紹齊之法而和之枯淡尤甚僅得竹林寶寶得竹林安安傳容菴海海之名頗著乃有中和璋璋之下有印簡出焉簡出則齊之道大於北平矣簡本出儒家有生知之質其父宋氏授以孝經開宗明義章簡掩卷進曰開者何宗明者何義其父愕然提其耳曰孺子可教也時方七歲於是古今經緯之學一目輒知要領然疑喜怒哀樂未發以前之理不遑寢食乃盡捐宿學走事中觀沼禪師每發問端沼每止之沼老常命簡扶行偶下堦簡掣沼公之手沼咄曰者埜狐精簡恍然而諾沼乃遣簡行脚簡既飫遊孤䇿過燕京雨阻松舖中途夜宿巖下因擊石火劃然大悟乃捫面曰今日始知眉橫鼻直天下老和尚信不寐語矣遂達慶壽通謁於中和璋公公先夕夢異僧䇿杖竟來方丈據獅子座晨起而心待之簡果應期而至璋大喜受展問曰你曾到此麼簡對曰印簡不來而來作麼生相見曰切莫打埜榸簡曰石火迸裂眉橫鼻直曰吾此處別簡曰如何表信曰牙是一具骨耳是兩片皮簡曰將謂別有曰錯簡喝曰草賊大敗璋笑而休次日璋公以臨濟兩堂首座下喝機緣令簡下語對曰打破秦時鏡磨尖上古錐龍飛霄漢外何勞更下椎曰你只得其機不得其用簡掀倒禪牀璋曰路途之樂終未到家簡與一掌璋曰只得其用不得其體簡曰青山聳寒色月炤一谿雲曰只得其體不得其智簡曰流水自西東落花無向背曰要且沒交涉簡震拍其兩掌是時左右皆為變色璋公乃曰如是如是遂命掌記室而師資如水乳也元世祖辛卯年簡主慶壽衲子不懼苦寒趨歸法會而禪牀幾至折脚其都中貴人多雜遝門下簡一以璋公真率之風應之無不悅服葢璋居慶壽受公卿之刺從未以名姓干復之然以祖意徵扣則忉怛往返不留餘地也一日簡於廊下逢數僧乃問曰那裡去一僧對曰賞花去第二對曰禮佛去第三對曰那裡去第四僧無語簡俱以棒打之復問第五僧對曰覓和尚去簡曰覓他作甚麼曰待他打時還他一頓簡曰將甚麼來打曰不將棒來打簡連打曰者掠虗漢眾皆走散簡召曰諸上座眾同首簡曰是甚麼乃趨寂諡曰佛日圓明大師贊曰簡公據無師之智出家行脚徧閱尊宿而後扣中和室投機之語盤旋密運稱可觀矣公不假能事而起天目齊幾湮之宗則老東山之面目儼然豈非巨冶無分金之體而千江有得月之機乎徑山高禪師妙高禪師者號雲峯閩之長谿人也其母夢池上出大蓮花有嬰兒合爪坐華心以手捧得之而娩故小名夢池幼明敏好學諸老宿皆以奇童稱之愛其吐詞有關聖化年未及冠忽記宿因乃棄業為大僧一錫吳楚首參癡絕冲冲以道德文章傾動一時高微露風采冲大喜曰此子有冲霄之質若堅其羽翮飽足秋風實吾宗之望也因指見無準範範公不近人情及陞堂入室高對語雍容範甚器愛已而復見偃谿聞禪師聞住育王使高司藏鑰一日聞公顧高曰不道子無見處老僧只道未在高對曰未在底正是妙高受用處聞曰牛過窻櫺頭角四蹄都過了因甚尾巴過不得高連下語聞但搖首曰未在高詞窮愧汗橫流仰面視聞聞震聲曰過也過也高忽徹乃踴躍作禮曰鯨吞海水盡露出珊瑚枝聞公笑曰子此回可以說禪也於是從聞遷南屏適宜興大蘆虗席勤舊請命於聞聞以高主之及行聞乃謂高曰先師浙翁琰和尚甞云我自離佛照老人之門一味因時度日不敢過為葢恐辱吾老人也嗟乎先師德業冠世猶其競業若此汝今此行當體先人苦口使大慧門風不濫則足矣餘何圖哉高既居大蘆四眾知名遷居江陰之勸忠寺又遷霅川之何山景定間有詔移高居蔣山上堂曰世界未形乾坤泰定生佛未具覿體全真無端鏡容大士鷹巢躍出𠢐破面門早是遭人描摹那更缺齒老胡不依本分遙望東震旦有大乘根器迢迢十萬里來意在攙行奪市直得鳳堂鼓響阿閣鐘鳴轉喉觸諱插脚無門合國難追重遭訐露蔣山迫不得已跨他船舷入它界分新官不理舊事畢竟如何戌摟夜貯千峰月塞草閒鋪萬里秋元兵渡江或請避其鋒高曰盡大地是戈矛汝擬向何處去避山門否泰在我一人汝勿復言兵至有迫高索金者以刃擬高高延頸曰要殺便殺吾頭非汝礪刃處即有金乃十方物也終不敢奉君以求生執刃者悚然目之捨而去丞相伯顏勾戟長鈹環錯而進高趺坐繩牀不涉言色顏公甚致敬焉乃捨牛百頭糧五百石後伯顏問道於靈雲定禪師乃言蔣山高公有德圓通之雅量惜當時軍務在握未及盤桓元世祖庚辰歲高遷徑山席未溫寺罹於火眾有咨嗟下涕惜其舊而難其新高曰興廢繇人法無定相於是整理火場而安眾曰五峰峭峙到者須是其人一鏡當空無物不蒙其照祖師基業依然猶在衲僧活計何曾遷變著手不得處正要提撕措足無門時方可履踐直待山雲淡泞㵎水潺湲一曲無私萬樂業正恁麼時功歸何所車書自古同文軌四海如今共一家閱九年徑山復舊戊子有毀我宗於朝廷者以為禪說不合聖經高聞而奮起曰此宗門大事也吾雖老尚強一行至京得旨集諸宗徒廷辯元世祖問禪以何為宗高對曰淨智妙圓體本空寂非見聞覺知思量分別所能到惟悟得證宣問再三高歷舉西東諸祖至德山臨濟棒喝因緣大抵禪是正法眼藏涅槃妙心趨最上乘孰有過於禪詞旨明徹朝廷震動乃宣高進便殿賜坐又宣百法論師仙林者與高持論仙林曰昔佛始從鹿埜苑終至䟦提河於是二中間不曾說一字五千餘卷且道自何而來高答曰一代時教如標月指了知所標畢竟非月仙林曰如何是禪高以手打圓相仙林曰何得動手動脚高曰上座講得千經萬論且道者一圈落在甚麼法門仙林不能對乃避座稱謝高曰似則也似是則未是世祖大悅左右皆呼萬歲於是天下禪風大振徑山復火高曰老僧宿負此山耳又力營建不三載以次落成南北禪流大集或請高說生平行實高笑曰衲被蒙頭萬事休此時山僧都不會竟入滅時世祖十四年癸巳也閱世七十五坐五十九夏塔於寺西贊曰妙高禪師出居雙徑席未煖而寺遭能以堅忍力而復新五峰樓閣其事蹟灼類無準年垂七十尚抵京廷辯又類淨因成之逢善華嚴忠國師之騐大耳三藏嗟乎豈非蛟龍鬬則水勢洪金石擊而火光烈所謂小出大遇千秋一合者耶靈雲鐵牛定禪師禪師吉安王氏子也名持定久依雪巖因陳頌得號鐵牛其頌曰鐵牛無力嬾耕田帶索和犁就雪眠大地白銀都葢覆德山無處下金鞭欽公曰好箇鐵牛兒故人以是稱之定初得度於肯菴勤禪師處常讀雜華經以為積功累行修行曠劫始得成佛復自忖曰審如是眾生無有成佛之期耶乍聞教外別傳之旨身心踴躍疾走參雪巖欽公乞居槽廠喜作淨頭欽憐之曰禪者無太勞乎定對曰欲求無上妙道豈敢言勞欽示以偈曰昭昭靈靈是甚麼眨得眼來已蹉過廁邊籌子放光明直下原來只是我定不領旨一日欽示眾曰兄弟做工夫若也七日夜一念無間目不交睫無箇入處斫取老僧頭去定益愧勵曉夜參究忽染疴自取觸器就坐屏處單持正念目睫不交者七日至中夜頓覺山河大地覿露真常良久如聞擊木聲遍體汗流其病亦瘳舉似欽公欽復憐之曰百尺竿頭進步為奇定更加精進經六載欽公垂問亡僧死了燒了向甚處去無酧對者欽代曰山河及大地全露法王身定乃洞徹言下厲聲曰和尚舉揚般若驚得法堂前石獅子笑舞不休欽曰試哮吼看定曰劫外春回萬物枯山河大地一塵無法身超出山河舉笑倒西天碧眼胡欽敲香几曰山河大地一塵無者箇是甚麼定作掀禪牀勢欽公笑曰一彩兩賽乃辭欽去流覧名勝山水有以巨剎相挽定概不欲居乃曰人勞於前我逸於後其可乎至衡州酃縣過桃源山眷其幽䆳刀廬於桃源桃源深處人跡罕到烟霧晦冥而山君水王出沒無時定以迷悟因緣示之授其五戒於是神靈呵護未久叢席大成號曰靈雲寺定為人好培養衲子四事周備間與談論靡所不至然自受用處數十載一折脚木榻而已遇人無貴賤危坐燒香清茶對話竟日夕無倦色常有士夫過訪顰歎不堪而去伯顏公入山問道聯牀旬日臨行定倚杖門送曰公今生失脚墮於尊貴一念不來即來生也再若失脚山僧無奈公何矣會公除政府欲疏朝廷賜定衣號定曉以偈曰大地山河一鐵牛多年忘把鼻繩收堪嗟槐國人如市旦暮笙歌閙畵樓顏公發柬以示僚屬其挂冠歸田者數人而在朝辦道者甚眾大德壬寅冬手書長語示眾其略曰塵世非久日銷月磨桃源一脉三十年後流出一枝無孔笛虗空吹起太平歌癸卯春泊然坐化閱世六十有四坐三十三夏函全身於陶器瘞於寺北沙潭三年後啟視之爪髮俱長顏色如生贊曰余讀中峰廣錄至題定公贊有茶陵千仞靈雲寺聲播元朝數百州之句默想公之為人必大有可觀中峯故歸重之如此及簡燈錄見公投機頌如多寶佛塔湧起虗空人人得而瞻仰益知公悟處的當與高峰齊名宜矣悅堂誾禪師禪師祖誾者南康人也號悅堂宋端平改元生於周氏連眉秀目神氣奪人年十二聞鐘聲嗒然自失即厭家居乃辭親求出世法轍受業於嘉瑞沙門日閱大乘經論夜則禪坐或枯立終宵栖賢法師誘誾入講筵誾曰講經能了生死否曰代揚佛化廣利羣生況自了乎誾曰誰是羣生者法師駭歎曰沙彌再來人也誾於是倍加精進因閱華嚴入法界品有所省發乃受具足戒東遊蔣山見別山智語在智傳中智甞稱曰誾江西氣品它日有過人處雖然也是六月梅花且指見斷橋斷橋歿別參介石朋禪師朋曰道者何來對曰長橋分埜岸一棹舉湖心曰空山雲面合何處覓形踪對曰一聲金磬動獨露萬機前曰先賢無字語不妨速道看誾擬對朋便打自此服勤於朋見朋不敢仰視一日朋忽召誾闍黎誾趨諾朋曰趙州庭栢話作麼生會擬進語朋擊曰何不道黃鶴樓前鸚鵡洲誾深契妙旨乃西還隱廬山會東巖日住圓通諸山以晚輩藐日話不行誾故移杖就訪值上堂誾出大展然後進問曰如何是佛日曰仁者問佛那曰實是某甲疑處日呵呵大笑誾喝日便打日尋知誾乃設特位尊之誾謙就半座凡遇大參入室必展拜益重其禮或竊笑其迂日怒責曰無我之風杳不聞矣非果地至人難以至此汝輩敢忽之耶是以圓通法席之興多誾力也九江錢刺史以西林聘誾說法廬山宿衲多起就爐韛甞勘僧曰微塵諸佛在汝舌上三藏聖教在汝脚底何不瞥地去僧罔措誾便喝又勘一僧曰釋迦彌勒是它奴它是阿誰擬對便打又問新到何處來對曰閩中曰彼中佛法如何住持對曰饑餐困眠曰錯僧曰未審此間如何住持誾拂袖歸寢室至於移開先遷東林眾滿五百人宗廓人室誾曰溪聲盡是廣長舌且道說的是何法廓大悟誾乃以布衲授之有僧進曰明眼英靈滿師座下未見肯可今以大法頓授初參可乎否耶誾展掌曰會麼僧默然誾曰將謂山僧多少奇特元貞初賜通慧禪師號併紫法衣大德間補靈隱年七十五說偈而歿其偈曰緣會而來緣散而去撞倒須彌虗空獨露宗廓繼席東林聞訃亦說偈歿廓號無外首住雲居以自強著節志士仰之贊曰余簡介石朋公之語不多得矣獨見其因行掉臂間遂使悅堂廉纖脫盡信哉魚腸匕首立可斃人宗廓之嗣悅堂也顛末一致可謂肖子區區蜾負而祝似我者何足道哉匡廬一山萬禪師禪師了萬者號一山臨川人也其先金氏為江右顯族萬生貌瘠而秀氣格精厲八歲指揮羣小肅若朝堂又八歲好學以淹愽著聲每嘆孟軻氏未達性理同輩驚其狂萬曰聖賢亦猶人也何無是非眼目乎乃毅然求佛為師竟於金谿常樂院棄髮是夕芝產戶樞院主卜之得乾之九五占者曰剛徤中正聖徵也當為法王萬遂遊方徧見名宿得旨于東叟頴住後甞謂及門者曰我當時初參偃谿聞尊宿聞以為我齒牙超邁每同商略古今間謂我曰子姿質銛利山僧實不及子但有一著若識得山僧在子脚底我雖不測棄去未甞不珍味其語又見靈隱荊叟珏禪師亦蒙隆遇珏曰近日法社凄凉尠合中道太過者生易不及者生疲疲病庶幾可振易病難醫何也佛祖境界非世聰之可測度彼時雖銘其說不能當下慶快如是展轉所歷非一大抵遮前護後遂乃撥妄求真及到南屏惟吾師東叟頴和尚能捋下鐵面當眾以如意指我曰萬書記文彩燦爛應酧時機則不無管取涅槃堂裡一字也用不著彼時我心識俱喪乃強曰何也吾師曰別人根鈍不得利子則根利不能鈍我對曰豈無方便師曰又恁麼去也自此啟口說不出舉筆寫不出一日偶經神祠見紙錢灰旋風飛起盡亡所執吾師遂以妙峰師翁禪板如意交付於我我今日舉著大似一回喫水一回咽矣妙峰名之善玅喜之嗣也萬為人鯁直少含蓄好樊勵後學見有小善可錄必展轉發明人亦不敢偽或有過則曰人非聖賢孰能免焉改之為貴人亦不敢飾至若事關法化知見差訛則切直千餘言猶不已當時以此憚而懷之初住天台之寒巖寺三年移仙居之紫籜山大闡法化有僧問曰紫籜山庭如錦繡是誰按拍畵圖中萬曰深沙休努眼僧顧左右曰道甚麼曰碧水浪吞鈎僧曰將謂歌謠風日煖元來鼓角陣雲深曰八千子弟歸何處消瘦秋空一笛霜僧曰恁麼則山河無意屬英雄也曰摘楊花僧次日復進曰昨日公案未圓乞師再垂方便萬曰分付直歲不得普請曰古老頭巾真難共語萬擲下拄杖僧出大呌曰紫籜老漢今日方始瞥地萬便休十載遷疎山疎山舊例住持須通刺當道萬輙不可曰孔席不煖墨突不黔誠各行其志也況我圓頂之夫何天不可翱翔乃為三間古院委曲權門是則法化未弘僧風先掃地矣當道議不合萬留偈法堂飄然而去偈曰疊疊韶華一杖藜白雲到處有山棲等閒愛種蟠桃核不把春紅賺馬蹄江淮總統聞萬高標會諸山於靈隱直指堂議以開先迎萬或度其厭叢林不肯來有耆宿曰萬公必來也彼雖起居蕭灑然瞿瞿以法門綱目為任若致之以誠即十字街頭肩栲栳養閒漢彼亦欣樂況開先為山林之勝且便於衲子公豈木強人乎公必來也萬果擕數禪衲惠然而來有偈曰剎竿扶起本無心教外金襴影自深肯著三三前後力波濤陸地起龍吟於是開先鼎新英俊大聚扣問之外從未隻字干及豪貴其時道俗蒙萬示語如獲珙璧笑隱來參萬審其機緣指往百丈為晦機嗣無我之風海內仰之又十載住東甌江心寺少不適意又棄去寺眾數百泣挽隨至馮公嶺不從萬甞曰古人因學道以立叢林事事隨緣法法周備為住持者觀會中或有一箇半箇實心務本則當不顧安危竭力支撑雖社廟神壇亦可居而不愧今人計叢林以學道或三百五百不顧日逐何所用心但云頭頭合轍物物圓融乃崇尚土木鷺伺豪家然後竊虗器傳子孫與蚖蛇戀窟明無少異毫厘既差千里懸隔良可悲夫晚年匡廬月㵎明公迎萬歸東谿萬翩然命棹曰滿望春江興不違一波纔動萬波隨烟嵐調拍如相委何待芳心託子規月㵎歿開先之眾復請萬萬力却之曰我住持三十載而法化寥寥更何所望而不休乎且精神非壯盛之時也諸公不復言皇慶壬子十一月二十六日示疾越七日命浴更衣據室危坐書訣眾語儼然而化闍維收五色舍利大如菽不可計目睛齒牙頂骨不壞時改建豫章烏遮塔江西行省丞相幹赤命以舊藏釋尊舍利奉於中遣使分一山萬禪師目睛舍利以寶匣秘之陪塟焉餘舍利塔東谿贊曰名位虗器也道德實跡也據虗器而核實跡則失矣余觀萬公平生住持獨持大體熙於實跡不以名位自累少不合輙棄去此其節概大過於人應菴曰衲僧當著草鞋住院良有以哉高峯妙禪師禪師諱原妙出蘇州吳江徐氏為雪巖欽禪師入室之真子也弘法於天目之獅子巖因以高峯自號關居三十載橫拈倒施而令行吳越南宋嘉熈戊戌年三月而公生公生性遲重寡言笑行如瘦鶴望之似懦弱然其神氣精悍奪人幼喜趺坐凡見髠流必合爪勞問成禮淳祐壬子從秀水密印寺法住沙門得度年十五備知大僧事及戒得滿分於其律度開遮進止不期而咸合焉尋習教觀於天台其文句義學弗可難也公每忖達磨一宗不立文字為教外別傳能了當人大事為之立地成佛豈徒然哉即出杭州參訪宗門知識入湖南淨慈淨慈為武林禪窟倫斷橋居焉公參僧堂立死限三載擬求妙悟竟無所發時雪巖欽禪師寓北磵斷橋指公往謁公謁雪巖雪巗不許通謁公益心切乃告香通誠雪巖許見未作禮即連棒打出公垂涕回惶復入雪巗便問阿誰拖你死屍來又以拳打出之於是疑團猛結無所攀仰乃擬避喧求靜齩嚼話頭於徑山禪堂及月忽憶萬法歸一一歸何處匊戰胸次目不交睫者六晝夜忽覩演五祖真贊云百年三萬六千朝反覆元來是者漢從前話頭一併打失其年二十有四矣雪巖已赴南明公即走覲纔入雪巖便問誰拖你死屍來公便喝雪巖拈棒公把住曰今日打原妙不得也曰為甚打不得公拂袖而出次日雪巖召公問曰萬法歸一一歸何處對曰狗䑛熱油鐺曰那裡學者虗頭來對曰正要和尚疑著雪巖休去公以為妙契玄旨自此隨問即答久之雪巗謂公曰日間浩浩作得主麼對曰作得主曰睡夢中作得主麼對曰作得主曰正睡著無夢無想無見無聞主在甚麼處公不能對雪巖曰從今日去也不要你學佛學法也不要你窮古窮今但只饑來喫飯困來打眠纔睡覺來却抖擻精神我者一覺主人公在那裏安身立命公遂別入龍鬚經五載因隣僧推枕墮地作聲大徹乃曰元來只是舊時人不改舊時行履處咸淳甲戌年住湖之雙髻峯禪者登峯益眾公即入西天目山之獅子巖巗絕躋攀其來決擇之者又滿百許人公乃別居巖西石洞石洞之險非梯莫陞大書死關二字為額盡屏給侍日用一食以甕為鐺斷緣撤梯巖中弟子罕見其面或垂語以騐方來不契即拒關其垂語曰大徹底人本脫生死因甚命根不斷佛祖公案只是一箇道理因甚有明與不明大修行人本遵佛行因甚不守毗尼杲日當空無所不照因甚被片雲遮卻人人有箇影子寸步不離因甚踏不著盡大地是箇火坑得何三昧不被燒卻元世祖丁亥年雪巖遣白拂囑公偈曰上大今已無人雪巖可知禮也虗名塞破乾坤分付原妙侍者始陞座開導其語懇切中古尊宿未之有也叢林謂之禪經抱道老成之士並歸焉一日民間訛謠官選童男女本小師問曰忽有人來問和尚討童男女時如何公曰我但度竹篦子與他本大徹於言下或問諸弟子優劣公曰若初院主等一知半解不道全無如義首座固是鐵根老竹其如七曲八曲惟本維那卻是上林新篁它日成材未可量也元貞乙未季冬朔日命鼓告眾曰西峯三十年妄談般若罪犯彌天今日或云末後有一句子不敢累及平人自領去也大眾還有知落處者麼良久云毫厘有差天地縣隔復曰來不入死關去不出死關鐵蛇鑽入海撞倒須彌山跏趺泊然而寂七日容色益明潤舍利結於爪𩬊越三七日塔全身於死關坐四十三夏歷世五十有八仁宗戊午諡普明廣濟禪師贊曰古以滹沱機用如塗毒鼓聞者皆立死或先後於近遠稍異迨密菴後幾不橫死矣幸雪巖得無準藥授之師師復塗而擊之以立死中峯輩至今聞其餘響猶自胥喪吁何偉也非師玄要戈甲吳越正令曷克臻此
