body:
  text: 斗峯璋禪師禪師名正璋字大圭閩之福清人也福清風習賈利璋弗染也獨以聖賢理學為務久之企慕禪宗走湖南依絕聽沙門試經得度有禪者寄宿偶誦云水鄉水濶地多濕六月花蚊嘴似鐵夜半起來惱不徹惱不徹牀頭一柄扇無端又打折璋驚喜曰是誰之語也正璋願見其人禪者熟視久之曰其人往矣當今東嶼禪師是其嫡傳也然不契其語者難入其室即契其語者亦然璋心疑曰奇哉語既相契而室復不容入耶即趨武林見東嶼海於靈隱投心請益海曰深深無底高高絕攀思之轉遠尋之復難上座作麼生會璋慄執不敢犯良久擬再禮忽心地開通乃厲聲曰古今成現事何必待思惟海微哂曰思惟既不涉來此欲何為璋曰將謂無人證明便趨出海公喟然曰鼓角動也乃撾鼓集眾曰山僧三十年舉狗子無佛性話尠有善別機宜者今晚不用如何若何速道將來若也相應有條斷貫索子親手分付璋出對曰狗子佛性無覰著眼睛枯瞥地翻身去唵室利蘇盧於是璋得承記莂機鋒莫禦即素知名者皆左袒之海公舉璋以應吳人之請璋堅辭曰正璋應世之才固不如人但平居簡點觸境逢緣設有一念不與古聖相合欲為人師範則其患害可勝言哉正璋知為人師之患實不敢居也海嘆美間閩有豪客游飛來峯見璋端偉非常詢知同里因請曰能復我故土乎願為師治裝南行師笑肯之遂買舟載與同歸至建寧游斗峯璋愛而居之斗峯老屋數楹僅蔽風雨客傾囊金欲為整葺璋曰不可吾本假公舟以入山耳建置之舉非初約也且役役土木有妨道業公欲如此求福其福鮮矣於是衲子聞風而聚漸成法席鄉曲貴人勸請開堂乃陞座拈香罷良久曰黃金雖貴入眼成塵便下座耆宿驚喜以為天目再見蓋璋乃天目禮四世之孫也又曰玉宇霜清瓊林葉落一句全提萬機寢削作者好求無病藥又曰昨夜三更裡雨打虗空溼狸奴知不知倒上樹梢立璋說法峻峭約多類此然室中不以聲色拒人入室者自失其度故常嘆曰若是真戰將百萬壁中如入無人之境稍有較強弱顧矢石之心則屈矣四方疏請不出竟終老於斗峯告寂有偈曰生本不生滅亦無滅幻化去來何用分別大眾珍重不在言說便合掌入滅贊曰為師之患甚於為國為國之失亂居一時為師之失毒流萬世盲類交引可勝述哉大圭寥寥數語真龜鏡也故其開闢斗峯恰與諲神鼎相類至今寤寐間猶喜遇其白髮婆娑機語噀人也天界慧曇禪師慧曇禪師字覺原出天台楊氏少信佛僧及得度於紹興之法果寺具足律儀去就秘重游泳止觀華嚴義壇特稱之當爾時元剌嘛為帝者師獨尚禪宗諸山禪席大振曇陰疑焉乃展閱禪冊難入理解不覺心慚而起曰一言有礙萬劫覊鎻遂抵武林謁笑隱訢禪師發明旨要訢公居中竺從遊者皆一時名賢互爭識曇曇之望遂顯未發開法牛首次遷清涼其臨眾寂靜雖數千指經營內外而終歲不聞笑詈之聲以故風傾都下而保寧蔣山二剎皆歸於曇曇常謂眾曰一句子黑漆黑無把柄有準則還會麼碓搗東南磨推西北又曰威音王以前彌勒佛以後有箇現成公案未敢與汝說破何故心不負人面無慚色於是有道之流益親朋初高帝改金陵龍翔寺為天界采有德禪宿主之畵院因圖諸山禪師頂相進於上上獨喜曇相曰太平隆運沙門也遂以曇居天界上常易服擕近臣私幸天界見曇跏趺丈室儼然在定上顧良久歎美而去僧問曰駕至師何不迎曇曰駕至乎曰然曇屈指曰山僧持五戒僧罔措其語朝旨賜曇號曰演梵善逝利國崇教大禪師上堂曰只箇現成公案眾中領解者極多錯會者不少所以金鍮不辨玉石不分龍河者裡直要分辨去也張上座李上座一箇手臂長一箇眼睛大總似今日達磨一宗教甚麼人擔荷噓一聲下座洪武三年高帝擇有志沙門通誠佛國曇應詔夏六月御餞都門從行者二十餘人道經高昌素葉諸國諸國俱尊禮之以象馬傳送達僧伽羅國國王并羣臣迎曇公於佛山精舍師事之膝行求法敬留休息曇示微疾乃呼左右曰吾不復進矣又與僧伽王言別復書遺表并示諸國法語至夜半問曰日出否對曰未問至再三侍者曰日出矣乃趺坐向西而寂時洪武四年九月也其國老臣以辟支弗塔懸記而白王王遂奉曇禪師袝葬焉明年尚書回奏高帝覽遺表而嘉惜曰中原有僧萬國之光敕建浮屠於雨花臺之左瘞其所遺衣履表崇德也繼而奉詔西行有宗泐禪師季潭泐禪師宗泐禪師姓周氏台之臨海人號季潭別稱全室為笑隱訢公之望子歷坐名坊而赴明高帝之詔兼領天界住持化周大宇機契宸衷應旨涉流沙度葱嶺徧游西天通誠佛域往返十有四萬餘程皓首還朝天子嘉其高行自唐貞觀以來未之有也泐生族甚微父母俱早卒寄食貧里貧里不能善之甫八歲宿根不昧趨本郡天寧寺求佛為師時笑隱訢公說法其間泐跪拜於訢公膝下公愛而異之試以心經脫口成誦公大喜曰昏途慧炬也得度數載藏文世典咸貫通焉訢公屢易名剎泐皆從侍公甞問曰國師三喚侍者侍者三應且道是平實商量是格外提持泐遽對曰何得剜肉作瘡曰將謂你奇特泐便喝公拈棒泐拂袖趨去訢公告寂乃召懷渭曰吾據者牀四十餘年尚遺望也然不盡之案惟你與宗泐任之耳泐既還台寓雲峰隱紫籜領天寧俱以誠慤淳厚之風化本生之郡郡人傾信如葵日也又僑隱雙徑時渭禪師居越之寶相寺遣使迎泐泐笑卻之使再至僅得遺簡踪跡杳然元末武林名賢強泐出居中天竺雖當烽燧四警之際而施為壯濶交接從容無少長貴賤皆得而瞻禮之不減訢公說法時也葢以中竺經昔繇訢公而新故泐之光闡前績湖江稱美焉明初詔主天界高帝以慧曇西往之跡未終欲修之難其人泐應旨於洪武丁巳西行壬戌還朝復居天界常入大內開襟論道泐留京既久朝臣黨立間有嫉之者泐遂退居鳳陽之槎槎峯丙寅帝思泐見詔歸天界於是來往禁廷不容己廷士建議以泐於內聖外王之略無不畢備請以中順大夫祿而旌泐泐引去至江浦石佛寺示疾乃喚侍者曰者箇聻侍者茫然泐厲聲曰苦竟入滅年七十有四坐夏六十六龕歸天界火浴得設利光潤明燦者三十顒建塔於訢公之後泐之宿願弘深辨才無礙際遇乎佛心天子常於慈明殿設榻召問心經樞要泐窮理顯性徹果該因深淺開遮無機不被天子默以神會乃勅箋語流行爰有御製序文冠於經首其訶曰二儀久判萬物備周子民者君育民者法其法也三綱五常以示天下亦以五刑輔弼之有等㐫頑不循教者往往有趨火赴淵之為終不自省是㐫頑者非特中國之有盡天下莫不亦然俄西域生佛號曰釋迦其為佛也行深願重始終不二於是出世間脫苦趣其為教也仁慈忍辱務明心以立命執此道而為之意在人皆如此利濟羣生今時之人罔知佛之所以每云法空虗而不實何以導君子引小人以朕言之則不然佛之教實而不虗正欲去愚迷之虗立本性之實特挺身苦行外其教而異其名脫苦有情昔佛在時侍從聽法者皆聰明之士演說者三綱五常之性理也既聞之後人各獲福自佛入滅其法流入中國間有聰明者動演人天小果猶能化㐫頑為善何況聰明者知大乘而識宗旨者乎如心經每言空不言實所言之空乃相空耳除空之外所存者本性也所謂空相有六謂口空說相眼空色相耳空聽相鼻空齅相舌空味相身空樂相其六空之相又非真相之空乃妄想之相謂之空相是空相愚及世人禍及古今往往愈墜彌深不知其幾斯空相前代帝王被所惑而幾喪天下者周之穆王漢之武帝唐之玄宗蕭梁武帝元魏主燾李後主宋徽宗此數帝廢國忘政惟蕭梁武帝宋之徽宗以及殺身皆繇妄想飛昇及入佛天之地其佛天之地未甞渺茫此等快樂世常有之為人性貪而不覺而又取其樂人世有之者何且佛天之地如為國君及王侯者若不作非為善能保守此境非佛天者何如不能保守而偽為用妄想之心即入空虗之境故有如是斯空相富者被纏則淫欲並生喪富矣貧者被纏則諸惡並作殞身矣其將賢未賢之人被纏則非仁人君子也其僧道被纏則不能立本性而見宗旨者也所以本經題云心經者正欲去心之邪念以歸正道豈教之妄耶朕特述此使聰明者觀二儀之覆載日月之循環虗實之孰取保命者何如若取有道保有方豈不佛法之良哉色空之妙乎高帝自登極來潛心性理與諸禪宿盤桓無虗歲月也然於曇泐二公尤追惜之葢嘉其壯志西行大光聖化云贊曰曇泐二禪師望重龍河道欽有國者可謂一時能事矣況其利物多方言言合轍法法隨根又以道餘名振他亦空谷而分聲也昔大覺氏記像法有從地湧出無數菩薩順逆行道護持法藏人天莫測今觀二師之踪跡無乃是其數乎海門則禪師禪師名惟則字天真祖姓費湖州人也慕禪宗而脫白焉即䟦涉謀道不計得失歷見一十八員知識俱不契千巖禪師以則為大器乃謂之曰當今佛法大有子知見迥別不能了悟無極源老人者隱西江匡廬將六十年矣雖臘高百歲未將此道易賺於人子宜見之或緣在彼亦不孤負子行脚苦心也則往謁之見源枯坐木龕常達旦不臥霜眉如戟威德逼人惟三五白髮侍僧同居則展拜足下擬請益弗能申詞而出私問侍者曰和尚座下有禪者來往否侍者曰來者多矣柰老漢煞不近情率以孤寂引去縱有求住者難受龕前曲折則曰我求依棲可乎曰住即得只是不可問佛法則聞說大驚居三月餘果不蒙一言啟發一日值源如廁則遂問曰如何是祖師西來意源公擒住曰道道則氣索不能對源托開則失脚倒地大悟失聲發笑源曰子有得耶則便連搖其手源曰黃河三千年一度清於是服勤久之源公乃謂曰當時雪巖先師言我福薄不宜出世只可山邊水邊覓一箇半箇足矣今住此山不意子來然子緣十倍於我時至矣宜東行則既受命遂應嘉禾海門之請上堂曰三三三九九九海門潮音似雷吼香浮菊圃獻金錢靈感杞堤呈玉狗你也有我也有捩轉南辰看北斗忽湧身作修羅擎日月勢便下座有僧問如何是日面佛則曰今日雲生如何是月面佛曰夜來再看僧又問作麼是佛祖為人處則曰狗䑛熱油鐺秖如和尚還有為人處也無曰猛虎當路坐問喫茶去意旨如何曰舌頭不出口進云便是向上事否曰掩鼻偷香洪武初蒲車徵則赴皇都法會則因足疾疏辭高帝手勅曰無心埜鶴不忘霄漢翱翔跛脚老僧可任山雲自在乃賜還山示眾曰菊綻東籬香正浮海天空濶月華秋當陽拈出吹毛利勦絕縱橫六不收又誡其門人智安曰安號懶雲鏡非不明也盲者持之以盖巵琴非不高也聾者用之以拄戶有此境界方得自在否則總被高明二病侵入膏肓妄為人師自招罪犯故吾無極老人一生不為高明所買所以人天莫柰渠何癸酉二月則有捐座意弟子請遺語則笑曰平常說底不是耶遂奄化初胡秋碧欲寫則頂相千輻流施人間將半適日本人至見之皆羅拜曰吾國祖師也安在此乎競以金貿之東歸贊曰凡讀史至精神相貫處惟恐其欲盡葢今古之同心也余讀天真行狀至參無極老人老人一段威德猶在紙上逼人恨不展日為年使老人緒餘廣滿人間饒益澆漓之俗可勝幸哉然天真操履酷肖其師豈非蟠桃有核乎或謂丹山羽王不容偽矣雲居呆菴莊禪師禪師普莊者字敬中台之仙居袁氏子也家人見梵僧入舍而生三歲解跏趺喜學梵音九歲而梵唄皆有律度其族愛而呼之曰佛童年十三從季父子鄞依天童左菴良禪師為沙彌左菴亦愛之仍呼曰佛童久之秉戒參禪不悟適了堂一禪師自紫籜山來天寧莊童時素聞其名私喜曰此吾故山善知識也趨謁之而得道焉歸省左菴左菴卒了堂來居天童會恕中慍禪師應詔退休於翠山了堂命莊為翠山使莊與慍語慍大奇之曰天童法兄得人如此不負紫籜先和尚矣莊向以呆菴自稱彚雜稿為呆菴集呈慍慍讀之大喜曰吾姪當有大名於當世惜吾老耳然蘭以幽而香松以曲而壽惟吾姪勉之乃引長偈為贈偈曰燭龍吐火燒虗空處處江河盡枯竭方士神僧世已無誰倒天瓢洗炎熱柴門日高關未抽豈為一口生閒愁南村北村青稻死上田下田黃埃流竹外忽然聞剝姪也何為到林壑油黃卷子手持來玉潤珠輝見新作載舒載讀心眼開便如飲我甘露杯老懷從此頓蘇豁末運不畏宗綱頹我有一句須聽取無智人前莫輕舉山前石虎齩菸菟吒沙獵頷九條尾洪武十年有勅天下僧倫演心經楞伽金剛三經莊與性原禪師提綱於金山大會次年至金陵舘天界位望最尊者滿菴輩莊與辨論機窮底蘊學士周公維修時亦在坐乃問三禪師曰儒有儒師禪有禪師經有經師一切百工伎藝俱有所師何是無師智莊答曰七情五欲修駭曰如是則無師之智非極則也一本云安稱極則莊舒右脚曰山僧自到京跛卻一隻脚滿菴笑曰須是者呆漢始得又明年領江西撫州之北禪寺歷元以來禪道多興吳越而西江馬祖百丈之威儀大都弛廢莊至北禪勃然中興如多寶塔幢從空湧出復憐雲居荒久擕數十禪徒結茅於舊址疊柴為牀莊登座示眾曰昨日開荒地請諸人剗去荊棘除去瓦礫本來基址已見分明只有中間樹子無人得山僧今日未免別行方便利刀剪去繁枝葉鈍钁深鋤邪倒根實地工夫成一片住山鈯斧了無痕於是雲居殿閣堂廡而幻出焉衲子聞風如歸時稱天下雲居洪武十四年秋高帝製於廬山有手詔命莊主其事靈瑞多種盪眩山川草疏復命帝甚悅之莊暮年奉詔主持徑山竺元之風復振東南甞問僧曰近奉公文務要打點僧曰學人不是奸細曰也須勘過僧曰和尚莫得倚勢欺人莊展手曰把將公騐來僧擬議莊便掌之又甞厲聲曰盡十方世界是毗盧心印且道印紐落在甚麼人手裡有僧擬進對莊曰且去別時來莊有敏裁無宿事所遇不忘雖萬眾蹁躚一目了然且好提獎人有小善莊每譽之竟日叢林因稱曰呆菴舌風掩葉永樂改元莊年五十八命撾鼓告寂適江右二道者至莊挽其歸方丈相敘甚驩坐談夜半莊精神倍勝二道者相視嘆曰此事甚難不可得而擬議莊曰難難萬種千般不擬議亦瞞頇青天霹靂平地波瀾無說是真說它觀非正觀沉淪枉經巨劫契悟秖在毫端莫教坐卻含元殿逢人只管覓長安一曰此事甚易但自不能承當耳莊又曰易易多方一致絕承當忘此喻耀古騰今經天緯地知有亦無知利它還自利明明般若真乘念念塵勞雜事卻多年若瓠根釋迦不受然燈記適晨鐘動莊怡然化去闍維烟𦦨所至悉得舍利更有素珠不壞塔於凌霄峯之陽贊曰余觀歷祖代興法道者其風骨必凜然特異呆菴既出了堂之門遂將折拄杖撥動湖海英靈向烏有之雲居幻出莫大梵場名歆天子德被含靈僧中之龍不謬矣然及時說法乃上池之水也楚山琦禪師楚山禪師唐安人也名紹琦姓雷氏八歲入鄉校不假師授而知誦次載失父遂棄業而學出世法於玄極通禪師通愛之與語輙終日每至節要處不敢犯其詞乃跪請益通嘆曰子根性太利難於入道但有疑在庶可療耳琦愕然曰木偶人可入道耶通笑曰入道須是木偶人始得琦憤而趨出益疑之經晝夜遂振衣起曰吾師豈欺我哉復入剖於通前通獨以掌反覆示之不領遂背去徧參知識俱不得意聞無際悟和尚居普州之東林東林禪風腰包到者即受曲折流輩竊非之琦故往扣焉曰上座何住對曰廓然無定曰有何所得對曰本來無失何得之有曰學將來底堪作甚麼對曰一法不有學自何來曰汝落空耶對曰我尚非我誰落誰空曰畢竟如何琦曰水淺石出雨霽雲收悟公笑曰縱汝橫吞藏教現百千神通其如老趙州無字公案怎生消繳琦又擬對悟公連叱退之琦大慚數日不敢仰視忽聞淨板鳴豁然蕩盡廉纖急披衣禮謝悟肯之遂以斷橋源流囑琦行化當是之時斷橋之脉微矣及悟公繼響而得法者僅七人惟琦出世最晚初領天柱遷皖山又投子後主成都之天成寺裔葉翻茂為大振焉得其法者又十六人有祖玠侍者齒最少號珪菴事琦甚謹叢林憚其嚴厲敬其慧識以香林遠方之一日童子進茶琦啜罷顧童子曰人道汝憨耶玠曰它亦有乖處琦曰何以見得玠呼接盞童子近前琦曰道得即還你無對琦乃顧玠玠曰只者無言語處不隔纖毫琦曰因甚道不得玠呼童子何不問訊童子問訊琦度盞童子接之珍重而去玠曰道他無語得麼琦曰只如者童子恁麼端的是無明使然耶法性如是耶曰迷則積劫無明了則本來佛性琦曰恁麼他是知有是不知有曰他若知有則不為迷因不知有番為隔碍琦曰子還有知也無曰祖玠不知有曰既不知有何以知宗玠曰聖人若知即同凡夫凡夫若知則同聖人曰子看老僧是知不否玠曰臨機大用舉必全真說甚知有不知有曰只如老僧即今一語一默剖析是非分別名相處與適來童子見識是同是別玠曰擇法智眼無作妙用體性雖同用處縣隔曰既云擇法安能無作乎玠曰智炤非識妙用非有用既非用作亦非作雖分別實無分別之能也曰今對萬法境相差殊一一明了不具分別可乎玠曰教不云乎如我按指海印發光圓明了知不繇心念琦曰善哉可謂鵝王擇乳矣未幾玠膺疾琦下視之值心上座在側琦因問曰如何是心玠曰開口不容情曰未在玠顧心曰何不作禮心便珍重玠曰呈似了也曰子既如是還能覿體頌出乎玠對曰祖師心印若為傳有語分明不在言能向機前親領得海門撑出釣魚船琦曰珍調四大饒益將來一日玠疾革作呻吟聲琦問曰子平日得力句到此還用得著麼對曰用得著曰既用得著呌苦作麼曰痛則呌癢則笑琦曰呌與笑者復是阿誰曰四大無我呌者亦非真寂體中實無受者琦曰主人公即今在甚麼處曰秋風不扇桂蕊飄香琦曰恁麼則徧界絕遮藏也曰有眼不見琦曰只如三寸氣消時向甚處安身立命對曰雨過天晴青山依舊曰從今別後再得相見否對曰曠劫不違今何有間曰子不病耶對曰病與不病總不相干琦執玠手曰此是甚麼玠曰是祖玠手曰祖玠是誰曰玠固非我亦不離我琦乃嘆曰善哉玅契無生徹證真常子雖玅年死亦何憾玠遂合爪謝曰與祖玠趲將龕子來琦命舁龕至玠顧左右曰吾當行矣整衣龕坐化去玠化後天成之話大行時蜀多義學互以勝劣相比量琦一以心宗揭之而小大俱圓有問祖師西來意則答曰海神撒出夜明珠又問祖師西來意曰雪消山頂露風過樹頭搖又問如何是直指事答曰玉欄杆上石獅子紅藕花間白鷺鷥又問如何是摩醯正眼琦喝之又問不涉寒暑是甚麼人琦亦喝之琦愛以無字問僧有對曰風吹秋月冷雪壓老梅寒又僧對曰出匣吹毛劍寒光射斗牛又對曰無孔鐵錘當面擲琦皆喜之後示疾諸山訊候有進曰和尚還有不了公案麼琦展掌曰會麼擬對琦喝住曰今年今日推車挂壁撞倒虗空青天霹靂阿呵呵泥牛吞卻老龍珠澄澄性海漚花息瞑目而寂時成化九年三月望日也贊曰楚山行化當明運昌隆之際純以心性禪應接羣機以故門下一時龍蟠鳳翥焉乃至祖玠輩風鬯春枝節節是令見者聞者莫不神往但不再傳其緒俱𥨊豈慈父欲子食藥而愈疾遂稱沒於他方也耶
