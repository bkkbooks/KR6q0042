body:
  text: 伏龍千巖長禪師千巖禪師諱元長越之蕭山董氏子也出天目中峰本和尚之門開化烏傷伏龍山聖壽寺其接物利人灼類於本當元季時其著我田衣者無不藉賴朝廷褒重而高其聲價公居伏龍惟力田博飯而已君王三錫徽號公終身不署焉於是識者以狂瀾砥柱而稱公公性英敏初棄家問戒於靈芝律主時中峰本和尚寓杭城雲居蘭若會赴丞相府齊公得拜見於齊筵本曰上人是何法諱對曰元長曰日逐何所用心公乃再拜請益本以狗子無佛性示之公即廬北高峯頂琢磨己躬屢走見本本惟叱之無他語靈隱雪庭傅禪師虗記室款公公來往雲居靈隱荏苒法緣十載不發乃私嘆曰饑虎望几上之肉寧自甘耶遂禁足峰頂聞雀聲有省急走質本公呈所以又被叱憤歸據關枯坐簡點所省處竟不可得徘徊中夜或行或立忽鼠翻猫器墮地有聲乃徹見本公相為處即棄廬歸本本云趙州何故言無對曰鼠食猫飯曰未也對曰飯器破矣曰破後如何對曰築碎方甓曰善哉此事非細承當者須是其人於是公服勤一十三載別隱天龍東菴垢衣糲食無剩語人或鄙之石溪空禪師大建松雲閣繪三教聖賢影相並藏其書以資三教學者流覽徵文於當世銘之無敢命筆者空素知公乃邀游松雲敘其所以公弗少辭遜文成四百五十言自書其壁是時松雲閣閒士多屬名家子弟讀之大驚服於是冠蓋博學者爭游東菴有傳其文至中天竺笑隱禪師曰中峰有子如此臨濟宗風何慮哉即言於行省丞相以名剎起之而公已去東菴矣其松雲文曰見到說到行到猶是到到未是不到到雖是不到到未是不到不到何也世尊四十九年噇了現成閒飯簸者兩片皮說是說非說長說短說出許多閒言長語滿世間狼狼藉藉末後知非無著慚惶處乃云始從鹿野苑終至跋提河我於二中間未曾說一字敗也敗也老子亦云道可道非常道名可名非常名名亦言也既非常名言之何用死也死也孔子亦云亂之所由生言語以為階乃欲無言謂天何言露也露也你看他者三箇漢如向一片淨潔地上攃屎攃尿了有底將灰土蓋卻有底將糞箕笤掃却有底將水洗却任你如何只是臭氣還在引得許多蠅蚋蚤虻螻蟻蚤蝨之類競來咂啖各成窠窟頭出頭沒脫離無由秦坑之永平火之三武滅之愈熾愈盛雲門殺之德山罵之臨濟喝之彌高彌大樹繞藤纏至今無箇合殺石溪本空禪師奮巨靈劈太華之手用芥子納須彌之機建一閣扁曰松雲繪佛祖三教聖賢諸師形像於松雲之上及取三教之書悉藏松雲之中無彼此之分絶人我等見真顯圓融廣大法門耳或謂辨魔揀異宗門眼目稱斤定兩向上鉗鎚豈可雷同事須甄別曰會麼瓶盤叉釧一金毒藥醍醐一味其人不覺手舞足蹈而歌曰松雲萬朵兮溪山盤盤松風一曲兮溪月團團氷崕笋出炎天雪寒眼睛只在眉毛上分付渠儂仔細看烏傷伏龍山古有聖壽寺廢久公乃登伏龍喜其湧泉如乳奇峰爭秀就故址棘叢中而卓錫焉次日鄉民集者數百人俱言昨夜夢乘雲聖僧至伏龍及見公與所夢無異遂共開荒為搆草廬久之崇成大廈禪者接踵而問道三十載如一日嘗示禪者曰當臺明鏡鑑在何人露刃吹毛逢他敵者從上的的相承以來無有不因者心肝五臟也同眉毛鼻孔也同眼睛舌頭也同三百六十骨節也同八萬四千毫竅也同一處同處處同只有些子不同諸人還簡點得出麼阿呵呵縱饒滄海變終不與君通士大夫聞其風而開發者甚衆鎮南王亦慕之則錫號普應妙智弘辨禪師帝師又加圓鑑大元普濟禪師東朝又賜金襴並加師號曰佛慧圓明廣照無邊普利其隆典雖經疊下於題咏扁額中並無其製號也晚年鐼自滌衣衾自補侍僧屢竊為之公屢不悅至正丁酉六月示微疾更衣集衆書偈曰平生饒舌今日敗缺一句轟天正法眼滅擲筆而逝世年七十四坐五十六夏宋公濂久參伏龍乃述其道行以立石贊曰却名易忘名難貞節易忘節難蓋名節亦虗器也長公入山惟恐不深重開伏龍一住三十載王公褒贈疊至公恬若不知至其生平說法勞勞玉齒如怒獅抉圓石於千仞之岡莫之能禦嗚呼克嗣天目以駿發臨濟於一時者微公其誰與龍池寧禪師禪師出淮東通州朱氏宦族名永寧字一源其先東山演公之下開福寧寧七傳至無用寬寬乃永寧之師也寬居舒州太湖門士不滿百皆嶢然自肯之輩其得寧最晚而寬特注之以為可繼開福而闡東山法門初永寧在襁褓中弄以金紫即有戚容九歲聞鄰壁治喪啼哭聲辭親棄俗依禾州之廣慧寺寺為州之望剎乃故淮海肇禪師說法處前一夕寺衆同夢肇公來次日獨寧至衆欣然疑為肇公再世也及為大僧汗遊禪社走舒州見無用寬公公問何來對曰通州曰淮海近日盈虗若何對曰沃日滔天不存涓滴公使喝寧擬進語公又喝寧擬退公連喝之寧大駭而趨出自是罷游堅依席下一日公舉雲門答僧須彌山話寧聞之脫然公乃召曰掣電飛來全身不顧擬議之間聖凡無路速道速道對曰火迸星飛有何擬議覿面當機不是不是公喝寧曰作麼公曰東瓜山前吞扁擔寧曰今日方知和尚用處久之辭去公曰逢龍即止遇水即居金雞玉兔鞭影長驅至治癸亥常州道俗以龍池致寧寧以為符其師讖欣就之連三載成叢林南國高人以見𣆶為感同曰龍池尊宿不敢名之寧慕高峯之為人別業高崖至正間紫書三至不赴諸方勉之始受朝旨號佛心了悟禪師然足不越閫順帝嘉之乃召璧峯金而問寧之行略金對曰不耘而秀不扶而直劈華嶽迅烈風雷吸淮海不留涓滴演東山是其遠祖寬無用容其入室雖經三詔下龍池野老不知堯舜力洪武元年寧囑製紙衣木龕次年六月十七日服衣居龕而化有偈曰七十八年守拙明明一場敗缺泥牛海底翻身六月炎炎飛雪金璧峯禪師禪師名寶金乾州永壽人也號璧峯其父石氏行善無子有梵僧目普門大士相授之曰善事之奇男至矣期年果生金金生時紅光蓋室牛馬皆鳴六歲親歿往受淨業於溫法師從溫既久通性相之旨乃代座演法有禪者遇而惜之因謂金曰觀君談論如望梅也其能止渴乎金大驚挽之不可遂游方謁縉雲真禪師與一源寧同入真室金輒有省一日拮蔬園中定坐不還適真公至撫金背曰汝定耶金起對曰動定不關曰誰是不關者一本云動定不關是甚磨人金向前叉手而立真公奮揕其胸曰速道速道金便喝真曰塵勞暫息向上政未得在金以拳築真而趨去已而隱峨嵋日咽松柏脅不沾席者三年聞伐木聲大徹再參真公真於地畫一圓相金以袖拂去之真又畫一圓相金於中增一畫又拂去之真再畫如前金又增一畫成十字又拂去之真復畫如前金於十字加四隅成卍字又拂去之真乃總變三十圓相金一一俱答真曰汝今方知佛法宏勝如此宜往朔方大行吾道金先於定中見一山重樓杰閣金碧爛絢諸佛五十二菩薩行道其中有謂金曰此五臺祕魔巖也汝忘之乎至是游五臺道逢蓬首女子披五彩敝衣赤足徐行一黑獒隨其後金問曰汝何之曰入山爾曰將何為曰一切不為金喝之女子眴金曰將謂是獅子兒言訖不見金驚喜曰吾於此山有宿緣乎就中結靈鷲菴居之聲光日溢無遠近負餱糧而獻者繽紛也至正壬子授師號寂照圓明住燕京之海印寺尋稱病辭還舊隱明高帝即真召金之南京於內殿問佛法大意遂設普濟會金蒞其事已而御製詩十二韻賜金是時開福之後惟金與龍池寧寧好行古規時流諱之金自代州寓金陵英才輻輳開福餘烈復振嘗問僧須彌納於芥子且道阿修羅王向何處伸腳僧應諾金曰恰是僧呵呵大笑金曰劍峽徒勞放木鵝又問僧臺山路向甚麼處去曰和尚是甚麼心行金曰今日被驢子撲僧作噓聲金曰消得龍王多少風金年六十有五召侍僧曰三藏靈文乃是故紙汝知之乎僧擬進語金便脫去闍維得五色舍利牙齒數珠堅潤宛然贊曰寧金二禪師以叔姪同時建大旗鼓於廣漠之野豈不三賢膽戰十地魂驚或怪二公末後一曰明明一場敗缺一曰三藏靈文乃是故紙何斂鋒垂手一至此哉然歷考版圖自大覺拈花之後莫不皆然無乃草滿法堂不容不爾耶抑曆數有歸其冊命之詞乎烏石愚禪師禪師世愚者號傑峰衢州余姓子也早歲歷參知識一十餘員無所開發抵杭州大慈見止巖成公而得道焉愚初至大慈倦於請益但隨衆聽法而已一夕成召之曰愚闍黎萬古碧潭空界月再三撈摝始應知愚瞥然趨去於是精神逸舉窮極玄祕又常入元翁之室機絲綿密翁心喜之翁即止巖之師也室中常謂愚曰暴長之竹數載而枯暴流之水終夕而涸此理人豈不知耶但求速之病入於膏肓則神醫拱手矣愚遂隱烏石山一十八載衲子知名正信長者建廣德石溪大伽藍以居愚愚居石溪禪徒始大集開堂日僧問黃梅碓觜花開日夜半傳衣過嶺南此事還端的也無愚曰一物本來無兩肩擔不起曰畢竟如何保任愚曰不是詩人莫獻詩乃曰佛病祖病衆生病拈向一邊丹藥妙藥神仙藥除過一壁離卻四大幻身且道那箇是病那箇是藥若向者裡薦得許汝諸人具隻眼其或未然山僧分明指出病源與諸人看四大分散時向何處安身立命是有病無藥底句鎮州蘿蔔柏樹子乾矢橛麻三斤是有藥無病底句青州布衫是藥病對治底句不是心不是佛不是物狗子佛性無是藥病雙忘底句為治衆生心中五欲八風煩惱塵勞妄想執著一切病一大藏教總是濟世醫方一千七百祖師公案盡是靈丹妙藥有病應服藥無病藥還祛衆中還有箇漢出來道和尚自身不能治何用治別人只向他道留得一雙青白眼笑看無限往來人愚凡四坐道場暮年退休烏石為逸老計適有長者擕童子上謁愚愚問何來童對曰虗空無向背愚大奇之適懸鍾次愚曰童子能言之乎童曰百鍊爐中出來虗空原不惹塵埃如今挂在人頭上撞著洪音遍九垓愚嘆曰此子如在殼迦陵也以大法度之法名非幻洪武三年諸山宿德咸赴鍾山之會有詔起愚使者至愚集衆普說已而高聲唱滅有偈曰生本不生滅本不滅攃手便行一天明月繼愚後事者有二人焉曰無涯幻曰日本太初原原歸化本國幻於永樂五年奉文帝詔證西僧哈立麻佛事有感帝喜特留幻主靈谷以備顧問每召對稱旨十七年御製贊佛歌頌併刊大藏頒行是日慶雲等瑞種種不一備載明紀其明年春有敕再建會靈谷如西僧例幻不奉詔亦唱滅以故愚父子深得或菴之遺韻云蓋愚遡或菴體之八世也贊曰或菴行護國之話於焦山至中葉幾微而復興譬猶一指之脉度隴穿峽所謂節節皆原六秀及傑峰父子一出又若老幹發嫩支龍逶迤而下為尖圓方正之星而入局於戲誰中十道天心之穴則兒孫腳下可勝計耶古鼎銘禪師古鼎禪師諱祖銘出於四明應氏風骨軒昂談論超人意表得道於元叟端公出世談禪之會有四皆名山廣澤之中四衆圍繞其升堂入室之鼓日不停聲當是時六宗之徒互相犯諍銘著書千百言以解之聲達朝廷朝廷賜銘號曰慧性文敏弘學普濟禪師叢林共美其功楚石琦有語曰具眼宗師超方哲匠傳列祖之燈息六宗之抗身非身相非相天教擎在千峰上蓋銘初與楚石同參元叟端端公喜怒不測所舉者皆流俗鄙事所訶者皆賢聖章句銘大疑之乃詣端公之室端呵呵大笑銘曰自遠趨風師何謔耶端公驀起頓足曰山僧罪過不少銘瞪愕而卻會書記寮虗職林首座知銘欲舉銘補之端曰見彈而求梟炙不亦早乎林曰何謂也曰待渠識得西來意方可耳不然流成文字蠧魚何益哉銘聞大慚隕涕自誓求決大事一日參罷銘復進曰黃龍南傾心請益於慈明慈明屢詬罵之何也端曰趙州道臺山婆子被我勘破與慈明笑曰是罵耶為復肝膽相似為復鼻孔不同銘曰一對無孔鐵鎚曰南立悟去又且如何銘曰病眼見空花端曰金沙混雜政未得在銘又擬進語端震聲喝之銘失聲笑曰祖銘此回做得書記也端公亦笑而許之住後僧問如何是佛銘曰稱錘蘸醋又曰如何是佛向上事銘曰仰面不見天僧曰雲門乾矢橛又作麼生曰不是好心僧曰乾矢橛與稱錘蘸醋相去多少曰鑊湯裡𨁝跳僧又擬問銘便喝銘言行平易不以繩墨制學者嘗曰滄海有擇流之心則成牛迹春日有偏照之意仍似螢光所以大冶烹金不須九轉衆生成佛只在剎那分之別之遠之棄之豈大慈長者之心哉晚住徑山禪流益心歸之恕中慍早受業於元叟既出遊方聞銘繼徑山之席乃歸訪銘銘請慍歸蒙堂間與商確古今於是二公互相肯可焉及慍出世靈巖法嗣紫籜道公銘復稱之或曰慍公向親先老人今其背德承紹無名老衲師反獎之何也銘曰不然當今吾老人之望故重天下矣裨販之徒往往承虗接響慍公得意於紫籜不以聲名而忘其本節操如此豈可及哉銘年垂耄愛擕衲子山游不計遠近意得即到歸便高枕鼻息如雷一日命侍者遍插香聲鐘告寂衆趨繞之銘則宴然側身長往矣有遺偈曰生死純真太虗純滿七十九年搖籃繩斷其門下繼居徑山者象源淑也居徑山百爾躬先率之勤奮乃言先老人弗以絮務勞賢者淑曰安有賢者而弗勞乎於是氷風四峻廉士大集一日趨出門大叫曰殺來了殺來了衆驚集淑乃莊立蛻去其次門人力金者主持天界天界金禪師力金禪師號白菴有本名萬金吳門姚氏子也幼孤楞伽寺道原衍公牧金為沙彌衍絶世交築碧山堂以自娛因以白菴號金且愛其姿乃資金行腳遂深入古鼎銘公之堂奧已而歸吳壘土為孤雲菴以事其母其母亦得悟焉元至正間浙宣政以淨慈請金金不就乃開法瑞光次移嘉禾之天寧南北英靈集如箕斂元帝師大寶法王贈金號曰圓通普濟禪師是時金之名日重矣愚菴素倔強不肯可諸方聞其名常致書問於楚石以為古鼎有子乎楚石亦因褒之其詞曰道邁古今學兼內外白牙香象蹴踏而截流金毛獅子哮吼而踞地機用可謂逸群文章乃其遊戲青天白日放古佛之瑞光閙市紅塵闡湖南之祖意直得大海波翻須彌粉碎少林不識曹溪不會卻淨慈道愈高笑諸方進為退乃吾古鼎銘兄之的傳妙喜杲祖之六世者也愚菴以為然作偈東金曰聞道湖南第一山交參龍象雜官班東頭賣貴酒頭賤空手來時赤手還頂𩕳一機猶掣電語言三昧若連環鐵船下載休輕舉老叔談禪亦強顏明初有詔主天界高帝留神內典而楚石愚菴輩亦赴焉金以猶子之列與之援經據論披詰玄理共大元叟家聲五年敕集三宗二千人建鍾山法會大駕臨幸命金升座闡揚宗旨復命儒臣出衆燒香疏曰無量太虗因三才而建極有涯滄海會八德以朝宗發含靈心裡之花至哉先覺秉樞斗寰中之抦久矣高人則寶鑑當空自合崑岡之璧而玄珠在握誰停赤水之車化廣無為音宣大呂豈非人天協贊日月雙懸金曰皇風浩蕩即凡心而印佛心慈澤彌漫據聖智目開世智乃拈香鞠躬起立曰會麼打還他州土麥唱歌須是帝鄉人便下座高帝大悅萬衆稱善金年暮欲謝退不可乃喟然曰吾以虗名濫當聖代每懷煨芋諸公豫不逮矣遂稱病篤解還舊隱未久圓寂塔於嘉興環翠蘭若初高帝詔選名宿輔導諸藩而蜀王椿師事見心復復名溢都中金嘆曰復公其不免耳復果罹難而終故諸方嘉金靖退為叢林福云贊曰水火相憎鐺居其中則世味以調邪正相反智居其中則精神俱化而銘公之攝六宗其智能過於調化者也丹青雖異文彩全施貴其知宜也天岸雖高明舟不犯貴其用意也象源之繼徑山乃良於知宜而用意焉知退而不知進者滯於寂也知進而不知退者傷於勇也白菴其無滯傷之病與師資鼎峙俾風化有醐酪之純其流慈豈小小哉性原明禪師禪師出夏氏台州黃巖人也諱慧明字性原居家不治生産日游僧寺父兄以不才子目之父卒明益無賴嘗貸餐親里姑舅之家或得斗米百錢歸又作飯僧佛事俄有長耳黃面病僧之門乞食於明明目碗羹施之復乞明躊躇答曰奈我無有何病僧曰無有亦須施我明莫知其意病僧指明內竈曰那是甚麼明回視失僧所在明乃大驚即走樂清依寶冠沙門斬其髮焉每遇禪者則虗己請問或有聞即拜下風久經歲月而知有此事即腰包行腳上雙徑見元叟叟曰東嶺來西嶺來明指草鞋曰三文錢買的曰未在更道對曰慧明只恁麼和尚作麼生叟曰念你新到放你三十棒明退參三月方罄其旨久之出世寧波五峰寺明既蒞師首以身先衆間有憍懦不振者明亦委致起之凡垂機即宿倔𠎦者為之失色於是湖江笑稱五峰門庭為曝腮處洪武間詔明主鍾山法會而天鏡瀞璧峰金季潭泐皆與焉內翰宋危諸公嘗問道於諸禪師一日間咨國事有答曰掃腥羶建禮樂萬代一時也復何慮焉明曰不然禮樂有三代之隔人心無夷夏之分敬天懼人思危防安天下平矣諸公悅服高帝聞明答語以為有王佐略欲留居都中時辭還山景濂宋公疏明居靈隱明不就乃薦同門天鏡瀞禪師明還山日鄰寺故老相訊明乃蕭然布衲藤杖而已或問大內隆遇典故明緘口無一語惟審山問歲節節俱至明退居無何而靈隱天鏡被流言坐忤時流徙陝西道經寶應夜宿寧國寺端坐而歿以故靈隱席虗師僧皆散諸方不肯應復請明明嘆曰時哉時哉不可避乎明既任靈隱年雖邁接納無少倦嘗垂問曰蓮花峰被蜉蝣食却半邊因甚不知僧進語曰不啞不聾不作阿家翁明喜之又問曰冷泉亭吞卻壑雷亭即不問南高峰與北高峰鬬額是第幾機又僧進語曰和尚今日放參明亦喜之於是禪子蟻從元叟家聲復大振闡提陰嫉之明又被議逮捕或勸明引去明怒曰潛形苟免豈道人所為乎適浴佛明上堂曰者一箇那一箇一一從頭俱浴過藥山布衲謾商量仔細看來成話墮成話墮將誵訛拍禪牀曰武林春色老臺榭緑陰多下座直詣法司從者如雲有感泣願以身代未鞠明跏趺廡下為衆說偈忽入滅天立變瞑雷雨暴作拔木飄瓦吏司懼而釋之叢席無恙時洪武十九年也嗣明法者正菴誾上座誾有徑操晚以衣拂授月江淨淨主徑山大廓性原之風歿時有偈曰祖師門下客開口論無生老我百不會日午打三更贊曰南黃龍坐事抵獄兩月得釋皮骨僅存真點胸迎於途不自知泣下南公吒之明瀞二尊宿不知獄吏之貴而冷處抽身可謂矍鑠矣嗚呼風波亦叢林時所有也標格如此足驗生平然際時能表裡叶贊乃願力也豈偶然哉
