body:
  text: 元叟端禪師禪師名行端號元叟生台之臨海何姓何姓世以儒顯端母王氏博釋五經章安子弟咸宗之如漢之曹大家南宋寶祐乙卯歲生端端生不茹葷襁褓中見沙門遂喜甫六歲母王氏授以論孟端咿唔成誦乃至經子章句悉不可難每遇紛華雜遝端則莊坐如在定母因奇之曰吾家千里駒也然恐不為世用端叔父茂上人者早歲為僧住餘杭化城院適歸省故里端竟從之剃染遍遊叢林謁徑山藏叟臨機悟旨藏叟悅之一日藏叟問端曰汝是台州人那對曰台州叟便喝端拜叟又喝端起叉手叟曰放汝三十棒端喏藏叟又曰還知我泉南無僧否端曰和尚聻叟便棒端按住曰莫道無僧好叟大笑而起端既罷參乃徜徉西湖山水間自稱寒拾里人育王珙作偈招曰夜半落霜花日輪正卓午寥寥天地間只有寒山子端不答乃典淨慈書記時淨慈石林鞏禪師居焉吳山石田林處士久隱不與世接乍見端篇翰獨以詩柬端有能吟天寶句不廢嶺南禪之語端又遠訪雪巖欽於仰山欽曰駕發何處端曰兩浙曰因甚語音不同端曰合取口曰獺徑橋高集雲峯峻未識闍黎在端拍手曰鴨吞螺螄眼睛突出欽顧侍者點好茶來端曰也不消得於是以上禮賓之元成宗大德初為虎巖伏分座於徑山庚子出住湖州翔鳳乃曰大慧祖師道寧以此身代大地衆生受地獄苦終不將佛法作人情徑山先師藏叟和尚一生不肯四天下人縱饒釋迦老子達磨祖師到來也須退身有分山僧在侍者寮兩年弄盡機關做盡伎倆直是沒湊泊它處所以知其為大慧嫡孫今有炷香供養它也要大家證明甲辰詔主中天竺并賜慧日正辨師號皇慶壬子遷靈隱仁宗設無遮大會於金山命端證之又加號佛日乃退居良渚西菴英宗至治壬戌間起端居徑山端居徑山人才之盛不減妙喜其楚石琦輩時稱僧杰焉虞公文靖以文獻宗時兼遊諸禪宿之門自稱微笑居士每方楊大年之為人多剝諸家語録而讀端提唱乃謂其子弟曰元叟生平諦理恢拓廣説略説莫不弘偉然關要隱而不發以待其人大慧之流風餘韻猶有如此者不謂老夫復相識耳其提唱曰寂靜中做工夫者以寂靜為究竟他且不是你寂靜中究竟底物憒閙中做主宰者以憒閙為得意它且不是你憒閙中得意底物經教中領覽者以經教為根本它且不是你經教中領覽得底物師友中講磨者以師友為淵源他且不是你師友中講磨得底物此無形段金剛大士從塵點劫來直至而今如潛泉魚鼓波而自躍你擬向東邊討它它向西邊立地你向南邊討它它向北邊立地教它與一切人安名立字即得一切人與它安名立字即不得一切處一切時與你萬象為主萬法為師此其是也自非上根利智具殺人不眨眼底手段將第八識斷一刀豈有成辦時節又曰自家根蒂下積生纍劫多諸惡習若也照燭不破剔脫不行日用間豈免觸途成滯一切法中或有所疑地即礙殺了你一切法中或有所愛水即淹殺了你一切法中或有所瞋火即燒殺了你一切法中或有所喜風即飄殺了你四者既是五蘊十二處十八界二十五有明暗色空森羅萬象到處粘作一團如黐膠相似驅你入驢胎使你入馬腹總繇它在千佛出世亦無如之何矣端開化四十二年三受金襴密祕之不以披搭所賜金帛悉賑貧乏復多怒老益甚每據坐竟日傳餐訶罵及入寢室或竊問其故乃左右顧視欲舉已忘故道俗於怒罵中得旨者甚多順帝至正壬午秋示微疾問侍僧曰呼之曾已休吸之尚未捨安同諸苦源來者不來者如何是來者不來者僧無語端良久曰後五日看至期更衣趺坐曰本無生滅焉有去來氷河發𦦨鐵樹花開垂一足而化世年八十八僧臘七十六所剪爪髮舍利纍然閟全身於鵬摶峯北諡曰普照塔曰寂照端退居良渚日忽有梵僧仗錫來徵般若樞要端示以獅王奮迅三昧其僧稽首蹈空而去左右皆驚愕端曰掩鼻偷香何足羡也贊曰大慧四傳至端禪師二百載矣幾如徑弓之末其勢不能穿魯縞師崛出珍公之門而道被三朝德邁九洲源厚流長不亦宜乎或謂師之後大抵説法朝廷豈其家化以金馬門為隱者耶曰否不離菩提樹下而據吉祥座者斯何人哉石屋珙禪師石屋禪師者諱清珙虞山人也宋咸淳壬申生於溫姓生之夜光貫北垣其室異香經旬不散珙幼斷酒胾素質清癯而精神宥密六經雜史一覽即不顧於佛經如獲故物乃盡棄其所有為大僧翩然逸舉擇人而見首參高峰妙禪師妙公曰新戒來須何事珙曰生死事大乞施大法公曰我本無法説甚小大珙乃服勤三年不契妙公曰溫有瞎驢淮有及菴宜往見之珙直走見及菴路聞及菴多慢侮罷廢參儀不以禪流為事大有名者輒遭刪削珙疑之然心信妙公之指如不相當則走溫未遲也乃至建陽西峯通謁及菴及菴袒襟危坐受珙展拜遂問珙曰區區逐日何所用心珙對曰以萬法歸一為本參及菴訶曰甚麼害熱病底教你參者死句珙悚然罔措及菴曰有佛處不得住無佛處急走過作麼生會珙擬對之及菴驀起厲聲曰者箇亦是死句便入寢室珙罔措乃堅依座下久之及菴復理前話詰珙珙對曰上馬見路及菴又訶曰在此多年猶作恁麼見解珙憤以為及菴賣己因背棄去及菴笑曰珙即回也珙於途中忽見風亭乃急趨回舉似及菴曰有佛處不得住亦是死句無佛處急走過亦是死句清珙今日會得活句了也及菴曰作麼生會珙曰清明時節雨初晴黃鸝枝上分明語及菴肯之於是出入吳越激揚禪社廣結般若緣偶登霞霧山喜之遂搆草菴號曰天湖趨風者日衆珙頻作山居偈頌示之愛之者以為章句精麗如巖泉夜響玉磬晨鳴云嘉禾當湖新創福源禪剎盡禮致珙珙不起平山林禪師作契聰排闥圖柬珙珙慨曰林兄不容吾高臥也於是自擕竹笠飄然而來福源乃勇於臨衆不期綱宗大振圍繞座下多諸有道六七年間衲子為法忘軀而叢林豐盛如西天那爛陀寺有貴人入寺飯僧見珙布衲蕭蕭疑為矯飾竊視方丈棕拂道具外空徒四壁而已貴人大異乃私問寺主曰和尚人天知識何枯淡若此耶殆非吾輩之所堪矣寺主曰然吾師原儉於自奉施者雖多有即散之常誡吾黨莫貪甘暖免償宿債貴人感悟歸散家財而隱有詔徵珙珙堅以疾辭乃降金襴法衣賜之人以為榮珙嘆曰吾少壯時猶不如人況今形之不逮矣忍將名字勞倦人間世乎乃上堂曰卸卻頂上鐵枷揚下手中木杓合眼跳過黃河騰身衝開碧落獅子踢倒玉欄干象王擺壞黃金索白雲兮處處相逢青山兮步步踏著喝一喝云舉頭天外看誰是箇般人便棄福源歸天湖嘉禾公牘互至珙作偈答之有老拙背時酬應懶不能從命出煙霞之句珙年八十有一行不倚杖坐不施褥燈下書字如粟嘗與客夜話將達旦客謝息珙笑曰後生輩精神乃爾安足謀道耶俄告寂門人請命後事珙引聲曰青山不著臭尸骸死了何須堀土埋顧我也無三昧火光前絶後一堆柴已而吉祥化去火後舍利五色莫計塔於天湖時至正壬辰孟秋也諡曰佛慈慧照禪師高麗王仰珙德化且感異夢請旨移文江浙分舍利歸國祀之贊曰瘦稜稜卻如碧海波心湧起一座玉巖硬剝剝好似白雲堆裏突出千尋石屋乃珙公自狀其微也至於道傾彤室德感異置弗論矣但歷來三百餘年人誦其詩偈讀其語録恨不尊公至夜摩覩史之天上蓋公不以虗言而欺世也明矣徑山虗舟度禪師禪師普度者出史氏刊江人也刊俗浮華度不樂家居邀正信友出入僧伽藍結出世緣熏久機熟竟斬髮焉自號虗舟入講肆精貫楞伽唯識晝倦𠙥几假寐夢遊於俗俗境宛然僉有術士相其面曰公乃玉堂金馬中客何墮於僧數度唾之曰我既登釋譜不受你輩雌黃也覺則汗流愧悚於是廢卷枯坐不言者纍日同學請入筵度曰此非究竟聽之何為且諸佛涅槃之旨豈言詮能及哉同學病其狂度即負袋而去遍走江南諸有道名之社弗生怠忽乃謁無得通禪師於常州之華藏寺是日同謁者三十餘人通公獨許度參堂度得入通公之室每求佛法大意通每低聲曰佛法儘有待無人處向你説度益心疑夜靜私抵通公榻下哀求不已通又低聲曰將謂無人那乃指度復自點胸數下則瞑目悄然度驚趨出於是參究愈切坐立如木偶人會通公示衆曰破一微塵出大經鳶飛魚躍更分別不將眼看將心看已見重敲火裡氷度脫然省發於座下通乃召度曰不與萬法為侶者是甚麼人度對曰金香爐下鐵昆崙曰將謂者矮子有甚長處見解卻只如此度拜曰謝和尚證明通大喜之度於是久侍華藏師子相契如水乳也通公每勉度出世度啓曰行道之日無窮事師之期有限師壽縱愈趙州恐普度薄福一旦填溝壑再欲蒙師教誨其可得乎通公為之俯首惻然公歿度乃離華藏經行石頭城夜宿袈裟院適東西兩房爭法産搆訟數年不已度釋以片言兩僧悲泣悔過俱以家業屬度度發笑而去自此隨方説法或久或近三十餘年如一日嘗示衆曰邪人説正法正法悉皆邪正人説邪法邪法悉皆正卓拄杖云正耶邪耶又卓云説邪不説邪向者裏揀辨得出黃金為屋未為貴玉食錦衣何足榮又曰萬法是心光諸緣惟性曉本無迷悟人只要今日了既無迷悟了箇甚麼千言萬語無人會又逐流鶯過短墻值徑山朝旨以度居之度年八十力圖興復巨細行役尚自董焉其謙讓不遑待後進如先輩從未以老自稱不二載徑山落成時元世祖庚辰也度每逢通公忌日必展真燒香進食垂涕門下感之率白首親依故唱和妙叶冠絶一時竺西坦歸省於度度大書一偈委之俄就匡牀化去其偈曰八十二年駕無底船踏番歸去明月一天時坦居天童天童及門復有懷信等而大度公之聲蓋懷信為松源嶽五世之孫也孚中信禪師懷信禪師者字孚中為明州奉化江氏之子也十歲求師於其親親命抱本入鄉孰不二載諸籍了然竟罷讀乃謀法華而誦之遂堅圖出家荷任大法又三載師事法華院子思沙門以試經得度竺西坦禪師居天童信往謁之坦公瘦面如鐵尋常熱棒如雨點請益者隆冬亦戰栗揮汗信雖年少從容入問大法坦器重之久經爐鞴信乃道通擔垂問曰興化打克賓克賓還有喫棒分也無信出對曰俊哉獅子兒坦深肯之未幾坦公遷化信鳴衆請雲外岫補居天童信與擊節酬唱拍拍是令岫每稱之曰信公乃洞宗赤幟濟室白眉也大定丙寅出住觀音寺天曆己巳遷居普陀至正改元天童席虗當事者必以致信信曰天童自哲人相繼化後規製非舊觀矣今諸公不棄山野山野惟據令而行諸公若以為可則山野以繼述為志豈敢堅遜而纍諸公行李如不便諸公請更議之衆皆稽顙曰諾於是信蒞天童積弊頓除法席不期而再振四方以賢譽歸之當是時南北兵荒叢林多窘天童食堂盈千衆安居不乏尚有餘糧以賑飢貧楚石琦公嘗作偈與信曰長庚峯頂白雲間捧劄西來笑展顏幾疊巖巒圍丈室萬株松樹繞禪關當年金碧誰將去今日天龍合送還老我恰如窺豹者管中時復見斑斑江表大龍翔寺行御史奉詔迎信信欣然自來時至正十四年甲午也越二載明太祖兵下金陵寺衆風散信獨趺坐不去頃之兜鍪蟻集信儼然在定如不知也及太祖入寺信合爪相迎太祖問曰衆僧因甚不見信曰明眼難瞞太祖甚喜乃命招僧還寺太祖嘗聽信説法歸為近侍曰龍翔信僧言行純慤真太平有道沙門也遂改龍翔為天界命褒章而賜之信德臘雖高未嘗以聲色加學者學者自化信日課蓮經七卷寒暑不間有僧問曰和尚誦經還解義麼信曰清晨喫白粥而今又覺飢僧曰此語卻與經文不合曰明眼師僧灼然猶在僧呵呵大笑曰和尚是甚麼心行信曰且喜信受奉行丁酉元旦日食太祖召信問之對曰食後自明太祖又深喜復論古今符讖之理信曰聖哲以至公為心不求符讖而符讖自合矣愚昧以私欲為念雖鳳麟晝現仍成怪物故曰在此不在彼太祖稱善盡歡而罷八月二十四晨起沐浴更衣召衆告曰吾行矣汝等當以荷法自期瞑目而逝侍僧撼且呼曰和尚不留片語以示人乎信復展目索筆書曰平生為人契戾七十八年漏泄今朝撒手便行萬里晴空片雪乃瞑目長往時太祖督戎江陰前一日夢信告別及還金陵聞訃與夢合太祖甚嗟悼左右皆言前日夢金甲大人相報曰天界古佛入滅矣太祖益驚異賜帑金以資後事舉龕日太祖臨奠依法闍維於聚寶山前獲舍利五色命賀齊叔為卜牛首山建塔又命儒臣銘之天童所塔者爪髮衣履也初信承詔去龍翔天童左右諫曰當今擾攘兵戈有志者求入山林不暇師獨受元主隆譽之名某等似不取也且天下事未知何若耳信答曰我汝均為佛祖兒孫力當撑拄佛祖家庭任緣赴感職宜然也若俱以禍福攖心埋身藏影豈大慈曠濟之道哉且戈矛劍戟之場獨非安樂乎於是願起從行者甚衆贊曰徑山三代門庭施設雖各不同究其機要皆通權達變之宗匠也度公至老尚力圖興復信公至歿猶示應明主是其荷負祖道之任真難釋肩如吳人遊楚者病中聞之仍吳吟也先輩之苦心若此忽之可乎楚石愚菴夢堂三禪師楚石禪師名梵琦乃徑山元叟端禪師之高弟也道弘海鹽福臻次則天寧乃至杭州報國嘉興本覺德風所被聲重九洲當元文順二帝時楚山南北浙水東西其有道尊宿無不經錫徽號琦獨遠引不與焉至正間帝師強贈師號佛日普照慧辨琦亦不署也暮年以門人景獻代主天寧法席則別築方齋於天寧院西為休老計自稱西齋老人至正間四方多事士大夫逃禪海濵者衆矣從西齋遊者如宋公景濂輩最稱博物入西齋之門劇談多北或有問時勢否臧琦但唱休休歌其聲韻莫測癸卯元帝師以手書微琦琦稱病篤不赴戊申明高帝建極以為折抱毀鼓之初而歿於王事者無答焉遂蒲車四出徵天下高行沙門敕儀曹請琦升座於蔣山使存亡者均沾法利高帝見提唱語大悅明年春召入宴文樓以琦年邁賜杖而行留琦館天界又明年復徵天下有道禪師均赴天界其赴詔尊宿三十餘員出元叟之門者三居一焉惟國清曇噩雙徑智及并琦三人頻入宴文樓論道高帝問鬼神幽玄不測之理琦援據經論剖釋宸衷然起居脫略無異西齋時高帝每嘆曰楚石真林下道人也是年七月十六日琦呼侍僧進墨池大書一偈曰真性圓明本無生滅木馬夜鳴西方日出即謂噩夢堂曰師兄我去也噩曰何處去琦震聲一喝而逝年七十有五矣以遺偈聞高帝帝命依法闍維其不壞者二齒如珂玉舌如珊瑚無數舍利連綴其上歸塔天寧西齋愚菴以偈哭曰匡牀談笑坐跏趺遺偈親書若貫珠木馬夜鳴端的別西方日出古今無分身何啻居天界弘法毋忘在帝都白髮弟兄空老大剎竿倒卻要人扶愚菴禪師者名智及吳人也年十七為僧亦得法於元叟端住後四遷名剎元帝師錫號明辨正宗廣慧禪師及公長身山立昂然如孤松在壑法令嚴肅其下無敢方命所至百廢俱興然能俯順時宜又如春風時雨之及物使人不知以其提唱語句達九重撑大元叟家聲復喜納言見三尺童理長則就之雖工剩藝自視若不逮至於料除積弊不出詞色力絶其原故學士宋濂譽曰元帝師以徽號加愚菴及公不虗也暮年不得已再赴明高帝詔抵京抵京未幾會楚石遷化由此得辭還穹窿山時年六十八亦書偈趨寂焉火浴有香氣襲人如沉水香所用數珠循環不壞其遺骨紺澤類青琉璃設利羅積有光復有夢堂噩禪師與及齊名禪師夢堂名曇噩與楚石琦同籍明州琦出象山朱氏噩出慈溪王氏同出元叟之門同赴明君之詔噩之祖父以仕顯家貴且富羅綺交錯噩生其間為童時喜衣布裘喜餐蔬食喜坐靜舍目不遍眨如在定僧伽然與世交談吐風雲變幻莫狀也於諸子史一閲不再因遊郡城延慶講堂見六祖壇經遂竊懷歸翻讀連日夕不釋手乃至忘餐寢竟辭脫髮父兄莫能阻之具戒遍歷禪叢乃罷參於徑山噩事徑山既久名知林下深聖禪寺請噩噩則欣然肯來居無何遷開壽諳熟典故師僧皆從之噩畫一規曰僧堂內外有閲經書者罰油若干一僧每逢朔望納油庫司讀梵網經一僧納油讀傳燈録一僧納油讀易噩笑而憐之曰立法之弊寧至此乎及移居天台國清寺年垂七十矣耳聰目察敷揚宗旨有道衲子趨焉元順帝賜號佛真文懿禪師年八十有八赴明天子之詔館南都天界天界金白菴名馳當世學冠諸老與噩夜話詞氣盡索退而雅稱曰此翁齒牙帶戟不可與爭衡也噩南歸虗其名位而規訓門人復説偈曰吾有一物無頭無尾要得分明涅槃後看泊然示化時洪武辛亥其年八十九矣贊曰楚石愚菴夢堂行道際遇於離亂之秋俱持風采稱為狂瀾砥柱暮年感有國者與交遊光鮮元叟家聲雖三公一時之方便於法門則有力焉經云但以假名字而引導之此之謂也古梅友禪師古梅禪師者名正友姓于氏廣信人也住閩之高仰山為絶學誠禪師入室之真子誠得道於靈雲定定嗣雪巖欽欽為友四世之祖也友為人文而烈不依違兩可好立言行以潔白著聲初依末山本得度本示以禪關節要不領因循住江淮兩浙之間歸省本本揭其所得友罔措本曰你參病鶴禪耳翥翼九天未有日在友愧無所容乃遍歷宗庭因小便觸地恍有所發又參絶學誠公於洪州之般若寺誠曰諦當甚諦當敢保老兄未徹在且道是許它語未肯語對曰言下委然誠大笑而起次早友得上方丈誠曰夜來事作麼生友以坐具便摵曰靈雲捉得賊玄沙不放贓即今贓賊一時斷還和尚了也曰黃檗打臨濟意作麼生友喝誠曰築大愚三拳則且置因甚又來掌黃檗友擬對誠搖手曰不是友曰畢竟那箇是誠擊之曰不是不是次早友又上方丈誠厲聲曰抽袈裟友擬議誠痛打三十友連喝復打六十次早哀求挂塔誠公不許且叱之於是友浮沉歲月自愛也度夏雪巖因讀法昌語豁然有新證乃書頌古數則寄呈般若誠公誠曰此人得我第三番竹篦氣力猶欠脫殼在今兄弟家三年五載做工夫無箇入處將從前話頭拋卻不知行到中途而廢可惜前來許多心機有志之士看衆中柴乾水便僧堂溫暖發願三年不出門決定有箇受用有等才做工夫但見境物現前便成四句將謂是大了當人口快舌便誤了一生三寸氣消將何保任若欲出離參須真參悟須實悟友遙聞之閨閣中物一時放下又三年赴齋打動鉢盂乃徹法源披伽黎焚香向般若大展曰非吾師大機大用正友幾成木強人耳住後上堂曰慧劍單持明行正令擬議不來喪身失命還有當鋒底麼良久云正好一帆風過海箇中不遇駕濤人喝一喝又曰月落山頭慘雲橫谷口陰欲明生死事直指本來心且道如何是本來心夜靜不勞重借月玉蟾常挂太虗中至正壬辰深春高仰山樹不頴泉忽涸衆懼友曰老僧向後自有嘉徵五月初三集衆跏趺垂訓諄諄奄然斂目而寂仰山泉始湧樹始花友初住天心掘地見藏金友掩之或曰無主之物方便納之以興佛事曷不可乎友曰吾教以檀施為佛事發藏得物未之載也而容之寧不慚乎其夜風雨暴作巨石崩壓其處人名其山曰卻金山贊曰蒿枝之令數百年來叢林畏而不聞矣是以驢乳十斛雜濫人間而端人正士故有流涕長太息之感也誠公滴桃源真乳於嚴霜巨凍之秋而古梅之器琉璃也自無迸裂之患則雪巖橫出一枝灼可觀焉
