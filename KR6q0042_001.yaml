body:
  text: 紫籜山沙門自融撰門人性磊補輯閩莆林友王較訂佛燈珣禪師禪師名守珣號佛燈出吉安州施姓巨族早歲棄家得道於太平佛鑑勤公珣初參廣鑑瑛不契竟謁佛鑑佛鑑孤硬難入珣乃封其衾而矢曰此生不悟不展此也於是晝坐宵立逾七七日憊甚適佛鑑垂語曰森羅萬象一法所印珣踴躍便出法堂即投靈雲見桃花頌曰終日看天不舉頭桃花爛熳始擡眸饒君更有遮天網透得牢關即便休佛鑑曰如何是靈雲不疑處對曰只今覓箇疑處了不可得曰玄沙道未徹在那裏是未徹處曰深知和尚老婆心切佛鑑喜之會佛果至鑑稱珣見處穩實且曰此子自治嚴刻密室如對大賓後當有造佛果佯諾乃私招珣遊山偶到一潭佛果推珣落水遽問曰牛頭未見四祖時如何珣對曰潭深魚聚見後如何珣曰樹高招風見與未見時如何珣曰伸腳在縮腳裏佛果乃大笑宣和改元詔佛鑑住蔣山佛果移書與鑑必以珣首蔣山衆由是湖海知名建炎間住天聖開堂時內翰王公問三聖逢人則出話珣笑曰公曾閲詩否曰館務之暇何所不覽珣曰詩云湖光㶑灔晴遍好山色空濛雨亦奇若把西湖比西子淡粧濃抹總相宜王公乃大稱珣於朝待制潘良貴嘗以南泉斬猫話請益於珣珣曰如今士夫說禪說道秖依著義理便快活似將錢買油糍喫了便不饑其餘便道是瞞他亦可笑也貴領旨後以居士身弘珣之道珣遷何山晚居天寧每憐學者根器不妙委曲援引如瓶瀉秋河間有竊議不遑恤也嘗舉婆子燒菴話曰大凡扶宗立教須是其人你看他婆子雖是箇女人宛有丈夫作略二十年蓰油費醬固是可知一日向百尺竿頭做箇失落直得用盡平生腕頭氣力自非箇俗漢知幾洎乎巧盡拙出然雖如是諸人要會麼雪後始知松柏操事難方見丈夫心又舉溈山一日見野火乃問道吾還見火麼曰見溈曰從何處起曰除卻經行坐臥請師別致一問來溈山休去乃曰連天野火了無涯起處猶來辨作家眼裏瞳人雙翳盡面前遍界絶空花道吾老也堪誇且道畢竟從甚處起汲水僧歸林下寺待船人立渡頭沙有僧問賓中賓珣答客路如天遠候門似海深賓中主珣答長因送客處憶得別家時主中賓答相逢不必問前程主中主答一朝權祖令誰是出頭人僧曰向上宗乘又如何珣曰大海若知足百川應倒流又嘗謂衆曰兄弟若有省悟處不拘時節須來露箇消息會雪夜有僧直扣丈室珣起秉燭震威喝曰雪深夜半求決疑情因甚威儀不具僧顧衣裓珣便逐出紹興甲寅從天寧歸鄣南告寂侍者請遺偶珣曰不曾做得即逝火浴舌根不壞塔於寶應院珣初在廬山日有僧彥威冬月用荻花絮紙衣珣見大瞋曰你少年輒求溫暖如此豈有心學道耶威大驚退問兄弟時堂中有荻花衣者才三四人皆年七十餘矣贊曰佛燈於七七之際頓了大事圓悟尚剝之何也如海底瑚不以鐵綱舉而出之焉得珍灼於人間世哉然佛燈以清簡之風震一世足徵其源亦不愧也矣圓通真際止禪師德止禪師者世居歷陽金紫徐閎中之季子也法紹寶峯闡提照禪師照為簡州人妙齡遊方謁芙蓉楷公於大洪有得而去及楷公辭大觀之詔而嬰難照自三吳急趨從之於途中大悟楷公遂以投子之讖而系照是照與丹霞淳輩為伯仲淳之視師猶子也是師與真歇了宏智覺又雁行焉師生十歲不肯知書多私夜坐喜公晝寢其父戲目師為懵然子然師雙瞳紺碧神光射人出語間合聖誥其父又鍾愛之異於諸子嘗稱於門客曰吾懵然不懵也師弱冠夢異僧授偈四句已而有以南安巖主像遺之者其傍所載即向夢所授之偈也自是持念不忘一切世典過眼即罷之年二十隨父任漕西洛每閉閣凝坐或連朝不許進食人俱怪其所為一夜擬吹燈就寢忽大悟連吐數偈其一曰不因言句不因人不因物色不因聲夜半吹燈方就枕忽然者裏已天明於是嘯歌自若人益怪之其父欲授師世職師固讓於從兄乃告父曰某方將脫世綱不著三界豈復刺頭於名利場中遂力求出家其父知師志決不可以章綬綰也乃旌師祝髮具苾芻戒遊方數載名振京師政和間機投闡提照公於楚南宣和三年辛丑徽宗皇帝以真際師號賜之壬寅適江州圓通席虗朝旨以照補之照辭圓通而居泐潭師遂應詔代主圓通圓通當匡廬之名剎諸山耆德尚未足師名領院日俱往觀之升座拈提衆耳皆聳其語曰山僧二十年前兩目皆盲了無所覩唯是聞人說道青天之上有大日輪照三千大千世界無有不遍之處籌䇿萬端終不能見二十年後眼光慚開又值天色連陰濃雲亂涌四方觀察上下推窮見雲行時便於行處作計較見雲住時便於住處立窠臼正如是間忽遇著箇多知漢問道莫是要見日輪麼何不向高山頂上去山僧卻徵宅道那裏是高山頂上他道紅塵不到處是諸仁者好箇端的消息還會麼長連床上佛陀耶又曰昨夜黃面瞿曇將三千大千世界來一口吞盡如人飲湯水踪跡不留應時消散當爾時諸大菩薩聲聞羅漢及與一切衆生盡皆不覺不知唯有文殊普賢瞥然見雖然得見渺渺茫茫恰似向大洋海裏頭出頭沒諸人且道是甚麼消息若也簡點得破許你頂門具一隻眼師住圓通今古法門所積之廢無不備舉而整頓之然以身度人使人易行矯清賣高之條師弗取也選職任事以德不以才嘗嘆曰寧缺人而廢事過在一時若能事而敗化則遣臭萬世矣以故衲子游泳於圓通如魚相忘於江湖南宋紹興五年乙卯示寂闍維烟𦦨所及悉有設利諸方稱師身後佛事與寶峯照公皆乘大願而來者也照公先於建炎二年示寂其闍維亦得設利無數舌齒不壞師之設利塔於司空山分窆疊石原照公設利則塔泐潭之西峯矣智通深禪師禪師名景深台州王氏子幼喜林泉不樂城居每玩名山圖志恍若身游年十八竟走紫籜山之廣度院求度於德芝沙門芝愛其標幟不凡即為披剃廣度為東南禪窟瓢笠挂搭者不絶深輒聞少室宗風辭芝行腳芝難之深泣告曰日月迫人速如轉轂生死事大敢自放乎芝憫而遣之深出嶺而心誓曰此去若不發明大事以報四恩非鬚眉丈夫也遂扣淨慈象之室象或垂問深便依理而默解之一日聞象怒叱諸禪曰思而知慮而解皆鬼家活計深悚然束包而去西入泐潭謁闡提照照有條約凡僧來泐潭須𨽻名行單半載方許告香深犯其禁直剖己見於照公榻下照曰此事直須斷起滅念向空劫已前掃除玄路不涉正偏盡卻今時全身放下放盡還放方有自繇分深頓領旨照大喜乃擊鼓告衆曰闡提大死之道深闍黎得之矣汝輩宜依之一衆大驚爭識深面以故叢林共稱深為大死翁建炎初出領興國軍之智通寺紹興壬子還台住寶藏巖因事民其服深恬然不辨順受之有司知深有道奏還僧衣時智朋禪師新從清涼退居明州瑞巖聞而嘆曰嗟乎不陷於榮不逃於辱寶藏法兄真得泐潭先師之道矣我芙蓉師翁之風不亦大哉適明守挽朋再赴清涼朋一笑書偈付使者曰相煩專使入烟霞灰冷無湯不點茶寄語甬東賢太守難教枯木再生花遂歿深聞慟之乃上堂曰來不入門去不出戶來去無痕如何提唱直得古路苔封𦏪羊絶跡蒼梧月鎖丹鳳不棲所以道藏身處沒踪跡沒踪跡處莫藏身若如是去住無依了無向背還委悉麼而今分散如雲鶴你我相忘觸處玄紹興二十二年壬申三月十三日深為衆小參罷便告寂有偈曰不用剃頭何須澡浴一堆紅焰千足萬足雖然如是且道向上還有事也無竟斂目而逝深自復僧衣其升堂入室提唱宗旨切切無虗日有僧問正中偏深答黑面老婆披白練偏中正答白頭翁子著皂衫正中來答屎裏翻斤斗兼中至答雪刃籠身不自傷兼中到答崑崙夜裏行僧曰向上還有事也無深曰捉得烏龜喚作鱉乞師再垂方便深曰入山逢虎臥出谷鬼來牽曰何得干戈相待曰三兩線一斤麻深之道眼精明機用自在於寶峯門下稱賢肖焉贊曰芙蓉之後異苗番茂而闡提照公輩可想也其門弟德止禪師不假師授神悟絶倫傾當世有國者時稱為太陽再世不謬矣至於景深禪師則照公獨提獎於人天衆前師資緣會夫豈偶然哉及其弘道而榮辱喧天人風確不可撼在往哲有所不能而獨能之非深得羼提三昧者其可得歟嗚呼二師於諸樂並作之際而大振黃鍾則遠録公之功政未替也龍牙才禪師禪師名智才姓施氏舒州人也進止勇猛有囊括之志斷髮為大僧趨最上乘遂得旨於佛鑑勤公公補太平時衆多務繁才自典犂钁一衆仰焉又謁死心禪師於黃龍死心輒拈百丈野狐公案以徵才才遽對曰入戶已知來見解何須更舉轢中泥曰死心長老死在上座手裏也才曰語言雖有異至理且無差曰如何是無差底事才曰不扣黃龍角焉知頷下珠死心便打才拂袖趨去之死心後知乃嘆曰太平之風果不寂寥政和初佛鑑自太平移智海才造省佛鑑以智海之衆命才首之才辭不就乃隱嶽麓佛鑑遷蔣山才又造省時珣禪師為座元有僧以女子出定因緣請珣批判珣曰瞿曇身心如泥女子肝腸似鐵文殊貪尋鍋子罔明繇來著楔歷觀大地衆生不解閉門作活不動干戈建太平雨過春山如黛潑其僧不領乃請決於才才曰女子文殊與罔明禪徒畢竟如何委除非格外妙投機始信波濤元是水僧有省珣笑曰須是我才蘇嚕始得才居嶽麓時因僧問德山棒臨濟喝今日請師為拈掇才曰蘇嚕蘇嚕曰蘇嚕蘇嚕還有西來意也無才曰蘇嚕蘇嚕故叢林稱為才蘇嚕云才遷潭州龍牙龍牙有衆數百不以聲色而出入提揭如左右手均勞逸預險夷木榻之側片笠不完禪徒飫染其味昂昂自若一以胎風雨鷇之舌敲唱玄猷故居十三載如一日有語曰彈指圓成八萬門剎那滅卻三祇劫若也見得行得健即經行困即歇若也未會兩箇鸕扛箇鱉紹興間退居雲溪忽集衆曰戊午中秋之日出家住持事畢臨行自己尚無有甚虗空可覓衆大驚攀戀之至二十三日又曰涅槃生死盡是空花佛及衆生並為增語汝等諸人合作麼生良久喝曰白雲湧地明月當天竟長往火浴收五色舍利塔於本山贊曰佛鑑嘗謂才公云住持有三訣見事能行果斷三者缺一則見事不明終為小人忽慢住持不振矣故才公開化二十載衆敬畏之如羽族隨鳳懷其德也是時死心善罵天下聾縮獨於公則嘖嘖延譽於不衰豈徒然哉性空普菴主禪師妙普者字性空漢州人也公性少緣飾好面折人能與公游者始終皆播令名公嘗以短䇿荷敝衲歷諸名山不喜同衆挂搭或宿古廟或寄閒房有以耐叢林而諫公公為諾諾而已及見死心於黃龍乃折䇿堅依之竟得黃龍之旨死心獨奇公公慕船子遺風辭抵秀水結茅青龍之野吹鐵笛自娛愛發新聲嘗歌曰心法雙忘猶隔妄色塵不二尚餘塵百鳥不來春又過不知誰是住菴人又曰學道猶如守禁城晝防六賊夜惺惺中軍主將能行令不動千戈治太平又曰十二時中莫住工窮來窮去到無窮直須窮徹無窮底踏倒須彌第一峯建炎初徐明唱叛道經烏鎮恣殺戮雞犬絶聲公憫之乃曳履獨往或以險難止公公曰隨緣赴感吾之願也賊見公偉異疑必跪伏者執問來端公曰吾乃禪者欲抵密印寺豈有他哉賊怒欲殺公笑曰大丈夫要頭便斫去何以怒為願施一飯以為送終賊意稍解授以肉食公如常應供出生畢乃曰孰當祭我以文賊相笑顧不答公曰吾自為之賊復相笑遺以禿筆公起大書於空壁曰嗚呼惟靈勞我以生則大塊之過役我以壽則陰陽之失乏我以貧則五行不正困我以命則時日不吉吁哉至哉賴有出塵之道悟我之性與其妙心則其妙心孰與為鄰上同諸佛之真化下合凡夫之無明纖塵不動本自圓成妙矣哉妙矣哉日月未足以為明乾坤未足以為大磊磊落落無無礙六十餘年和光混俗四二十臘逍遙自在逢人則喜見佛不拜笑矣乎笑矣乎可惜少年郎風流太光彩坦然歸去付春風體似虗空終不壞尚饗字勢飛動數壁俱盡遂舉筯飫食賊徒爭視大笑公食罷復高聲招曰來來劫數既遭離亂我是快活烈漢如今正好乘時便請一刀兩段又大呼斬斬賊大駭異令衛出之烏鎮廬舍獨全公之惠也道俗聞益皈仰以名剎致公不顧或說公從上付託之重公輒以鐵笛揮之紹興庚申命造大盆修書寄雪竇持禪師曰吾將水葬矣持笑曰風流老子灼有商量壬戌持至見公尚存相敘歡甚占偈嘲曰咄哉老性空剛要餧魚鱉去不索性去只管向人說公笑曰惟待老兄證明耳令告四衆衆集公為說法仍說偈曰坐脫立亡不若水葬一省柴燒二省開壙撒手便行不妨快鬯誰是知音船子和尚高風難繼百千年一曲漁歌少人唱遂盤坐盆中弄笛順潮而下緇素隨至不可勝計望欲斷目公取塞戽水而回衆擁觀水無所入復乘流而往引聲拍掌長歌曰船子當年返故鄉沒踪跡處妙難量真風遍寄知音者鐵笛橫吹作散場其笛聲嗚咽頃於蒼茫間見以笛擲空而沒後三日灘頭趺坐如生四至爭往迎歸留五日異香不散闍維時有二玄鶴徘徊空中得舍利大如菽者莫計塔於青龍其尺楮片言流播人間珍如珙璧贊曰余考建炎之擾高蹈物表不無其人普公直躡不測之壘因機示教布置節次毫忽不亂此其智力願力可稱兩足矣惟顛末追慕船子雖釣盡清波金鱗不遇而公之慈風凜然在也龍翔竹菴圭禪師禪師名士圭號竹菴蜀郡成都史氏子乃龍門佛眼遠公之高弟也說法於江南浙閩諸大名坊圭有密行喜推獎人士一與圭接者皆成美名圭初依止於大慈沙門宗雅研究楞嚴而雅亦僧杰也默察圭器度宏大意欲圭南詢乃盛贊真歇之為人蓋歇未出蜀時亦習講於成都大慈圭味其指棄講謁諸名宿雖經賞識未豁所蘊晚登龍門擬以平時所得舉似佛眼佛眼知圭命典堂司不得辭圭以未伸所解為悶幾入方丈多遇高菴正堂輩在焉高菴正堂時稱明眼圭慚乘間問曰絶對待時如何佛眼哂曰如你僧堂中白椎相似圭不領至晚理前問佛眼唾曰閒言語圭背汗淋踵弗吐一詞而出因嘆曰窮諸玄辨若一毫置於太虗竭世樞機似一滴投於巨壑吾蜀周金剛不謬矣政和間開法天寧浩歸湖海馮濟川嘗以圭之玄要頌舉似妙喜妙喜稱之及濟川除給事圭同日受詔住雁山能仁時稱佛眼門下表裏二檀樹焉真歇居江心寺有大名聞圭將至恐東甌未廓所見乃過江迎圭大展九拜以誘甌人圭未視篆有嫉者深夜縱火能仁燬盡圭就故址結茅乃示衆曰愛閒不打禾山鼓投老來看雁宕山杰閣嶽樓渾不見溪邊茅屋兩三間還有共相出手者麼喝一喝未幾能仁復成初寺隨圭之衆多背去者寺成復歸或曰彼彼以成敗事師非義侶也請勿收録圭曰不然境風所飄力未充也若棄之豈慈攝之義哉真歇移徑山圭補江心江心有僧久居閒房不預參列值圭升座攙衆出問曰如何是祖師西來意圭曰東家點燈西家暗坐未審意旨如何圭曰馬便搭鞍驢便推磨僧禮拜圭曰靈俐衲僧只消一箇圭乃曰馬搭鞍驢推磨靈俐衲僧只消一箇縱使東家明點燈未必西家暗中坐西來祖意問如何多口阿師自招禍其僧脫然終其身不露姓字圭後住閩之乾元有慧溫入室圭曰情生智隔想變體殊不用停囚長智速道將來溫有省大笑起曰拶出通身是口何妨罵雨呵風昨夜前村猛虎咬殺南山大蟲圭諾之又移居鼓山進院至三門德升把住問曰國師不誇石門句請師速道圭震聲喝之升亦領旨圭既年老罷上堂惟臨軒隨機不計旦暮而已以紹興丙寅七月晨起沐浴升座命聲鼓集衆衆方集圭顧視左右就法座泊然坐化茶毗舍利無數送者均得之塔於鼓山贊曰竹菴以魁梧奇偉之姿初剃染即受知於宗雅遊方復際遇於龍門及行道又逢真歇而襄之輒與高菴正堂輩齊名海內噫其所謂獅子乳得器有以哉
