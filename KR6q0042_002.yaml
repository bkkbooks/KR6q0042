body:
  text: 祖奇二首座黃龍曰道如山愈升而愈高如地愈行而愈遠學者卑淺盡其力而止耳惟有志於道者乃能窮其高遠其他孰與焉悲夫眾生之見以形影為高以肝膽為遠遠則生疑高則生慢慢疑之疾痼於胸次所以與道日劫相違故大慈示現始假之以名終昭之以跡然名忘則形影之山非高實跡則肝膽之地非遠俾血氣之屬莫不一貫而歸之且名跡又安可少哉達士則不然若華亭白丁日擾戛於烟波渚月之間投之者有夾山至於城隅破院一語之下識老僧而終嗣之者清涼也又若貫首座單丁三十載至今聞其風莫不高山在仰嗚呼豈盡必萬指圍遶始稱有志於道而後定向往哉余輯傳見有宗振首座者出昭覺之門嘗書壁云住在千峯最上層年將耳順任騰騰免教名字落人齒甘作今朝百拙僧味其語句葢龍山大梅之儔也惜後事莫考不可得而傳惟祖奇二首座能窮山地之高遠耳倘所謂有得於道者非耶傳曰道祖首座者成都人也緇裘敝履徤於遊操鄉音見圓悟眾笑之然悟愛其品堪任大法乃以即心是佛話上下鞭䇿之祖忽開悟於是出語驚人人莫測也一日圓悟白眾以祖為堂中第一座眾竊議曰老漢大有鄉情在祖輒為眾入室騁其石光電閃之機素稱強項魁杰者皆為失色尚餘二十許人祖驀擊案問曰生死到來如何回避左右無對祖擲下拂子奄然脫去眾大驚亟聞圓悟悟至召曰祖首座祖張目視之悟曰抖擻精神祖點首竟長往矣世奇首座亦成都人常隨佛眼和尚其慈祥博厚為眾所仰真參實請不間寅昏佛眼每嘆曰若奇闍黎可謂晚季之精進幢子也奇既得旨於佛眼佛眼命奇首眾於龍門奇固辭曰此非細事也如金鍼刺眼毫髮有差睛則破矣願盡未來際生居學地而自煅煉佛眼因以偈美之曰有道只因頻退步謙和原自慣回光不知已在青雲上猶更將身入眾藏暮年學者力請不容辭每與宿衲盤桓紏結處一語釋之佛眼益為嘉嘆一日集眾說偈曰諸法空故我心空我心空故諸法同諸法我心無別體祗在而今一念中且道是那一念良久震威一喝而終自是之後宇內禪社常追繹二首座之風以率眾焉贊曰建叢林立宗旨獨掌委不浪鳴自我本師能仁分座於多寶世尊之後其激揚法化為人天眼者斑斑較著焉今觀祖奇二公以去來自在三昧克壯一代宗猷豈偶然哉或以九峰侍者之機而按之所謂夜郎王初具君臣不知漢大也護國此菴元禪師此菴禪師者東甌人也出張氏名景元元以妙年謁圓悟勤公於鍾阜公即許元入侍時悟公左右皆顯名宿德元與之抗或議其少叢林公不顧然元不離公榻下洞徹玄旨機發觸眾有訴於公公笑曰我家聱頭侍者汝姑避之耳自是眾憚其鋒靖康改元圓悟歸蜀元辭還浙悟公曰向去有人問你作麼生元拊傍僧背曰和尚問你何不抵對公大笑曰我有些子禪被元聱頭一布袋盛將去也叢林又共稱為元布袋云圓悟乃題小像而付元曰平生只說聱頭禪撞著聱頭如鐵壁脫卻羅籠截脚跟大地撮來墨漆黑晚年轉復沒刁刀奮金剛鎚碎窠窟他時要識圓悟面一為渠儂併拈出元既受囑鏟彩埋光不求聞達耿龍學守括蒼因閱圓悟錄得元之為人時南明虗席遂遣使物色之至台之報恩獲於眾中迫授南明之命眾尚咿唔無信可意有僧問曰逢人則出出則不為人意旨如何元曰八十翁翁嚼生鐵進云逢人則不出出則便為人又作麼生曰須彌頂上浪翻空報恩方丈古禪師乃靈源高弟深駭異之即推崇元勉應其命元受請日古公先引座舉白雲見楊歧歧舉茶陵悟道公案請元批判元乃陞座曰諸禪德楊岐大笑眼觀東南意在西北白雲悟去聽事不真喚鐘作甕檢點將來和楊岐老漢都在架子上將錯就錯若是新南明則不然我有明珠一顆切忌當頭錯過雖然覿面相呈也須一槌打破舉拂子云還會麼棊逢敵手難藏拙詩到重吟始見工於是海眾聞風奔集南明南明開堂日僧問昔年三平道場重興是日圓悟高提祖印始自師傳如何是臨濟宗元曰殺人活人不眨眼目前抽顧鑑領略者還稀如何是雲門宗元曰頂門三眼耀乾坤未舉先知未言先見如何是溈仰宗元曰推不向前約不退後三界惟心萬法惟識如何是法眼宗元曰箭鋒相值不相饒建化何妨行鳥道回途復妙顯家風如何是曹洞宗元曰手執夜明符幾箇知天曉僧曰向上還有路也無曰有曰如何是向上路元曰黑漫漫地僧便喝元曰貪他一粒米失卻半年糧又問天不能葢地不能載是甚麼物元曰無孔鐵鎚曰天人羣生䫫皆承此恩力也元曰莫妄想又問三世諸佛說不盡底請師速道元曰眨上眉毛乃曰威音王已前者隊漢錯七錯八威音王已後者隊漢落二落三而今者隊漢坐立儼然且道是錯七錯八落二落三還定當得出麼舉拂子云吽吽又曰埜干鳴師子吼張得眼開得口動南星蹉北斗大家還知落處麼金剛堦下蹲神龜火裡走又歷應仰山連雲諸剎晚遷天台護國寺寺久廢元樂而新之紹興丁丑輒請西堂應菴禪師首眾以後事囑之俄頃握右拳蛻去年五十有三坐三十五夏茶毗得五色舍利齒舌右拳無少損塔於寺東劉阮洞前松窓居士錢端禮聞訃乃喟然曰吾師何獨行也適平田簡堂禪師并瑞巖國清二主人至禮與詳敘達旦遂書語別之置筆顧曰先師握拳而去禮坐去好臥去好簡堂哂曰一去便了理甚坐臥禮合爪曰法兄當為祖道自愛正坐斂目而逝簡堂名行機後住國清或菴住焦山而元公之道大弘焉或菴體禪師或菴禪師名師體台州羅氏子也師事此菴兄事簡堂簡堂既得契證因密言於此菴曰體公他日十倍於某願和尚憐之此菴默然自是護國諸役皆遣體任之體勇於謀道雖百冗終歲未見喜慍之色忽徹旨於此菴一喝之下乃投頌曰商量極處見題目途路窮邊入試場拈起毫端風雨快者回不作探花郎此菴密書片紙而付體曰老壽開花隹火結子體乃匿跡天台居無定所崖穴之士率得法利丞相錢公象先遂以天封招提勉令應世體宵遯去錢公深為太息乾道初遠公瞎堂住國清因見體題圓通像贊曰不依本分惱亂眾生瞻之仰之有眼如盲長安風月貫今昔那箇男兒模壁行驚喜曰不謂此菴有此兒耶徧索之得於江心寺固於稠人中請充第一座僧問體曰一種沒絃琴久居在曠野不是不會彈未遇知音者知音既遇未審如何品弄體曰鐘作鐘鳴鼓作鼓響叢林雜然稱善瞎堂遷虎丘體就省道俗聞體高風力以覺報蘭若延之覺報舊名老壽菴體忻然來就以為此地符先師所讖體初住老壽衲子難搆瞎堂甞謂體曰人之才器自有大小誠不可強故楮小者不可懷大綆短者不可汲深鴟鵂夜撮蝨察秋毫晝出瞋目不見丘山葢分定也於是體別展機宜以歸來學室中常摩捋苕帚柄問學者曰依稀苕帚柄彷彿赤斑蛇學者擬議輒舞苕帚柄駈之有老衲請其旨體曰棒下無生忍臨機不見爺僧傳至虎丘瞎堂曰者箇山蠻杜抝子放拍盲禪治你那一隊埜狐精體聞說偈曰山蠻杜抝得能憎領眾匡徒似不曾越格倒拈苕帚柄拍盲禪治埜狐僧瞎堂知之大笑而已晚移焦山上堂舉臨濟四喝話乃召眾曰者箇公案天下老宿拈掇甚多第恐皆未盡善焦山不免四稜著地與諸人分明註解如何是金剛王寶劍咄如何是踞地獅子咄如何是探竿影草咄如何是一喝不作一喝用咄若也未會拄杖子與焦山吐露看卓一下曰笑裏有刀又卓一下曰毒蛇無眼又卓一下曰忍俊不禁又卓一下曰出門是路更有一機舉話長老也理會不得又曰道生一無角鐵牛眠少室一生二祖父開田說大義二生三梁間紫燕語呢喃三生萬物男兒活計離窠窟多處添少處減大虫怕喫生人膽有若無實若虗爭掩驪龍明月珠是則是祇如焦山坐斷諸方舌頭一句作麼生道肚無偏癖病不怕冷油虀拍禪床下座又雲水率以十智同真浩浩商量體曰朝暮三四豈良狙哉乃大書於僧堂曰陽春白雪非難和藻鑑水壺豈足觀一把柳絲收不得和烟搭在玉闌干有居士愛問諸禪曰夫婦相打通兒子作證且道證父即是證母即是江湖對者不滿其意體寄以語曰小出大遇居士從此不問話淳熈己亥八月示疾召眾言別曰先師結子之讖今其時矣眾涕哀不已體揮其手復彈指曰鐵樹開花雄鷄生卵七十二年搖籃繩斷遂趨寂先一日手書并硯寄別侍郎曾公逮曾公奔至以偈慟曰翩翩隻履逐西風一物渾無布袋中留下陶泓將底用老夫無筆判虗空贊曰千峯合嶽嶽影自崇萬籟靈秋秋光自逈葢理之必然也顧瞎堂索或菴於寂寞窮海之心豈閒相識哉然或菴一出天下英靈霍然左袒揆厥所繇聱頭之禪峻矣乃其後葉與瞎堂遠公齊鳴豈非漢家子弟盡隆準乎文殊道禪師禪師名心道眉州人也生徐氏性剛毅矜氣節施德於人使人不知赴人之厄如救己溺然厭世法布衲芒鞋出入古招提意趣純一苦行頭陀也以三十歲出家自恨其晚習教參禪寒暑衣不解帶遂為佛鑑懃禪師之長子襄守慕其節操請主天寧解包之日一拂臨軒龍象不啻子來後遷常德之文殊寺宋道君皇帝宣和初尚方術敕改僧為德士天下禪林剎竿易號一時我諸老宿皆結舌而遯惟道公與祖鏡英禪師受詔英仍住太梅道仍住文殊人譏之道束髮加冠陞座曰祖意西來事今朝特地新昔為比丘相今作老君形鶴氅披銀褐頭包蕉葉巾林泉無事客兩度受君恩所以道欲識佛性義當觀時節因緣且道即今是甚麼時節毗盧遮那頂戴寶冠為顯真中有俗文殊老叟身披鶴氅且要俯順時宜一人既爾眾人亦然大家成立叢林喜得羣仙聚會共酌迷仙酎同唱步虗詞或看靈寶度人經或說長生不死藥琴彈月下指端發太古之音棊布軒前妙著出神仙之外進一步便到大羅天上退一步卻入九幽城中祇如不進不退一句又作麼生道直饒羽化三清路終是輪迴一幻身英公則恣筆注老子以進道君道君嘉悅命頒道藏流行乃賜英冠珮壇誥人復譏二公為次年復僧道公陞座曰不挂田衣著羽衣老君形貌頗相宜一年半內閒思想大抵興衰各有時我佛如來預讖法之有難教中明載無不委知較量年代正在於茲體得其便惑亂正宗僧改俗形佛更名字妄生邪解刪削經文鐃鈸停音鉢盂添足多般矯詐欺罔聖君賴我皇帝陛下聖德聖明不忘付囑不廢其教特賜宸章頒行天下仍許僧尼重新披剃實謂寒灰再𦦨枯木重榮不離俗形而作僧形不出魔界而入佛界重鳴法鼓再整頹綱迷仙酧變為甘露瓊漿步虗詞番作還鄉曲子放下銀木簡拈起尼師壇昨朝稽手擎拳今日和南不審秖改舊時相不改舊時人敢問大眾舊時人是一箇兩箇良久曰秋風也解嫌狼藉吹盡當年道教灰英公獨不改服仍冠珮逍遙山居大梅人益譏之道聞而嘆曰大梅老真不忝雲門之裔也後果於南宋紹興間擊鼓集眾捐冠珮象簡於地乃露頂披伽黎拈拄杖說妙法竟擲下拄杖斂目而逝英嗣九峯韶為雲門六世道居文殊既久時南北烽燹競發宇內叢社率苟簡安眾而已道獨不然有以翰墨隨身常嗔訶之或問其故道嘆曰嗟乎取捨情存是非鬬亂行未一尺說便一丈不足取信於天下使血氣之屬偷心不息者皆此輩也而握造化之柄能辭其責乎言訖潸然建炎三年春示眾曰正法眼藏瞎驢滅臨濟何曾有是說今古時人皆妄傳不信但看後三月至閏三月賊鍾相叛其徒請南避之道叱曰學道所以了生死何避哉賊至道端坐木榻若不知賊疑舉槊殘之血皆白乳賊眾大駭引蓆覆之及靖火化顏不少異香烟如雲門人慧方聞道嬰難則隱於潭州不肯應世其繼文殊席者乃思業也業世為屠宰因戮猪忽徹心源棄刀走文殊呈偈曰昨日夜叉心今朝菩薩面菩薩與夜叉不隔一條線道公笑曰你正殺猪時見箇甚麼業作鼓刀勢公頷之贊曰戈矢播廣長之音梟獍說殊勝之法處違常順履險常安道公得之矣公詞華閎放望葢天下不許參徒馳騁翰墨葢亦三折股而知醫者乃云學道所以了生死豈虗言哉又與大梅脫印同文所謂其利斷金也宏智覺禪師禪師名正覺姓李氏李氏為隰州善族覺公生則肉環特起於臂葢其母孕時夢感之徵也七歲日誦數千言佛陀遜禪師見而大異以法室祥麟記之又四載公果得度年十八遊方決誓而行親友俱賢之遂依枯木成禪師於香山香山多佳士成獨器公公受嚴折不發聞誦法華經有省即陳所悟於成成指臺上香盒曰裏面是甚麼物對曰是何心行曰你悟處又作麼生公畵圓相呈之又拋向後成曰弄泥團漢有甚麼限曰錯成曰別見人始得公諾諾而去造丹霞時丹霞淳禪師居焉淳為芙蓉楷之子揩嗣投子青青嗣太陽玄玄公神觀奇偉慎其付授年至八十嘆無可繼者乃以皮履直裰寄浮山遠錄公使為求法器兼讖以偈偈曰楊廣山頭草憑君待價焞異苗翻茂處深密固靈根遠既任荷兩宗居聖巖出洞下宗旨示青青悉玅契遠以大陽頂相皮履直裰令青續其宗系故青為淳之祖而淳為青原思下十二世也淳受公展訖即問曰如何是空劫以前自己對曰井底蝦蟆吞卻月三更不借夜明簾曰未在更道公擬議淳以拂打曰又道不借公大悟其旨便作禮淳曰何不道取一句對曰某今日失錢遭罪淳輾然曰未暇打得你自此丹霞白椎日非公莫敢發響淳移大洪命公居七眾之首四年又分同門真歇了之座於圓通六年出住泗州普照歷舒州太平江州圓通能仁真州長蘆俱為禪衲區藪而洞上之風大廓有問五位宗旨公以頌示曰正中偏霽碧星河冷浸天夜半木童敲月戶暗中驚破玉人眠偏中正海雲依約神仙頂婦人鬂髮白垂絲羞對秦臺寒照影正中來午夜長鯨蛻甲開大背摩天振雲翼翔遊鳥道䫫難該兼中至覿面不須相忌諱風化無傷的意玄光中有路天然異兼中到斗柄橫斜天未曉鶴夢初醒露葉寒舊巢飛出雲松倒建炎初又住天童屋廬湫隘衲子結草樹居常數千指未幾所廢俱成而宏勝冠南國焉有羽客私進乾汞之術公曰我輩非不能也顧欲檀家有所植福耳為汝騐之以汞納口坐踰時吐白金於地客駭謝而去公之再住天童適金人陷明州諸剎皆及窺小白嶺見谷積陰雲疑有伏甲懼而退時江聲絕渡千二百眾俱安牀藉知事憂之頃之嘉禾錢氏致穀千斛歲雖艱遠施無厭贍眾之餘存活白衣老少數萬人有詔移靈隱未越月解歸公於天童計三十載而名號所彰萬方革面上堂曰黃閣簾垂誰傳家信紫羅帳合暗撒真珠正恁麼時視聽有所不到言詮有所不及如何通得箇消息去夢回夜色依稀曉笑指家風爛熳春又曰諸禪德吞盡三世佛底人為甚麼開口不得照破四天下底人為甚麼合眼不得許多病痛與你一時拈卻了也且作麼生得十成通暢去還會麼擘開華岳連天色放出黃河到海聲僧問清虗之理畢竟無身時如何曰文彩未痕初消息難傳際僧曰一步密移玄路轉通身放下劫壺空曰誕生就父時合體無遺照僧曰理既如是事作麼生曰歷歷纔回分化事十方機應又何妨僧曰恁麼則塵塵皆現本來身也曰透一切色超一切聲僧曰如理如事又作麼生曰路逢死蛇莫打殺無底籃子盛將歸僧曰入市能長嘯歸家著短衫公曰木人嶺上歌石女溪邊舞又僧問如何是向去底人公曰白雲投壑盡青嶂倚空高如何是向來底人公曰滿頭白髮離巖谷半夜穿雲入市如何是不來不去底人公曰石女喚回三界夢木人坐斷六門機公提唱語句湖海爭馨炙之均以為因公得見青楷二尊宿也公雖年老日常過午不食縷絲不衣有巨賈獻奇製新錦公堅卻之曰為老僧一人勞千里信施老僧不忍居也必不已估直以供眾是以廉約成風天下效之紹興丁丑九月出隊言別於越帥趙公令詪及諸檀信次月七日還山遂作書請玅喜主我法門後事已而沐浴更衣告眾曰夢幻空花六十七年白鳥烟沒秋水連天俄報玅喜至公泊然蛻去玅喜為公剃髮舍利隨指而下龕留七日顏不少異塔於東谷諡曰宏智塔曰玅光贊曰觀覺公唱教當乾坤鼎沸之秋闢啟東南縝言密行為湖海傾歸玅喜尚左遜之其餘欲並駕爭驅知其孰可也嗟乎洞上宗風微公孰慰浮山之望而足太陽之心哉真歇了禪師真歇禪師諱清了蜀之左綿安昌雍氏子也生有慧根眉目疎秀神宇靜深見佛則欣戀不捨年十一依聖果寺俊僧受業又七歲試法華經得度具戒聽講玄解經論以為言說終非究竟出峽直抵沔漢扣丹霞子淳禪師淳問如何是空劫時自己師擬對淳掌之師契旨翌日淳上堂曰日照孤峰翠月臨溪水寒祖師玄妙訣莫向寸心安師趨進曰今日瞞某甲不得也曰試舉看師良久淳曰將謂你瞥地師便出輒北遊五臺京汴南抵儀真謁長蘆祖照一語契合命為侍者踰載分座照常以老疾擬閑退夢人告曰蜀僧可代照未決蜀僧為誰至宣和壬寅照病篤恍省前讖蜀僧即了首座也廼囑經使陳公請了繼席長蘆開法以香酧丹霞淳語曰我於丹霞先師一掌下伎倆俱盡覓箇開口處不可得如今有恁麼快活不徹底漢麼若無銜鐵負鞍各自著便於是洞宗大振禪流如歸亦多照公遜席之力也及照歿師以父禮行喪事亦宜矣師居七載建炎二年戊申南遊普陀以漚和機引導海山七百餘家皆棄網業庚戌應天台國清寺尋受閩之雪峯紹興五年丙寅奉旨補明州育王寺育王院務曠販不易承理因遞代逋負幾二十萬貫咸為師憂而師居未幾間償舊逋負十有八九矣戊午詔遷蔣山疾辭不赴明年朝旨以溫之龍翔興慶二院合一禪林詔師主之僧集如雲齋粥不繼朝以法田千畝賜之又詔主雙徑慈寧太后建崇先寺居師賜金襴銀絹法物隆渥殊甚師以為可作歸休計上堂轉功就位是向去底人玉韞荊山貴轉位就功是卻來底人紅爐片雪春功位俱轉通身不滯撒手無依石女夜登機密室無人掃正恁麼時絕氣息一句作麼生相委良久云歸根風墮葉照盡月潭空尋示疾中使問候師從容敘謝乃呼首座曰吾行矣跏趺瞑目而逝時紹興二十二年壬申十月朔日也越世六十有二坐四十五夏凡七處說法五承紫泥之詔得度弟子四百嗣法者宗玨等三十餘人所編語錄二集若干卷行世其語曰窮微喪本體妙失宗一句截流玄淵及盡是以金針密處不露光芒玉線通時潛舒異彩雖然如是猶是交互雙明且道巧拙不到作麼生相委良久云雲蘿秀處青陰合巖樹高低翠鎖深師之語句精妙約類如此僧問不落風彩還許轉身也無師曰石女行處不同功曰向上事作麼生師曰妙在一漚前豈容千聖眼僧禮拜師曰秖恐不恁麼師一日入厨看煑次忽桶底脫眾皆失聲曰可惜許師曰桶底脫自合歡喜因甚煩惱曰和尚即得師曰灼然可惜許一桶臨機勘辨約類如此贊曰師初於丹霞掌下洞徹根源便乃遨遊南北衡抗時機不無離師太早之譏殊未知真龍不借涓滴而能霖霈九天豈與點額鈍鱗同日量論哉況師夙承弘願以英偉之操深明的旨宜請假觀方非分外也不期際長蘆推代之風雲卒爾廣澤宜矣故曰得時而動則功成百世其師之謂乎
