body:
  text: 雪峯逆川順禪師逆川禪師名智順又字澄垢東甌瑞安陳氏子也順母有懿德謹於事佛夢僧項有圓光逆汪洋之流而招曰煩為母我莫辭勞也寤即有娠順生七歲神悟特異永嘉實際院即空禪師牧為沙彌誨以大法順信受頂戴刻無惰容耆老多器之順為大僧辭空行腳見諸大有道者入閩抵天寶參鐵關法樞禪師樞署此菴元七世之傳尋常好問禪者老僧舌頭在麼而禪者多被抑不敢犯其鋒順得參堂踰月因如廁覩園中匏瓜有省入室呈所得樞公曰乍入門耳何足重哉曰堂奧更有何法乞師揭示公大笑而罷之於是順括磨究竟盥漱悉忘夜深常入樞公之室參請古德因緣或至晨鐘鳴乃趨出樞心嘉之一夕徐問曰曾聞和尚遍見湖江諸大老未知於何機下得徹本源也樞公曰我當時往華藏受業於竺西和尚便知有此事但胸中似有一物放不下受具後參中峯及菴諸老諸老未常不以本色示我我只不能領會乃走石門見我元翁先師先師亦無長語惟道不是心不是佛不是物作麼生會其時前後際斷一日齊後下牀忽踏著實地急走方丈先師遙見而笑曰作麼我進曰南泉被我捉敗了也先師曰南泉即今在甚麼處我便喝先師曰離卻者一喝南泉聻我拂袖而出自後執侍巾瓶一十五載我事且置你向何處見南泉順詞色俱喪愧無所容又一夕聞參鐘擬離榻豁然大悟趨告樞公曰南泉敗缺今已見矣樞曰心佛物俱不是是箇甚麼對曰地上磚鋪屋上瓦覆曰即今南泉在何處對曰子過新羅曰錯順亦曰錯明日樞命撾鼓勘驗順扼腕上下顧視曰和尚眼在甚麼處樞助喜曰也要大家知至正六年庚辰秋樞公遷化順繼天寶之席於是此菴之宗大振自順溯此菴元其世有八元得焦山體體三傳天竺有有傳天池元翁信信之嗣二人曰大慈成曰鐵關樞順既受樞公正印號令人天海內改觀焉從天寶遷報恩又移居歸原而機用縱奪益慎於居天寶時也當是時南北衲子駢集朝廷知順乃賜衣加號佛性圓辨禪師順即退居東甌之羅山穴地為爐折竹為箸不設臥榻不貯宿舂或以矯世譏之順弗顧也平章燕只不花鎮閩堅起順住閩之東禪寺又移雪峯順之法政善巧圓融座下不規而肅聽順說法各有領解雪峰數百年來稱順為中興矣明洪武初詔順升座於鍾山上臨聽法悅如舊識順每對上稱僧而不臣或忘而稱我上以真率美之已而還南南國以淨慈留順居無何有司復以朝旨強順抵京經四月書偈而逝時洪武十三年夏也闍維所獲舍利迸若明珠其六坐名藍之語録盛著於世但頗有異跡人以為神且又尊之為肉佛愚不敢贅懼褻也贊曰順公望隆兩朝其胸吞須彌而舌傾滄海在他人則天葩幾滿繩牀耳公卻素履蕭然不忝嗣祖乞士誠有坦然與世共信者區區以生平異跡而頌銖兩其然豈其然乎萬峰蔚禪師禪師時蔚者號萬峯姓金氏東甌人也機投伏龍千巖長法弘鄧尉歿年七十有九師初生其里瑞應不一俱以徵金氏金氏恐乃祝佛願施為僧年十三出家具正知見登壇受滿分戒因誦法華至諸法從本來常自寂滅相有省走參止巖止巖示目三不是話師別卓菴於達蓬山楮衾草榻杳若忘生忽聞佛跡寺僧舉溈山踢倒淨瓶公案大悟乃曰顛顛倒倒是南泉纍我工夫卻半年當下若能親薦得如何不進劈胸拳即棄菴入天台登華頂機觸無見左右震栗無見善遇之且勉師曰子宜居山保守他日支拄宗庭非子而誰乃至伏龍伏龍圍繞數千指皆一時俊杰師土音長髮洋然進拜千巖奇而問曰將甚麼與老僧相見師竪拳千巖曰不是心不是佛不是物是箇甚麼師打圓相叉手而立巖曰莫要請益麼師掩耳而出巖深喜之一日千巖據座命撾鼓衆方集師震聲一喝拂袖便出巖乃曰黃花滿目秋白雲端坐碧峰頭無賓主句輕拈出一喝千江水逆流於是叢林知名出世嵩山有示衆曰月頭是初一光明漸漸出月尾是三十光明何處覓假饒老釋迦也道拈不出拈得出萬事畢若有人道得出來道看如無嵩山與諸人露箇消息舒兩手云我見燈明佛本光瑞如此又展掌云大開方便門便從者裡入握拳云閉卻牢關說家裡話且道不開不閉一句作麼生斂衣下座次遷平江鄧尉創大聖恩寺當是時世主稱為佛心天子有能禪者多隨諸名德出入禁廷溫繹典故其聖恩席下抱道髠徒僅半千人普持勝學二闍黎為上首師純以本色提接之海內禪風一正士夫書札通候於師者除問道外槩不復緘至有久從游者求隻字不可得間或請之但以老僧年邁而卻焉侍御陸公書古德機緣馳問師謂來使曰汝主初選官時可到京否使愕然曰安有不朝天子而受職者師笑曰奈選佛何師雖不假詞色羅絡當時然寬大莫測之機多如此洪武初有旨採諸山名德因議及師景濂宋公固止曰不可此老吾浙人也吾素知其為人年且逮耄性喜恬退必不能奉命且留此一老為林下標職詎不美乎若迫之彼必蹈汾陽昭公之轍主議者令私探之師早稱病掩關矣師自壯至老功課纖髮不移日理僧事夜則跏趺儼然達旦侍僧間請息師曰汝正閙在老僧息之久矣洪武辛酉正月二十九日集衆說偈奄然化去偈曰七十九年一味杜田懸崖攃手杲日當天其繼鄧尉法席者寶藏持公也持之下復出慧旵虗白旵禪師慧旵禪師者楚人也出王氏字虗白七歲知誦佛陀名號寤寐不息又七歲禮妙覺寺湛然祝髮祝髮之頃忽祥光四際皆成五色湛驚喜曰此沙彌他日定南針子也遂以慧旵名之師為人奇偉方正親先敬後猶如饑渴然性剛不解軟語聞耳出口若持券人共稱之曰楚直至有難發之舉必激師發之發俱中節湛然每召師曰浩浩光陰切莫錯過對曰不錯過湛每視而休去一日湛問曰今日作甚麼師曰切蘿蔔曰你只會切蘿蔔師曰也會殺人湛驀引頸師曰降將不斬湛吐舌而起湛遷疏山師別參松隱於雲間因覩孤松了然自許遍歷戶庭不受控勒之平江見果林果林擲下蒲團曰試說看對曰只者消息本無言說破蒲團上地迸天裂林愛其神駿指往鄧尉拽杖門送撫師背曰登泰華之巔始知宇宙之大投五犗之餌可語滄溟之深子往矣毋遲師敬諾是時寶藏持禪師繼席鄧尉進者雖雲湧而去者亦川流蓋其慎也師謁之持公問曰心不是佛智不是道你云何會師進步叉手而立公大呵之師乃憤疑參堂株立不寐至二夜洞徹臨濟宗旨遂師資道合矣持公遷化師關隱安溪三十載如一日永樂年間道風大播名都會邑重幣交至師俱卻之其節概嚴冷一振風穴之風姚斯道以顯望鳴當世欲為師撰序師亦卻之斯道嘆曰嗟乎倒嶽傾湫之際卓立當陽揮召不得者若公也至於跛鱉之行飛龍之說豈足恃哉識者皆多姚公之知人焉海舟永慈自出峽負其知見盛氣加人不肯挂搭諸方靈谷堂頭強慈首衆有禪者盛贊師之機略逈別慈無可意洎終期即通謁於師師攃其寶惜絶其蓋纏慈乃歸心竟代師任持公之道正統五年師無病示化先有遺囑偈曰字付慈海舟訪我我無酬明年之明日西風笑點頭更以衣遣白菴明長老送至東山時海舟慈開化東山三載矣東山海舟慈禪師禪師名永慈訛作普慈其法號海舟明洪武二十七年甲戌生於蜀之成都余氏訛作常熟錢氏弱齡聞說生死事大即蘊於膺經旬不就寢決志趨彭縣之大隋山訛作破山景德寺禮獨照月禪師堅求法要月喜其端厚慎重可為法門梁棟遂度之永樂癸巳月歿師竟入西山菴隱八載形影偶偕忽覺相應乃棄菴出謁大初和尚時年二十有八矣初受師半展遽問曰向父母未生前速道將來師從東過西初曰未在更道師曰兩眼相對初正色瞚師師趨去之復至東浦訪無際抵靈谷見雪峰雪峯以師悟處諦當延師為靈谷第一座師竟自許常與同輩蹴踏峯竊駭之然師無留意解制拂衣至安溪投機於虗白旵公公以臨濟正脉囑師保任師乃辭去復陸沉牛首諸山正統丁巳師年四十四始領東山翼善禪寺師晦養既久且弘大化四方宿艾虗懷而仰風裁然師虎視來機故踵息未舒而神氣先萎者多矣正統五年庚申六月旵公化去東南學衆惟歸東山王公貴人虗己以禮致師師未常以一言開鑿智竇故一時雖盡愛敬莫得而親疏焉緇素為師預建身後之域有范作頭者失斧傷足痛甚索酒師謂之曰范作頭傷足猶可假若斫去頭時有千石酒與作頭作頭能喫否范於言下知歸即求為僧師録之乃充火頭刻意究竟不覺被火燎面如刀刈取鏡照之欣舞以偈呈師師為肯可當是時出入東山皆稱俊杰不無有望於師師惟目送而已至有已據高座而聲馳國中者求入籌室師弗顧或謂東山網漏於吞舟之魚師哂之間有古溪澄禪師常過東山師與盤桓喜其見處穩實嘆曰真斷橋之後也乃舉澄以住高座寺澄初出世衲子不甚知名師以澄法語緘達諸山諸山始歸重兼仰師有衛法至公之德云天順五年辛巳師升座說法畢一喝而逝逝之日白虹橫貫異鳥悲鳴古溪澄哭之慟挽之以詩吊之以文其略曰道揚湖海德播神州慈濟隆乎品彚聲名動乎王侯來西蜀而全堤正令坐東山而大闡玄猷續高峯七世之燈爍群昏而獨照紹旵祖百年之踵吞衆派以周流將入涅槃現衰相而白虹貫日既歸圓寂殮法身而夜壑藏舟澄自後不上堂亦趺坐遷化於香巖香巖之衆悽然澄徐展目曰不須如是復宴然長往師之門人智瑄作明瑄訛也開法金陵瑄傳天奇本瑞瑞之法嗣大振瑄即范作頭也贊曰鄧尉至東山歷傳四世孑孑喬松其本孤矣自寶峰燎破面門而得天奇瑞公枝秀雲巒葉蔭寰中或疑其先淨而後濫殊不知我此世界大賢劫中小劫二十當有千佛出興迄今劫過有九矣自拘留孫至我釋迦本師才出四佛彌勒師子後仍有九百九十餘尊第十五小劫中一齊出現惟餘樓至設以盛衰淨濫而較之可乎否耶福林度禪師禪師名智度號白雲處州麗水吳氏子也初住普慈終於福林度居福林時以無見覩公藤杖手卷囑纍古拙俊是為斷橋一脉有克肖之者也蓋覩公法繼方山寶寶嗣斷橋倫故度望斷橋為四葉之祖焉度為人沉默而曠達初受業於郡之白雲空中假禪師假陰察度根器使行卑劣行以挫之每呼度名度每應諾假曰將謂將謂度不領乃使度南詢曰善財是菩薩中行腳樣子也趙州是祖師中行腳樣子也龐蘊是居士中行腳樣子也今人行腳不效此三老則枉費芒鞋徒自困耳度即遍參南北禪席已而歸省假公喜曰你來也吾事畢矣一日說偈曰地水火風先佛記掘地深埋第一義一免檀那幾片柴二免人言無舍利乃端坐蛻去度掩面哭曰蒼天蒼天或曰君哭遲矣度乃大笑遂廬於塔日取楞嚴圓覺研究悉能貫之然於日用之際又不能得大自在嘆曰參禪不求大徹癡禪也吾師豈虗語哉但恨遊方時未抵天台參無見覩當是時覩公稱為宗門繡虎居華頂禪流憚之度即趨華頂謁覩以西來密意扣之覩掀眉視曰得娑羅峯點頭向汝道度以手搖曳覩便喝度悟旨曰娑羅峯頂白浪滔天花開芒種後葉落立秋前覩曰我家無殘羹餿飯曰即今亦不少覩欣而肯之曰我四十年住此山一老道者耳別無甚奇特惟先師未了公案今以責汝汝善保任覩便趨寂度住後以為先師遺囑在躬因時接物隨機開導聲重湖江與夢堂愚菴諸老齊名明洪武二年有詔赴京即疏辭還門下有以不耐事諫者度怒責曰汝不聞古德有言乎縱饒弄到帝王家也是一場乾打閧將來法門濫竿竊符之弊必汝輩也未幾遷化於福林有遺偈曰無世可辭有衆可別太虗空中何必釘橛火浴收五色舍利大如菽塔於寺西度隨所說法偈頌弗許記録禪者竊書其語度乃瞋逐曰奴流敢裨販吾語作口頭人事以衒叢林耶復有老宿以未見度語句為恨潛探衆中值度入室徵判險要如揭貫花老宿大喜曰不意斷橋猶在贊曰覩公居山四十載耽耽坐視非白雲解其項下之鈴幾鈍置耳白雲行道垂手低眉蓋亦蒼頡造書契而代結繩者耶及暮年仍襲覩公之風翛然高枕瞋責子弟有竊符濫竽之弊又何異延恩安之笑法雲秀也語云百花叢裡過一葉不沾身其白雲乎瑞巖恕中慍禪師恕中禪師名無慍台州人也出陳氏姿量雋瑰粃糠世味機契於竺元道禪師說法瑞巖日本國王慕慍道德傳譯疏朝廷迎慍化其國慍堅謝不往而終老林麓南北聞其名爭願見之慍初受業於元叟端以己躬為急務遍走叢林不合即背法堂而去於淨慈芝鳳山靈稍相流連及還省元叟元叟喜之以擇木寮居慍慍仍不自許又訪天童砥公因留閲藏凡經十載以博達著名然於狗子無佛性話獨疑之乃私挽聰興二友而謂之曰汝我甘死祖師語下乎因假言遊天台擬再尋作者登華頂吊寒巖遷延數月聞天目禮下橫川珙有嗣曰竺元道禪師住仙居之紫籜垂四十年矣行腳人以古憚之慍偕聰興進登焉遠見老僧坐隔溪盤石又一白髮僧侍立風度蕭然如吳處士所畫阿羅漢三人知是道公乃合爪進訊道曰山路崎險闍黎到來不易聰進曰和尚住此久近道曰石穿新竹笋壁挂古藤蘿聰曰畢竟如何接人曰百二奇峯朝鳳嶺一條坦道下仙居興又進曰如何是佛法的的大意道公曰燒畬種芋子興曰如何是佛法向上事曰接竹割松枝興擬進語道公指慍曰那位上座因甚不問話興輒悟旨已而具威儀上方丈人事慍才申問被一喝頓消積滯即獻一頌道公深肯之其頌曰狗子佛性無春色滿皇都趙州東院裡壁上挂葫蘆三人相慶曰我等若以耳作眼幾賺一生於是三人俱嗣道公聰興乃服勤於紫籜慍辭應明州靈巖道公謂之曰汝知瓦乎聯之千百則有蓋覆之功汝知玉乎露之徑寸卻貽偷竊之患與其碎玉以矯世不若全瓦以濟時今古至人惟得此而已矣慍既出世而元叟下知識噩夢堂銘古鼎輩以為慍必酬元叟之香俱遣使靈巖厚為慍壽慍開堂日拈香曰古人出世拈香酬法乳也今人出世拈香酬世恩也慍上座總不然昔年行腳到紫籜山中參箇老布衲彼亦無法可授我亦無法可受只向無授受中拈出供養竺元道和尚不圖報德酬恩只要大家知委夢堂與徑山舊法侶聞之大驚唯唯而已慍居靈巖三載遷居瑞巖乃設三問勘禪流不合即逐出當時謂之瑞巖三關其問曰穩坐家堂因甚主人翁不識掀翻大海摑碎須彌平地上因甚擡腳不起眼光爍破四天下自家眉毛落盡因甚不見三句內一句外不涉兩頭有人道得拄杖子兩手分付又謂衆曰我者裡一切只是尋常你若來弄機關誇好手向毒蛇頭上揩癢猛虎項下解鈴拄杖未打汝在何故有盤根錯節方可顯利器有銀山鐵壁方可整鉗鎚又曰靈山奧旨少室真傳日月不足喻其明虗空不足喻其廣巍巍獨運蕩蕩無私思之則差議之則錯五千四十八卷說食向人一千七百葛藤持蠡測海在今諸方莫不盡謂驅其耕奪其食貴圖宗風不墜殊不知正是救湯進火禦寒贈氷山僧與麼道豈是壓良為賤取笑大家臂三折而知醫人多閲而曉相靈俐底不用如何若何便請單刀直入掃蕩攙搶坐享太平豈不快哉少涉遲疑白雲萬里又曰三教聖人總在拂子頭上牽枝引蔓說妙談玄儒者曰吾道一以貫之老者曰聖人抱一為天下式佛者曰惟此一事實餘二則非真既各說有來由未免稱強稱弱且作麼判斷使其聲和嚮順形直影端剖破人我藩籬塞卻無明窟穴擊拂云二繇一有一亦莫守日午打三更面南看北斗慍居瑞巖道價日高湖江英俊趨台者不絶當是時元主崇尚我宗凡林下染衣之叟多受隆譽慍獨體其師住山本色之操嘗作書與了堂一公其書深切時弊凡千百言蓋一與慍同師竺元也一日上堂曰我此一宗難為荷負自非有驅耕奪食手段放行把住機關至於一進一退之間未免貽笑作者瑞巖在今兩序進退各得其宜其進也如耀世明燈燭破歷劫昏衢之暗其退也如潛淵老蚌孕成不夜照乘之珠毗嵐猛風吹之不滅五濁穢泥汩之不昏大衆荷負既已得人山懷正堪放下且放下底事作麼生楖栗橫擔不顧人直入千峯萬峯去拽杖獨登松巖之頂上有老屋數楹為秋江禪師休老處慍愛居焉洪武七年慍至京固辭日本之請帝喜之留館天界朝士宋公濂輩時稱有道每洗沐日即至天界擊節道要至不愜處慍莊色曰我家衲子磨肩擦腳數十載尚不奈何公輩安得草草圖作口頭人事耶宋公嘆服是冬辭還門人居頂結翠山草堂迎慍是時大宗興住持徑山知慍退休以偈柬曰萬疊山牽一杖雲清流何處覓相分漫拈紫籜氷風柄笑裡長飛虎豹羣愚菴亦以三偈柬曰惺惺石上主人翁一室高居太白峯靖退只今非小節知心未許石門聰千里同風各暮年任教滄海變桑田獨憐熊耳峯頭月昨夜蝦蟆食半邊徒誇錦瑟與瑤琴妙指方能發妙音卻憶鰲山深雪夜弟兄傾盡歲寒心宋公濂嘗遣書問亦致偈曰參禪第一要知宗四海惟聞老恕中白日青天轟霹靂孽狐妖魅盡潛踪慍亦喜宋公留心吾道以偈答曰語言渾不涉離微抹過雲門顧鑑咦伸出玉堂揮翰手倒拈禿帚畫蛾眉洪武十九年七月說偈曰七十八年無法可說末後一句露拄饒舌咄端坐而化日前遺囑屏世禮以骨灰散水竹間用表無常門人不敢守命乃於翠山唐嶴之原建窣堵以龕瘞焉未久大宗興禪師亦坐化於徑山有遺偈曰夫三十婦六齡畢竟偶不成其木菴聰後住紫籜晚應天童贊曰溫公出世而徑山法侶覬其必嗣元叟元叟輩最尊風最盛公終不就何也蓋得處非易故守之益堅正當與感鐵面之卻佛印元並案焉聰興二老互相砥礪而勝友淵源各行其道又當與巖頭雪峯等之嗟乎末法壟斷名位貨殖師友讀公行實能不形消而骨愧乎松隱茂禪師禪師松隱小茂者出明州鄭氏為古林大茂之嗣開法郡之清凉晚則高枕此軒湖海莫得而親疏之共稱為此軒鐵老人老人常捋鬚笑曰釋迦老子塞井為臼達磨大師以油益薪臨濟德山聻自點胸曰還較此軒百步復呵呵大笑是時所歸仰者必指大茂小茂云小茂少時常終日不言夜則趺坐其母惡之推使仆輒達旦目不少瞑年十六依杭州傳法寺希顏落髮顏以寺務屬小茂小茂私嘆曰以道故棄家胡為復入其家耶乃棄去孤游時雲居有南㵎泉禪師茂泛鄱湖而謁之泉頻為饒舌茂益不領乃疑宗師有密語故曰祖祖相授既有授受則教外別傳之旨復安在哉於是不離南㵎左右哀求不已南㵎憫之乃謂茂曰子緣不在此當今有茂古林者乃橫川之仲子現住饒州永福去此不遠子宜往之或可發子之機如不相契緊抱一經一呪以待來生參禪可也小茂奮走永福見古林古林問曰道者來何所圖對曰生死事大求出離耳曰你明知四大五蘊是生死根本何緣撞入此革囊中茂又擬對古林擊之茂輒證於棒下乃趨出急搭伽黎向雲居展拜曰禹力若不到河聲流向西久之辭還兩浙古林曰教育英材貴順時宜你以古而行今吾恐你與時違耳時違而欲唱道不亦難乎茂對曰以古而行今者儉也順今而非古者奢也儉之病也不過無人然是其人亦至矣奢之弊也則獅蟲出焉獅蟲既出必成厲階故傳云與其奢也寧儉其今日之謂與古林賢之小茂既還浙游道峯分月江印之座印於法門輕重茂不阿其意每以事拂印印不懌印良久曰首座乃人天眼目所見甚當識者兩賢之至正壬午出世清涼勦絶枝蔓純以真實接人有僧才申問便以手拍地而笑茂曰滯貨何勞拈出僧乃噓茂便喝僧徹旨而去茂每疾時弊架聲名羅禪者又疾禪者乏正因上他勾當互相熱瞞上者以為一期佛事畢下者以為多生事足故燕坐常失聲曰痛哉痛哉雖胡僧再來無復奈何遂退隱東堂屏絶人事天童元明良建朝元閣閣外更築此軒而迎茂茂喜就之良父事茂公茂常勗良住持莫取先名須責晚效茂老且耄矣忽與侍者約期而死侍者請留偈茂曰此中廓然何偈為哉遂端坐憑几握右手為拳枕額而逝越七日色明頂溫引龕闍維於太白峯前炬方舉空中有物飄灑繽紛非雨非雪盤旋烈𦦨上火滅乃已識者曰天花也獲舍利如珠者不勝計塔於瑞雲山諡曰佛光普照禪師贊曰丹沙出神龕噉之雞犬雞犬立化麟鳳驗實效也考松隱生平語句味之者豈獨為麟為鳳而已哉則其實效更當何如也或驚公之作略別有一壺風月嗟乎曹溪波浪相似而人被陸沉公之有補於當時古今孰得而淺深之
