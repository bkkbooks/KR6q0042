body:
  text: 博山來禪師無異禪師者名元來廬州舒城人也姓沙氏胎乳絶葷耳目不涉塵垢年十六遊石頭城聽法華自信佛法不從人得乃禮五臺靜菴沙門著垢衣五年精核教觀振錫南還上峩峯謁無明經公自負人無我及輒辭行經公斂目危坐而已師不測竟去入閩寓白雲峯閲古尊宿語忽有所得再謁經公陳其見處公曰蟻子解尋腥處走蒼蠅偏向臭邊飛是君邊事臣邊事對曰臣邊事曰大有人笑你在師愕然曰到者裡因甚不是公曰此不是彼皆然師乃傾心哀請公惟斂目師益不測一日聞泥神倒地聲不覺踴躍呈偈於公公仍斂目命以宗乘堂別居之居年餘每呈偈頌公斂目如前師因感泣以為依公決擇不蒙指示歲序推遷何了日耶偶登廁覩上樹人乃明大旨嘆曰今日方知師不我欺也萬曆壬寅師年二十有八出住博山而持重端嚴篤行古德之風入其門者心容俱肅尋應閩之董巗鼓山大仰復還博山參徒大集是時經公已遷壽昌父子道價喧騰宇內僧問如何是功師曰一人同一春如何共功師曰力士舁杖鼓如何是功功師曰猢孫上露柱曰不得敲唱雙舉請示正中妙叶師曰高底雲繞樹遠近鳥銜花如何是君師曰水有筋山有骨如何是臣師曰鶺鴒鳥鳴似哭如何是君視臣師曰千年老樹挂枯藤如何是臣視君師曰樓頭畫鼓正三更如何是君臣道合師曰金闕鳳銜丹詔去邊陲人唱凱歌歸僧作禮師曰君位中事作麼生對曰虗突兀師復打時慧臺鏡禪師早得旨於經公翛翛瓢笠剝諸方諸方以矮師叔類之過訪於師適師升座鏡出震威一喝曰百丈聞喝三日耳聾且道是那三日師曰秋風多帶殺秋露愈加寒鏡拂袖歸衆師便下座鏡後隱於武夷石屏巖相隨者樵汲數輩禪衲尋風求之鏡悉指歸博山崇禎二年魏國公徐弘基請師説法南京天界使符三至師始一出象龍沸集大廓曹洞宗風上堂曰達磨大師航海而來直指人心見性成佛雖則門庭萬仞壁立千層秖演一心之法更無餘事乃至六代傳衣五宗競出運無礙輪化無緣衆秖演一心之法更無餘事溈山大師敲唱同行暗機圓合傾瓶以辨超方撼茶而彰妙用秖演一心法更無餘事雲門大師箭鋒相拄函蓋乾坤揚眉落臼顧盼猶遲如流雲翔鶴湛水晴空秖演一心之法更無餘事法眼大師拈現前石塞虗空口一切處現成六根互用六用齊施秖演一心之法更無餘事臨濟大師一語中具三玄一玄中具三要驅耕夫牛奪飢人食電光石火開眼猶迷秖演一心之法更無餘事洞山大師混不得類不齊立寶鏡三昧照學人肺肝分五湖玉石雪盛銀碗月照金沙秖演一心之法更無餘事乃至博山今日遠承諸祖慈廕循規蹈矩借路還家駕輕就熟秖演一心之法更無餘事諸昆仲含靈具此一心之法學人學此一心之法三世諸佛歷代祖師示此一心之法故楞伽云佛語心為宗諸昆仲那箇臺無月誰家樹不春卓柱杖下座師毅辭還山傾都遮留籃輿不得前乃宵邁緇素追攀望江而立徐公歲序存問不間也師既大弘洞宗常隨侍者萬餘指如臨一人僧問如何是不聲色墮師曰斷橋分野水如何是類墮師曰孤棹舉平原如何是尊貴墮師曰裂破幾層清世界倒騎玉象趂麒麟銀碗盛雪明月藏鷺意旨如何師曰露骨瘦上環紫霧塞流小澗長青苔師開化幾三十載未易肯諾或請入草求人廣紹先澤師太息曰吾宗貴得真脈妙叶玄機苟不然仍瓦解耳吾何忍哉語畢泣下自後遂不上堂示疾於崇禛庚午之秋誾首座問曰和尚尊體如何曰儘有些子受用誾曰還有不病者麼曰熱大作麼誾曰去來自繇請道一句師書歷歷分明四字跏趺而寂塔於博山坐三十九夏其年僅五十六也贊曰投子世大陽之代須憑秀圓通協而成之其道始著真歇稟丹霞之嗣還借照長蘆荐而褒之此話方行博山父子遠紹少室之宗不叨餘力大衍新豐之調本自天然其説法則橫空鳳舞激揚則擲地金聲至其慎重真脈常自下涕語云猛虎生兒勢不能食牛者輒廢之其博山之山之謂與湛然澄禪師禪師湛然者諱圓澄別號散木出會稽夏氏母夢梵僧入室而娠娠十四月而生師生大目昂鼻哆唇露齒直腸信口不肯從事於學親歿窶甚充郵卒以傳符踰期亡去徑投隱峰峯示念佛誰是令師究竟三晝夜輒有省時年二十矣入天荒山禮妙峯斬髮擇最苦行行之間聞傅大士法身偈一切經義便能記持尋乞滿分戒於雲棲宏公徵以毗尼節要師悉達其指返越掩關寶林蘭若因憶乾峯舉一不得舉二話乃大通玄旨有頌曰舉一舉二別端倪箇裡元無是與非雪曲調高人會少獨許韶陽和得齊二老何曾動舌諸方浪自攢眉擬議過新羅刻舟求劍元迷再謁雲棲呈見於宏公會入室宏舉海底泥牛銜月赴語未竟師推出一僧曰大衆證明宏深器之於是激揚法席傾一衆焉萬曆辛卯適大覺念公南遊師趨謁之念曰止風塗向青山近越王城傍滄海遙時如何曰月穿潭底破波斯不展眉念又問洞上宗旨師曰五位君臣切要知箇中何必待思惟石女貫弄無針線木偶能提化外機井底紅塵騰藹藹山頭白浪滾飛飛誕生本是無功用不覺天然得帝畿念欣然書偈印之未幾出住雲門次遷徑山歷禾之東塔乃至顯聖天華前后垂二十載法席為之大震其上堂曰老儂不識元字腳強出人前要説法錯認曾參作魯參合堂大衆皆笑殺這一笑中有妙若還悟得其中意點破當天者一竅大衆如何是這一竅良久云動容揚古路不墮悄然機小參云煙雨盜將山色去溪風送得水聲來本來法法皆如此莫教心識強安排衆中若作境會許你具一隻眼若作佛法會打碎你頭何故我王庫內無如是刀又提綱云喚二作一指七為八手秉太阿聖凡盡殺卻憶東村王大姐倒戴西村李公襪無論貧富貴賤見者聞者皆笑殺且道山僧今日解何宗噫嘻噓阿喇喇師之提唱率多如此僧問如何是圓相師曰大燒餅如何是暗機師曰凌霄峯如何是義海師曰半山亭如何是意證師曰啞子呪人如何是默論師曰溫伯見孔子如何是回互師曰孝子諱爺名諸方珍之為師法續洞室機類雲門臨濟其伯仲也又師初在京會達觀禪師於嘉熙寺月川座主太史陶石簣黃慎軒同玩月次慎軒臥問馬祖玩月因緣師曰汝臥我坐不得為公説耳軒亟起謝月川笑曰內翰錯過了也觀云我下語不及此公一籌又過武林聞谷慧聞等屬望一方會諸紳遣使專迎及啓慧聞札曰今日大家欲與和尚作家相見若來已墮情識不來猶缺慈悲師扯破札正色曰者些客作漢敢於老僧納敗缺也至即升堂正立慧聞進曰和尚莫要班門弄斧師把住曰速道速道慧面赤無語師把開曰死漢聞谷遂率衆作禮蘇巡漕問曰鴛鴦繡出從君看不把金針度與人如何是金針師曰我在京都走一遭不曾遇著一箇人蘇擬議師曰古佛過去久矣無念有禪師居黃檗獨持風節呵罵諸方特訪之師曰古人道如紅爐上飛片雪柏似且道古人還具透關眼也未有曰我不見有甚麼古人師急指曰背後聻念休去師之勘辨約此類又嘗嘆末流謬惑大乘遂著説若干篇曰宗門或問慨古録楞嚴臆説涅槃會疏法華意語金剛三昧經注思益梵天經解諦理邁倫一時所宗焉天啓丙寅季冬書顯聖遺囑即至天華辭衆復夜話至丑乃右脅長往閲世六十六坐三十八臘得法者九人編隨機録八卷流通於世贊曰余初過會稽師謝世未久觀其遺風謖謖然尚在山中耆德序師之妙韻為法苦心求人之概私心竊向往之續讀師集至題無趣録云夫祖道不可絶繼風穴於法堂痛哭克家之子難逢仰山自記再來莫不以諸佛慧命為懷以度生為急務者也嗟乎師之心至矣盡矣以度生為務矣然非夙承願力者欲竊符以存國余亦深知其不可也天童密雲悟禪師禪師諱圓悟字覺初自號密雲宜興人也明嘉靖丙寅生於蔣氏師生八歲知世相無常年二十六發宿慧二十七負薪有省三十棄家又四歲為僧四十桐棺悟道又六歲得受記莂五十二開化龍池於是六建法幢示寂之年七十有七然生不為家四海歸之老不奉詔朝廷慕之及不忘慈今古戴之窣堵不虗尊人天共享之實為龍池之真乳遡滹沱而拓曹溪遠紹雞足之正裔也師初棄家赤手空肩走事幻有傳禪師傳嘉其志節喜而度之為大沙門當機輒不爽旨衆皆驚異師終不自肯心苦神勞且代衆役不知有己偶過桐棺山頂豁然大悟情與無情煥然等現覓纖毫過患不可得時傳公已居燕都師即趨省傳公公見乃大喜喜師可倚以支我臨濟也經二載辭還南上天台探禹穴因與周公汝登陶公望齡王公舜鼎本色相見脫略窠臼三公甚敬服越之有道緇素爭識師焉傳公還龍池師因歸省公問你到諸方會見甚麼人師頓腳拍膝以對公公笑曰許多時一些氣息也無師曰和尚疑則別參公撾鼓集衆付師衣拂復召入楊前以扶持佛法勉師力行以報先宗師即呈偈曰若據某甲扶佛法任他都來總與三十棒莫道分明為賞罰時年四十有六矣三載傳公遷化又三載衆請繼席龍池自是意緣移徙酬香之會有六計二十六年掀翻露布洞示真元座下蹴踏常足萬餘指師則當軒據座威震獅猊海內英靈飲氣自失凡剎竿樹對成大寶坊不許門下干倚王公嘗語學者貞觀響道欲瞻風彩上表遜謝往返三四引頸就刃神色儼然吾敬道信大師茅茨石室纍煩聖主且請前行吾從別道澡身淨髮結跏趺逝吾敬汾陽無業休心息念斷絶攀援賜紫及號力陳昔誓收付有司恬然受刑吾敬芙蓉道揩牢著草鞋腰包住院去就之間輕同學子不為蚖蛇戀彼窟穴吾敬應菴華祖故師生平意有不可撩衣即行首住龍池五載一日因事上堂曰者裡無人證明且向別處尋討下座便去次住天台古通玄寺茅堂草座法政氷霜晨暮參請間不容髮雖三載而日新海鹽金粟使符至再師憫其迫切曳杖赴之居六載無作無為崇成大廈牀曆幾滿千輩名卿達士一目相遇獰拳辣掌之下掉臂而去者夥矣有挾貴而問道者師輒掌之貴人曰和尚獨不欲獲法乎師曰山僧法也無護箇甚麼又連掌之斷際故山曰黃檗者鼓寂鐘沉閩人來請師不忍先迹零落籃輿度嶺僅五閲月又拂衣則明州黃司理端伯以鄮峯育王寺而待駕焉黃公又考太白名山為歷祖庭廢之已久遂與有道紳士俱愴然先以意容恐師臘高師慨然移錫至天童古佛殿基曰虗空作殿日月為燈且道是甚麼人境界還會麼設或未會且看新長老撒開坐具大展三拜於是十一載天龍失守之區歷祖藏身之處無不斬新扶起壯甲東南翼集鱗宗蔚為僧海其得髓之子一十二人然點胸自許招手橫趨者不可勝計崇禎辛巳天子命外戚田公弘遇齎香賜紫徵住金陵報恩寺師固以老辭退臥通玄峯頂天下圖其頂相書其名號而親之壬午七月七日辰猶巡寮視務午刻宴然示化塔於天童南山緇素奔送者萬人臨壙慟而失聲聲震山谷清順治庚子住天童門人弘覺禪師道忞編師六會語録進頒大藏贊曰斗柄東指鼓腹謳歌於不識不知之中即釋氏儒童難贊辭焉獨今之薄海內外據大寶坊橫説竪説者操鈯斧於山邊水邊者皆師法會中人也歷考少林至楊岐其世十七楊歧二十有三世以得師其間法利之普如師者幾何人哉今叢林公論以曹溪高峯永明大慧等類師始末嗚呼雖實録也無乃瓊枝析玉與磬山天隱修禪師天隱禪師者諱圓修出荊溪閔氏説法磬山報恩初與天童悟禪師同出龍池傳之門是師為笑巗真孫也師幼明敏生知佛乘常以心齋報母然留連俗諦幾失前因一日過講肆聞楞嚴經云一切衆生皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉師惕然驚畏擇龍池幻有傳和尚而依止焉傳示趙州無字話頭師參之半載不發改看本來面目提撕猛切一日普請出窑次有覺所道者云聞常多菩薩出現於四大名山神通廣大傳公厲聲曰我者裡亦不少師僉曰如何是神通傳曰快度磚來著師染指法味心不外緣經百餘日偶閲楞嚴佛咄阿難云此非汝心師脫然慶快如善財入彌勒大閣了釋前疑及侍傳公入城被喝便契臨濟主賓照用之句於是上天界訪雲松過能仁謁文齋出沒奇機不無可紀萬曆辛丑傳合掩關於龍池曰汝既有新入處不妨更加精進他日利導有情則吾望足矣未幾傳公北行師悵然消遣關中惟拈頌而已於其古德公案如庖丁之解牛而無礙刃遊也獨疑乾峯十方薄伽梵一路涅槃門話復枯坐蒲團二載忍聞驢鳴大悟差別玄旨有偈曰忍聞驢子呌驚起當人笑萬別與千差非聲非色閙甲辰北省傳公於燕京之普照寺而師資深契合焉仍涉獵講庭瀾翻藏海探竿禪席料揀權宜住後常曰山僧南北往還親近知識一十八載跋涉勞碌為己躬切無少怠也嗚呼師之入道誠異今時故得處真實用處諦當常以虗空撲落地語酬僧理藏鋒之問以湖州蘿蔔宣州薑酬事藏鋒之問以有水皆涵月無山不帶春酬理事藏鋒之問以無手人行拳酬不涉理事藏鋒之問又僧問如何句到意不到師曰言言見諦步步迷蹤如何意到句不到師曰只在舌尖頭盡力道不出如何是意句俱到師曰有時獨倚庭欄上間看梅花四五枝如何是意句俱不到師曰落花流水去空負浪遊人師暮年從石磬山遷湖之報恩寺示衆曰老僧住個破院子不能時時為衆提持佛法賴土木瓦礫與諸人轉大法輪發諸人大機大用諸人切不得當面蹉過若蹉過只知事逐眼前去不覺老從頭上來一日俄集衆諄誡復以後事付囑及門上首趺坐儼然而寂瘞全身於報恩之左順治戊戌大覺琇禪師應北詔時大會諸山移塔於宜興之白雲菴初師居右磬諸方有以臨濟玄要配合教乘作奇特商量者師其惑常著書復問之并頌示諸識者其頌曰第一玄一字不加畫分明是個賊咄咄咄咄處且最毒第二玄快手何曾先撒沙并撒土露露露露出娘生褲第三玄一曲江村岸風月隨時看收收收收去箇中流第一要驀地忽一笑笑倒須菩提攙起迦葉老第二要袖裏箇金圈拈出是莖草瞬目牛吞了第三要伸縮誰能照隻手握雙拳打得虗空呌師之提唱精奧大率如此其門賢箬菴問禪師編師全録流通與天童悟齊名於世贊曰世傳曹溪下惟青原南嶽應讖殊不知嫩桂者代不乏人也而石霜下有楊岐積翠也次出佛果之門者大慧虎丘也次無準下復出雪巗斷橋也師既出龍池又與天童並駕化周宇內其久昌二桂凡五抽嫩矣其根芽懸讖於少林有以也夫雪嶠信禪師雪嶠圓信禪師者四明人姓朱氏出龍池傳禪師之門首住徑山終於會稽雲門諸方服其神駿推尊之曰信公高懷無我至性不羈笑罵自繇人天罔測卸勝劣之戈甲劈今古之藩籬縱饒一問十答而紫羅帳裡不撒真珠假使未聞先悟而千丈巖門尤遭點額大有傷弓之鳥見形高飛所以短販之徒望風栗足故雖獨據胡牀不啻沖霄野鶴以至屢遷名剎仍然本色山翁也公生九歲聞彌陀經即知有出世法於是讀書常諾諾而罷之然詞語絶塵風儀瀟灑猶王謝之玉壺氷映又愛與方客遊遊必領益年二十九竟去家矣遂訪妙禎禪宿於秦望峯下禎舉古激之公反覆研究連七日不知寢食忽仆於石前後際斷如日輪迸空天地一色衝口得偈勢不自禁欲往天台尋印證者度若耶溪忽翹首見古雲門三字得大休歇乃曰一上天台雲更深腳跟踏斷草鞋繩比丘五百無蹤迹見得他時打斷筋遂別䇿入雙髻峰蘿龕石室灰世忘緣間發新聲豪吟達旦而刀斧無痕諸方景焉時有雲棲高弟聞谷者雅相敬善一日谷行腳回舉幻有傳和尚相見機緣且稱傳公葆重有類明教嵩枯淡過於餘杭政其接人真西河獅子也公乃三詣龍池契其機與悟修二禪師為雁行焉後悟主天童修主磬山公獨菴居垂三十載黃公端伯余公大成請就徑山祖庭升座拈提臨濟宗旨端伯還西江於崇禎庚辰以廬山開先寺迎公諸山宿衲俱集公一以胎風簸雨之舌振其拈花落草之機或不耐公笑詈而去或經公指喚而心曠神怡公忽拽杖還舊隱衆驚遮挽之不可時往來衲子傳天童規製宏壯條令斬新乃至運瓦搬石伺杵負薪無不徹底為人公獨罵之逮天童訃至公又慟之侍僧曰大師昔何罵今何慟也公良久撫膝而起曰咦我掌寧獨鳴乎遂躬至天童書挽章而奠之詞曰同出龍池入路長吳興分袂過錢塘多年挂錫玲瓏石今已藏身寂寞鄉雲面揭開紅日眼山眉愁斷白花香離離一片苦心事且道何人在影堂北還又入龍池於傳公塔前拈香曰桐棺山下養龍池步入涼風覓我師當戶娑羅空腹樹迎階芳草昔人眉追思滴血曾留偈會寫傳燈嗣法詩今日塔前成九頓流源千載繼孫兒耆舊乃請示衆公曰我昔第三度登龍池先師曰你草鞋猶未脫也我道何處見草鞋來先師微笑而止我即呈偈曰數載龍池三度登重重問話舌生氷草鞋分付虎狼去雙髻峯頭一箇僧又思當初在山陰看雲門語録得他的力又在雲棲亦有機録豈可忘卻所以雲門雲棲一齊拈香供養諸方便道徑山遙嗣雲門徑山以為不然瓜有根樹有葉樹高千尺葉落歸根豈可孤負禹門先師斷斷無此理也然宗門事把住也繇我放行也繇我有時作賓有時作主有時賓主齊彰有時賓主雙忘此乃臨濟家機用人天莫測庸人豈得知也還雙徑禾城道俗以東塔禪林堅致於公公為笑留名緇貴素日繞枝藜公眼幻青白衆益心驚晚住雲門公年七十有六矣機用益峻精神益徑嘗自號曰青獅翁或稱語風老人又曰迦那尊者每擕童子山遊人見訪或打斤斗人擬議叱退之雛禪竊論公弗恤也順治丁亥中秋謂弟子曰古人立化的也有了坐亡的也有了至倚杖倒卓都有了畢竟老人怎生去好語訖大笑書片紙曰小兒曹生死路上須逍遙皎月氷霜曉喫杯茶坐脫去了乃入寢室憨臥數日忽起坐索茶而啜連唱雪花飛之句擎杯脫去世齡七十七瘞全身於雲門庚子朝廷慕之賜帑全五百並委書弘覺忞禪師而新公之塔又臨公頂相於宮中而事焉公居開先時弘覺為西堂洎嗣天童而公獨鍾愛之故弘覺禪師以猶子紀公千秋之綱目甚詳也贊曰整齊法運臨淵履氷爰師篤慎其心也蠡測者謂師弛自了則優為人則寡蓋明之中葉少室宗風循規蹈矩如喑若聾非師濯之以清泉激之以霜鍾則天方夢夢耳忠州聚雲吹萬真大師傳大師廣真者字吹萬西蜀僰道宜賓人姓李氏父祖世籍婆羅門師生惟慕事佛得法於月明和尚萬曆戊午年説法於瀟湘之湖東禪院次遷忠州聚雲夔州寶峰及雲來興龍巴臺諸剎闡揚大慧宗風崇禎己卯七月三十日唱滅於本山嗣法門人曰慧機慧芝慧麗等依法闍維闍維時遍地荷香襲人煙至松羃結為五彩火後收舍利三百餘顆復得黃金鎖子骨三莖當門二齒變為紫色建塔於三目山之陽屬四川觀察使田華國為塔上之銘署師為大慧十四世之孫懶菴鼎需禪師之裔蓋大慧初開法於洋嶼菴時需得法為第十三位今燈譜載大慧下法嗣共九十四人訛列需為第三十五位需既得旨韜光於福唐山水之間及大慧從梅陽生還時始開法於西禪入室之子僅得安永南雅志清安分四人分於元至正間菴居劍門志清住天王南雅住龍翔安永説法於鼓山是為鼓山永永付悟明法堅二人堅住承天明住淨慈纂修聯燈會要座下衲子雖衆獨以大法囑太原苦口益益付筏渡慈當益慈之時約在明之中葉叢林先德物故禪門死於繩規凡我行道之士無不藉賴中貴給劄住持慈公輩或不忍視而恬退於山邊水邊保任乃事隨方接納一箇半箇尚以篤實承繼祖宗命脈慈得一言顯顯付小菴密密出二仰欽欽出無念有已上俱有語録機緣有付荊山寶寶付鐵牛遠遠付月明池此三代惟述相見之語并付囑之偈月明池公以源流大法付與真公大師至師崛起中興光顯大慧之宗師初出世楚之湖南瀟湘小院衲子相傳上堂示衆入室機緣叢林識者驚為大慧再來崇禎辛未臘八日布金檀越內卿田素菴諸師居忠州聚雲禪院拈香畢竪拂云從上古人只為者箇東西顢頇了許多英雄豪傑賺陷了許多高人達士拋撒了許多油鹽醬醋今日老僧不徇人情向汝諸人道破只要汝等於日用二六時中行住坐臥處穿衣喫飯處運水搬柴處承當若承當得來英雄豪傑也顢頇他不得高人達士也賺陷他不得油鹽醬醋也拋撒他不得且問大衆如何是者箇東西參東吳有居士劉墨仙久遊玄墓之門持聖恩問道録訪師論及楊岐九峰之語師徵云正恁麼時楊岐在前九峰在前仙良久云和尚又作麼生師便喝仙云者一喝是前是後師翹一足仙禮拜玄墓漢月藏禪師書至師以為千里同風即撾鼓升堂説妙法語語見聚雲全録命維那對衆宣讀其書曰大慧禪師説盡人間禪病四百年內望之如渴人求井不料一枝埋沒向三峽錦江之上前得來書語録已見作略過人第未得從容談三月於水流石上為恨不淺茲聞已返峽中略伸四問萬乞答我更欲禪師起已墜之禪於今日令後輩重見天日於座下斷不令山野遺恨耳書尾復致四問曰正睡著時與死了燒了心之與性牙齒打不著須向者裏希取大用始得如何是此處底大用師答云寧向太陽粧羅剎不來黑暗扮覩音二問沿流不止絶卻真照照不到處如河是吹毛用了急須磨且道磨箇甚麼師答折腳鐺裏淡黃虀三問明處既已脫却心性切莫在離心性處躲跟除此二途如何相見師答才過驢胎又闖馬腹四問近世野狐都説心性禪不知姓張始李請禪師代答一轉語貴圖天下衲僧脫卻腥臭師答奪者老賊頭拄杖拗折莫言不道已而師於回書之尾亦致四問以問漢師作相問用水一碗貯米七粒架茅草十字在上請道是甚麼義二問溈仰九十六種圓相收盡六義問有箇收在那一義三問古人道八角磨盤空裏走不知是空走磨磨走空四問老鼠吞大象蝦蟇口咬著吞不入拖不出蒼頭老兒跳一步請下一轉語漢師或有答斯未載焉師之説法垂機勘辨約類如此有正録十卷廣録三十種共六十六卷屬水部尚書郎熊汝學捐俸刊行板存忠州治平禪院係法孫燈來編次來住高峰鐵壁慧機之子也贊曰真師既出世於萬曆之間我禪門正當肇興之時至天崇間諸方有大名稱者俱有書問交通往來未見一言表出大慧宗系之名何也無乃各闡己宗為急務未暇輕重之耶然亦是吳越燕趙衆生鮮福未獲沾師法雨耳康熙丙寅冬余為天童封龕佛事經四明過壽昌禪林訪舊遇師之玄孫統公別菴禪師始悉真師三代全録不得不為之傳補入僧寶否則闕典之責其在余乎有正録三卷并師下三世語録若干卷屬四川向化侯談養元捐俸梓板附嘉興楞嚴藏流通南宋元明僧寶傳後敘祖師云佛者心清淨是法者心光明是道者處處無礙淨光是三即一皆空而無實有旨哉言矣是以入祖室登祖位者徹其淵底提大機用剪諸見林截異端網如滴獅乳如鼓師絃聖凡莫得描摹而淺深之良以此也吾師幻津融和尚以承先啓後為念出繕本一帙授磊曰此乃山僧出匡廬時二十載江湖所集南宋元明諸尊宿大機大用之實録也汝盍勉之磊退而珍誦徹見吾師為道為法良匠苦心歷遡二十世至虎丘隆祖乃至大慧洞下諸宗計五十三人妙唱嘉猷師師道合一代時教眼目俱備郁乎文哉所謂一月臨江千江之月俱映一佛出世三世諸佛齊彰信不誣也或曰此傳始自三佛之下佛燈真際而至博山雲門天童悟祖輩而止者何耶且方今之世垂慈展拂遍溢支那豈其是非未定而止之者歟曰否否蓋順治至康熙年間諸老宿順闡逆化行解相應者不無其人率皆屬吾師翁弘覺忞老人為之銘狀其生平最詳業已流通宇內稱不朽矣當今天下公論以吾師翁之眼目料揀五宗不爽毫髮雖大慧中峯莫能右之磊小子敢復浪贅蛇足哉茲不揣荒謬承吾師命補收洞濟兩宗五百年中大有相關法化者又四十一人參吾師所撰共訂十有五卷屬會稽王公大俍較而成集寧供將來之賢聖經云諸供養中法供為最乃俾教外別傳之心法弘通流布則古今十世大機大用之旨熾無間矣康熙甲辰年佛成道日門弟子性磊拜題重刻僧寶傳記康熙丁未孟夏日紫籜草堂夜煌百物俱燼監院真發見其傳稿在東山竹園竟不知誰何將出深異祖師光明真言妙行入火不壞即走問諸山有道知識諸山樂助就梓印行於離亂之世然山路遙僻剞劂氏非名手俗而且拙部屬點畫不無訛舛其板蛀朽十將有二不堪再用今得四明王生世雄番板於瑞雲精舍書記明慧對字成於乙丑季秋是為記
